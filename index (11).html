## 7.1. Nghiên cứu một chủ đề (sâu, đáng tin)

Kết hợp: grounding (Ch.4) + cấu trúc (Ch.2) + nhiều giả thuyết + kiểm chứng.

```
Hãy nghiên cứu [câu hỏi]. Mục tiêu: một câu trả lời mà tôi dám đem ra bảo vệ.

1. Tìm thông tin một cách có hệ thống từ NHIỀU nguồn; đừng tin một nguồn đơn lẻ.
2. Khi thu thập, hãy dựng vài GIẢ THUYẾT cạnh tranh nhau, đừng chốt sớm.
3. Với mỗi tuyên bố thực tế, trích nguồn gốc; nếu không tìm được, hãy nói rõ
   "chưa kiểm chứng được" thay vì khẳng định.
4. Ghi mức độ tin cậy của bạn cho từng kết luận (chắc / khá / đoán).
5. Tự phản biện cách tiếp cận của mình ít nhất một lần.

Cuối cùng: tóm tắt câu trả lời + những chỗ bạn KÉM tự tin nhất và vì sao.
```
*(Mẫu này bám sát hướng dẫn nghiên cứu của Anthropic: nhiều giả thuyết, theo dõi mức tin cậy, tự phản biện. [VỮNG])*

> **Nâng cấp kiểm chứng:** sau khi có báo cáo, mở **phiên/agent mới** và đưa *địa chỉ nguồn*, không phải tóm tắt: *"Đây là báo cáo [dán]. Đừng tin. Tự đi tra lại các tuyên bố quan trọng từ nguồn gốc và báo cái nào không đứng vững."* (Ch.4)

---

## 7.2. Sinh ý tưởng đột phá (sản phẩm, nội dung, chiến lược)

Kết hợp: lấy mẫu có chủ đích + nhân cách đa dạng + ràng buộc + Phân kỳ→Hội tụ (Ch.3).

```
PHA 1 — PHÂN KỲ (chưa đánh giá):
Cho tôi 8 ý cho [mục tiêu], xếp từ an toàn → liều lĩnh. Với mỗi ý ghi một dòng
"điểm có thể sai". Trước khi làm, hãy liệt kê 3 ý HIỂN NHIÊN nhất mà ai cũng nghĩ
ra — rồi LOẠI chúng, đừng đưa vào. Ít nhất 2 ý phải mượn loại suy từ một ngành
hoàn toàn khác.

PHA 2 — HỘI TỤ:
Giờ đóng vai giám khảo khó tính. Chấm 8 ý theo [tiêu chí của tôi]. Giữ 3 ý mạnh
nhất, làm mỗi cái sắc hơn một bậc, rồi chọn 1 và bảo vệ.
```
*(Loại cái hiển nhiên = đẩy khỏi điểm hút; loại suy chéo ngành + ràng buộc = Ch.3; tách phân kỳ/hội tụ = chống tự kiểm duyệt sớm.)*

---

## 7.3. Viết (bài, email, tài liệu) không bị "giọng AI"

Kết hợp: vai trò cho *giọng* (Ch.2) + chống "AI slop" (Ch.1) + nói cái CẦN làm (Ch.2) + ví dụ.

```
Viết [loại văn bản] về [chủ đề] cho [đối tượng cụ thể].

Giọng: [mô tả cụ thể — vd "như một người bạn thẳng tính, không sáo rỗng"]. Đây là
một đoạn tôi thích để bạn bắt giọng: [dán 3-4 câu mẫu].

Hãy viết văn xuôi mạch lạc (không gạch đầu dòng). Tránh những cụm sáo mòn kiểu
"trong thời đại số ngày nay", "không thể phủ nhận rằng". Hãy đưa ra những lựa chọn
diễn đạt bất ngờ nhưng tự nhiên.

Tiêu chí đạt: [đối tượng] đọc xong thấy "đúng giọng người thật" và muốn đọc tiếp.
```
*(Dán đoạn mẫu = few‑shot khóa giọng, mạnh hơn mọi tính từ. Cấm cụm sáo = chống mode collapse cụ thể.)*

---

## 7.4. Phân tích / ra quyết định

Kết hợp: lùi một bước về nguyên lý (Ch.3) + nhiều góc + cho phép nói "không chắc" (Ch.4).

```
Tôi đang cân nhắc [quyết định]. Trước khi khuyên, hãy lùi một bước: vấn đề CỐT
LÕI ở đây thực ra là gì?

Rồi phân tích từ 3 góc đối lập nhau (vd: người lạc quan, người hoài nghi, người
chỉ nhìn con số). Mỗi góc nêu lập luận MẠNH NHẤT của nó.

Chỉ ra giả định nào, nếu sai, sẽ lật ngược kết luận. Nếu bạn thiếu thông tin để
kết luận chắc, hãy nói thẳng cần thêm gì.
```

---

## 7.5. Việc lập trình (kể cả khi bạn không rành code)

Kết hợp: Khám phá→Kế hoạch→Thực thi→Kiểm chứng (Ch.6) + điều tra trước khi trả lời + tiêu chí verify (Ch.4).

```
Trước hết, hãy ĐỌC [phần liên quan của dự án] và giải thích cho tôi cách nó hoạt
động. Chưa sửa gì.

[sau khi hiểu] Giờ lập KẾ HOẠCH để [mục tiêu]: cần đổi những gì, theo thứ tự nào.
Tôi sẽ duyệt trước khi bạn làm.

[sau khi duyệt] Thực hiện theo kế hoạch. Bám theo MẪU CÓ SẴN trong dự án (đừng
sáng chế kiểu mới). Sau khi xong, chạy [test/kiểm tra] và tự sửa đến khi đạt. Cho
tôi xem bằng chứng nó chạy (kết quả test, không chỉ lời khẳng định).
```
*(Quy tắc "cho tôi xem bằng chứng, đừng chỉ khẳng định" là một trong những câu giá trị nhất khi làm việc với coding agent. [VỮNG])*

---

## 7.6. "Sửa lỗi tận gốc, đừng vá triệu chứng"

Một mẫu nhỏ nhưng cực giá trị, từ tài liệu Anthropic:

```
[Mô tả triệu chứng] xảy ra. Nó có thể nằm ở [vị trí khả nghi]. Hãy viết một bài
test TÁI HIỆN lỗi trước, rồi sửa. Giải quyết NGUYÊN NHÂN GỐC, đừng che lỗi đi.
```
Và để chống "AI gian lận cho test pass":
> *"Hãy viết lời giải tổng quát, chất lượng cao... Đừng hard‑code giá trị hay tạo giải pháp chỉ chạy đúng cho các ca test. Test có để kiểm chứng tính đúng, không phải để định nghĩa lời giải."* — Anthropic [VỮNG]

---

## 7.7. Đối chiếu Claude Code vs Codex / GPT‑5

Nếu bạn dùng cả hai, vài khác biệt thực dụng (nguồn chính hãng ở mức **[VỮNG]**, so sánh của giới hành nghề ở mức **[TÙY / định hướng]**):

| Khía cạnh | Claude Code | Codex (GPT‑5/5.1) |
|---|---|---|
| File "luật nhà" | `CLAUDE.md` | `AGENTS.md` (file gần thư mục hiện tại *đè* file xa hơn). **Hai bên không đọc file của nhau.** [VỮNG] |
| Phong cách loop | Thiên hỏi‑làm‑rõ trước khi chạy (theo giới hành nghề) [TÙY] | Tự‑chủ, ít hỏi; OpenAI *huấn luyện model KHÔNG hỏi xác nhận* — nên bạn phải viết yêu cầu *đầy đủ ngay từ đầu*. [VỮNG] |
| "Núm suy nghĩ" | extended/adaptive thinking; thang `think→ultrathink` (chỉ Claude Code); model mới dùng `effort` | `reasoning_effort`: `none`/`minimal`/`low`/`medium`/`high`/`xhigh` + tham số `verbosity` riêng. [VỮNG] |
| Tường thuật tiến độ (preamble) | thường hữu ích | **Đảo ngược!** OpenAI khuyên *gỡ* preamble cho model Codex vì nó có thể khiến model *"dừng đột ngột"*. [VỮNG] |
| Nhạy với mâu thuẫn | — | GPT‑5 bị hại *nhiều hơn các model khác* bởi chỉ thị mâu thuẫn (tốn token đi hòa giải). Dọn mâu thuẫn = sửa đáng giá nhất. [VỮNG] |

**Ba bài học liên công cụ rút ra:**
1. **Đừng bê nguyên prompt từ công cụ này sang công cụ kia.** Khối preamble *giúp* bên này có thể *hại* bên kia.
2. **Với Codex, front‑load mọi thứ.** Vì nó ít hỏi lại, yêu cầu mơ hồ sẽ bị nó tự‑quyết theo hướng bạn không muốn. Viết spec đầy đủ trước.
3. **Với GPT‑5, vệ sinh mâu thuẫn quan trọng hơn thêm chỉ thị.** Gỡ một câu mâu thuẫn thường lời hơn thêm mười câu nhấn mạnh.

---

## 7.8. Hai "siêu chiêu" để tự cải thiện chính prompt của bạn

### Metaprompting — nhờ chính AI sửa prompt cho bạn
> OpenAI cung cấp mẫu: *"Đây là một prompt: [PROMPT]. Hành vi mong muốn là [X] nhưng nó lại [Y]. Giữ nguyên càng nhiều prompt hiện tại càng tốt, hãy đề xuất những chỉnh sửa/bổ sung TỐI THIỂU để model làm đúng hơn — nêu rõ cụm từ nào nên THÊM hay XÓA."* [VỮNG]

Đây là cách nhanh nhất để gỡ một prompt "cứ trật hoài": đưa cả prompt lẫn hành vi sai cho AI, xin chỉnh sửa tối thiểu.

### Rubric ẩn — bắt AI tự dựng thước đo rồi tự vượt
> OpenAI, mẫu `<self_reflection>`: *"Trước hết, hãy nghĩ ra một thước đo (rubric) 5–7 tiêu chí cho một lời giải hạng nhất — đừng cho tôi xem, chỉ dùng nội bộ. Rồi lặp đi lặp lại lời giải đến khi đạt điểm tối đa ở mọi tiêu chí; nếu chưa, làm lại."* [VỮNG]

Mạnh cho các việc "một phát ăn ngay" chất lượng cao: bạn không cần tự viết tiêu chí — bắt AI tự đặt thanh xà cao rồi tự với tới.

---

## Tóm gọn Chương 7

- **Công thức là điểm khởi đầu, không phải thần chú** — sự cụ thể của *bạn* mới làm chúng chạy.
- Mỗi tình huống (nghiên cứu / ý tưởng / viết / phân tích / code / sửa lỗi) có một mẫu ghép sẵn từ các nguyên tắc Ch.2–6; chú thích cho biết *vì sao* mỗi mảnh có mặt.
- **Câu vàng cho coding:** *"cho tôi xem bằng chứng nó chạy, đừng chỉ khẳng định"* + *"sửa nguyên nhân gốc, đừng vá triệu chứng"* + *"đừng hard‑code cho test pass"*.
- **Claude vs Codex:** file luật nhà khác nhau và không đọc chéo; Codex tự‑chủ hơn nên phải front‑load; preamble *giúp* bên này có thể *hại* bên kia; GPT‑5 đặc biệt ghét chỉ thị mâu thuẫn.
- **Hai siêu chiêu tự‑cải thiện:** *metaprompting* (nhờ AI sửa prompt của bạn) và *rubric ẩn* (bắt AI tự dựng thước đo rồi tự vượt).

→ Cuối cùng: [Chương 8 — Phụ lục tra cứu](08-phu-luc-tra-cuu.md): thẻ tra cứu nhanh, checklist, và toàn bộ nguồn để bạn tự kiểm chứng.

# Chương 8 — Phụ lục tra cứu

> Chương này để *dán lên tường*. Gồm: (A) thẻ tra cứu power‑phrase theo mức bằng chứng, (B) checklist trước khi gửi mệnh lệnh, (C) thẻ chống "AI slop", và (D) **toàn bộ nguồn** — để bạn tự đi kiểm chứng mọi tuyên bố trong sách, đúng tinh thần Chương 4: *đừng tin tóm tắt của tôi, hãy đọc nguồn gốc.*

---

## A. Thẻ tra cứu power‑phrase (xếp theo bằng chứng)

### ✅ HẠNG A — đáng tin, dùng thoải mái
| Câu / kỹ thuật | Dùng để | Bằng chứng |
|---|---|---|
| Cụ thể hóa + trả lời "ai/để làm gì/định dạng/ràng buộc/thế nào là tốt" | Mọi việc | VỮNG |
| Dán 3–5 ví dụ mẫu (`<example>`) | Khóa định dạng & giọng | VỮNG |
| "Cho phép nói 'tôi không biết'" | Chống bịa | VỮNG |
| "Trích nguồn trước, kết luận sau" | Grounding tài liệu | VỮNG |
| "Đối chiếu câu trả lời với [tiêu chí cụ thể] trước khi chốt" | Tự bắt lỗi | VỮNG |
| "Đi xa hơn mức cơ bản / càng nhiều [X] liên quan càng tốt" | Công tắc nỗ lực | VỮNG (cơ chế) |
| "Hãy làm Y" (thay vì "đừng làm X") | Tuân thủ tốt hơn | VỮNG |
| Thẻ XML phân vùng nội dung | Cấu trúc (Claude) | VỮNG (Claude) |
| "Giải nhiều lần rồi lấy đáp án đa số" (self‑consistency) | Tăng độ chính xác lý luận | VỮNG |
| "Cho N phương án kèm xác suất/mức liều" (verbalized sampling) | Đa dạng ý tưởng mà vẫn đúng | VỮNG |

### 🟡 HẠNG B — thật nhưng tùy hoàn cảnh
| Câu | Lưu ý |
|---|---|
| "Hãy suy nghĩ từng bước" | Tuyệt cho model *không* reasoning; *thừa* với model biết tự suy nghĩ |
| `think` → `think hard` → `think harder` → `ultrathink` | Chỉ trong **Claude Code**; đang được thay bằng tham số `effort` |
| "Hãy ngắn gọn" | Đúng cho *câu trả lời cuối*; **sai** cho *lập luận* (cần chỗ để khai triển) |
| "Keep going until solved / hãy chủ động hành động" | Tăng *tự chủ*; cẩn thận với hành động khó đảo ngược |

### 🔴 HẠNG C — nổi tiếng nhưng yếu hơn lời đồn
| Câu | Vì sao dè chừng |
|---|---|
| "Hít một hơi thật sâu…" | Tối ưu cho *một* model (PaLM 2‑L); phần lớn lợi ích chỉ là "thêm suy luận từng bước" |
| "Việc này rất quan trọng với sự nghiệp tôi" (cảm xúc) | Nhỏ, giảm dần ở model mới; có thể đánh đổi *trung thực* lấy *nghe tự tin* |
| "Bạn là chuyên gia X" → để *chính xác hơn* | Bị nghiên cứu MMLU bác bỏ. (Vẫn tốt cho *giọng* và *đa dạng ý*) |
| "Tìm lỗi của chính bạn" (không có kiểm tra ngoài) | Cùng điểm mù; có khi sửa đúng thành sai |
| Prefill (mồi câu trả lời) | Đã **bỏ** trên Claude 4.6+ (lỗi 400); dùng Structured Outputs |

## B. Checklist trước khi gửi mệnh lệnh

Soi nhanh prompt của bạn qua 8 câu (rút gọn từ Ch.2–4):

- [ ] **Người lạ đọc có hiểu không?** (quy tắc vàng) — nếu họ rối, AI cũng rối.
- [ ] Đã nói rõ **ai dùng / để làm gì / định dạng / độ dài**?
- [ ] Đã cho **lý do "tại sao"** ở chỗ quan trọng?
- [ ] Đã nêu **cái CẦN làm**, không chỉ cấm?
- [ ] Đã định nghĩa **"thế nào là xong"** (tiêu chí đo được)?
- [ ] Việc lớn? → đã tách **Khám phá → Kế hoạch → Thực thi → Kiểm chứng**?
- [ ] Việc sáng tạo? → đã **ép nhiều phương án + cấm cái hiển nhiên + ràng buộc**, thay vì hô "sáng tạo đi"?
- [ ] Việc mang tính sự thật? → đã **cho phép nói "không biết"** + có **con mắt độc lập** kiểm (đưa *địa chỉ nguồn*, không đưa *tóm tắt*)?

## C. Thẻ chống "AI slop" (output chung chung)

Khi kết quả ra nhạt, dán một trong các "liều" sau:

- **Liệt kê rồi loại:** *"Trước tiên liệt kê 3 cách tiếp cận hiển nhiên nhất ai cũng nghĩ ra, rồi LOẠI chúng. Giờ mới đưa giải pháp."*
- **Ràng buộc cứng:** *"Đúng [hai nguyên liệu lạ] phải có; [ba thứ tầm thường] cấm dùng. Trong khuôn đó, làm tôi bất ngờ."*
- **Mốc bất ngờ:** *"Đưa ra thứ khiến một chuyên gia trong ngành phải bất ngờ — nhưng vẫn khả thi."*
- **Loại suy chéo ngành:** *"Mượn cách giải từ một lĩnh vực hoàn toàn khác [game / y khoa / tôn giáo]."*
- **Nhiều góc nhân cách:** *"Nhập vai 5 người rất khác nhau; mỗi người một ý mà chỉ họ mới nghĩ ra."*
- **(Code) khớp dự án:** *"Bám theo mẫu/helper/cách đặt tên đã có trong dự án; đừng sáng chế kiểu mới."*

Nhắc lại nguyên lý gốc (Ch.1): output nhạt = *thiếu chi tiết* + *lực kéo về cái quen*. Mọi liều trên đều là cách *bơm ràng buộc cụ thể* + *chặn đường về điểm hút*.

# Commanding AI
### The art of directing AI in natural language for exceptional results — that are still right

> *"Think of AI as an extremely smart, talented colleague who started today: it knows nothing about your context, your habits, or your standards. The more precisely you explain what you want, the better the result."*
> — Paraphrased from Anthropic's official prompt engineering documentation

---

## What this book is about

Most people use AI (Claude Code, Codex, ChatGPT, Gemini…) the same way: they type something vague, get back something "okay-ish," and shrug — "AI is pretty average, really." The output comes out **same-y, safe, mediocre, with nothing surprising about it** — what designers bluntly call *"AI slop."*

But a small group of users keeps pulling **fresh, sharp, beyond-expectation work — that is still accurate** — out of the very same AI. The difference isn't the model. It's **how they command it.**

This book answers two questions:

1. **How do you command AI to produce something NEW, original, "out-of-the-box" — ideas, research, products that are excellent yet still RIGHT, not an averaged-out copy of the internet?**
2. **Which short words and phrases — when you add them — genuinely multiply your results? And, just as important: which ones are merely overhyped folklore?**

This is not a book of "prompt tricks." It is a book of **principles**: why AI defaults to bland output, and how you use natural language to drag it out of that average zone.

---

## How this book DIFFERS from the "1,000 magic prompts" floating around

Most online "prompt secrets" are rumors copied from rumor, verified by no one. This book commits to the opposite:

- **Every technique is tied to evidence.** Most of it comes from Anthropic's and OpenAI's official documentation, or from scientific research (papers at ICLR, NeurIPS, EMNLP…).
- **It says plainly which ones are overhyped.** There's a whole chapter "debunking" famous incantations like *"take a deep breath"* or *"you are an expert"* — they are far weaker than the rumors claim, and the book shows you exactly why.
- **Wow = impressive AND true.** A technique that merely *sounds* good but has no data behind it does not get presented here as gospel.

### Our evidence-strength convention

Throughout the book, whenever I say a technique "works," I tag it so you can weigh it yourself:

| Tag | Means |
|------|----------|
| **[SOLID]** | Backed by controlled research or official vendor documentation, with clear numbers. |
| **[MODERATE]** | Good evidence (a preprint, a heavily-cited study) but not yet nailed down. |
| **[SITUATIONAL]** | Real, but heavily dependent on the model/context; don't treat it as magic. |
| **[OVERHYPED]** | Famous, but the evidence is far weaker than the rumor; use sparingly. |

One honest note up front: **the new "thinking" generation (reasoning models) now does on its own much of what the old incantations used to do.** That means more than a few famous 2022–2023 tricks are now *weaker or redundant*. The book will tell you exactly where.

---

## Which tools this book works for

This book is **tool-neutral**. The principles of commanding apply to any capable AI assistant. The examples are drawn from the two most popular "coding agents":

- **Claude Code** (Anthropic) — runs in your terminal, reads/edits files, runs commands.
- **Codex** (OpenAI, running on GPT‑5/5.1) — similar, with a CLI version and a cloud version.

You **do not need to know how to program** to read this book. Whenever there's a technical example, I always explain the idea behind it in plain language. What you're learning is *how to phrase a command*, not code syntax.

When a technique is specific to one tool (for example the `ultrathink` keyword, which only exists in Claude Code), I'll say so clearly.

**The promise:** by the time you finish this book, you'll pull results out of AI that most other users can't get from the very same AI — because you know how to *command*, not just *ask*.

**The warning:** no incantation replaces *knowing clearly what you want*. The most powerful technique in the entire book — and you'll see it repeated again and again — is not a magic word, but **specificity**. Everything else only amplifies it.

# Chapter 1 — Mindset: why AI defaults to bland output

> Before you learn a single technique, you need to understand the **enemy**. The enemy of excellent output is not a weak model. It's an invisible pull — one with a scientific name — that constantly drags the AI's answer back toward "the average of the internet." Understand this force, and you'll understand *why* every technique in this book works.

---

## 1.1. Three wrong mental models — and the right one

How you *picture* AI determines how you *talk* to it. Most users carry one of these three wrong models:

**Wrong model #1: "AI is an all-knowing machine."** You type a curt little phrase and expect it to read your mind. But AI does *not* know your context: which project, which audience, which constraints, which taste. When you don't say, it has to *guess* — and it always guesses toward the safest option, which is the blandest one.

**Wrong model #2: "AI is a smart search box."** You treat it like a Google that talks, so you ask short, lookup-style questions. AI is far more capable than that — it can plan, push back, create something new — but if you only query it like Google, you only get Google-sized answers back.

**Wrong model #3: "AI is a wizard who needs the right spell."** This is the trap for people who've read a few "prompt secrets." They believe in magic strings of words. There's a grain of truth here (Chapter 5), but believing in spells makes you skip the thing that actually matters: *conveying your intent clearly*.

**The RIGHT model — and this is the one Anthropic itself recommends:**

> Think of AI as **an extremely smart, talented colleague who started the job today** — knowing nothing yet about your company, your project, or your habits. *"The more precisely you explain what you want, the better the result."*
> — Anthropic prompt engineering documentation [SOLID]

A brilliant new hire: if you say "build a dashboard," they'll build a *generic, guesswork* dashboard. If you spell out who it's for, what it's for, what it should contain, and in what style — they'll shine. AI is exactly the same.

Anthropic even gives a **golden rule** for checking your own command:

> *"Show your prompt to a colleague with minimal context on the task and ask them to follow it. If they'd be confused, Claude will be too."* [SOLID]

---

## 1.2. The map is not the territory: your words ARE the blueprint

There's an uncomfortable truth: **AI does not do what you *want*. It does what you *say*.**

The gap between "what I picture in my head" and "what I type out" is exactly where every bad result is born. You picture a polished, refined product in your mind, but you only type three words. AI can't access that mental picture — all it has is the three words. And from three words, it reconstructs the *average* version of those three words.

So here is the number-one principle of the whole book:

> **Your command is the spec. The output is only ever as good as the spec.** Every detail you leave out is a detail the AI will fill in with a default value — and the default is always bland.

---

## 1.3. "Mode collapse": the scientific reason output stays same-y

This is the core of the chapter. Why is AI's default output *bland* in such a systematic way? It's not random. There's a real mechanism.

### The culprit: how AI is "taught to behave"

After a language model finishes learning from a giant corpus of text, it gets fine-tuned further using human feedback (a technique called **RLHF** — reinforcement learning from human feedback). This step makes the AI more polite, more helpful, safer. But it carries a measurable price:

> Kirk et al. (ICLR 2024) conclude that *"RLHF significantly reduces output diversity"* compared to the un-tuned model, creating **a trade-off between generalization and diversity.** [SOLID]
> — *Understanding the Effects of RLHF on LLM Generalisation and Diversity*, arXiv:2310.06452

The subtle part: diversity is choked **most strongly *within a single prompt*.** That is, when you ask one question, the model tends to give *the same "safe," middle-of-the-road answer* every time. This is exactly the feeling of "whatever I ask, I get something average."

### The deeper root: humans like the familiar

Why would training on human feedback squeeze out diversity? Because **the human raters prefer the familiar.**

> The "Verbalized Sampling" research (2025) identifies a **"typicality bias" in the preference data: annotators systematically favor familiar text** — a well-established effect from psychology. [SOLID]
> — arXiv:2510.01171

The chain reaction: raters reward the familiar → the AI learns "familiar = good" → the AI defaults to the most familiar thing, which is *the average of everything it has seen*. That's "mode collapse" — the model clusters around a few "attractors" and repeats them.

### OpenAI describes the same phenomenon, in blunter language

> *"When a prompt lacks detail, the model often falls back on high-frequency patterns from its training data."* The result is *"usually reasonable and usable, but tends to drift toward generic structure, weak visual hierarchy, and superficial design choices."* [SOLID]
> — OpenAI, frontend design guide for GPT‑5

Anthropic gives the result of this phenomenon a pointed name: **"AI slop"** — the cheap, mass-produced aesthetic AI generates when left unguided. In their official documentation, they acknowledge the model *"tends to converge toward generic, 'on distribution' outputs"* and must **actively push against** that tendency. [SOLID]

### Putting it together: one unified picture

```
Raters like the familiar  →  AI learns "familiar = good"  →  When you speak vaguely,
AI fills the gap with the most familiar thing  →  Output = the average of the internet  →  "same-y"
```

**This is good news.** Because if the blandness comes from *missing detail* and a *pull toward the familiar*, then the way to beat it is clear: **pump in specific detail, and actively push the model off the attractor.** All of Chapters 2 and 3 exist to do exactly those two things.

---

## 1.4. A surprising truth: AI *can* be more creative than the experts

Don't mistake "mode collapse" for "AI can't be creative." Quite the opposite.

> Stanford's large controlled study (Si, Yang & Hashimoto, 2024) with over 100 researchers found: **AI-generated ideas were judged *more novel* (p < 0.05) than ideas from human experts** — though slightly weaker on feasibility. [SOLID]
> — *Can LLMs Generate Novel Research Ideas?*, arXiv:2409.04109

So the creative potential is *already inside the model*. The problem isn't "AI has no good ideas" — it's that **the good ideas are buried under a layer of safe, default output**, and you have to know how to dig them out.

But that same study warns of a fatal trap — and this is the most important lesson of the chapter:

> Even though AI generates thousands of ideas, **diversity saturates very fast: most later ideas are just repeats of earlier ones.** [SOLID]

**The practical consequence (remember this one):**

> You do **not** get diversity by telling the AI "give me 50 more ideas." Hitting "regenerate" forever only yields near-duplicates. Novelty has to be **engineered by commanding differently**, not *sampled* for more. That is why Chapter 3 exists.

---

## 1.5. Try it now: feel the "bland" pull

See the phenomenon for yourself. Open any AI and try two commands:

**The bland command (default):**
```
Write me an intro paragraph for a blog post about coffee.
```

**The command that pulls away from the average:**
```
Write 5 intro paragraphs for a blog post about coffee, each from a COMPLETELY
different and surprising angle (e.g., the point of view of the coffee bean, of an
economist, of a chronic insomniac...). Then rate which one is the most daring while
still being good, and explain why.
```

You'll see the second command produces something *qualitatively different*. You haven't learned a single technique here yet — you've just applied the intuition from this chapter: **be specific + force multiple angles + force self-evaluation**. The rest of the book is doing this systematically and with evidence.

---

## In a nutshell — Chapter 1

- **The right mental model:** AI is a genius colleague who just started and doesn't know the context. The clearer you are, the better. *The golden rule:* if a stranger reading your prompt would be confused, so will the AI.
- **Your words ARE the blueprint.** AI does what you *say*, not what you *think*. Every omitted detail → AI fills it with a bland default.
- **"Same-y" has a scientific cause:** training AI on human feedback (RLHF) + the raters' typicality bias → "mode collapse" → output contracts toward the average. OpenAI: a vague prompt → "high-frequency patterns." Anthropic calls it *"AI slop."*
- **The good news:** because blandness comes from *missing detail* and a *pull toward the familiar*, the cure is *pump in specific detail* + *actively push the model off the attractor*.
- **AI can be more creative than the experts** (the Stanford study) — but diversity *saturates fast*. Novelty must be **engineered through commanding**, not sampled for.

→ Next: [Chapter 2 — The seven principles of a good command](02-principles.md), the foundational framework for pumping in the right detail.

# Chapter 2 — The seven principles of a good command

> This is the foundational framework. The seven principles below aren't "tips" — they're *ways of pumping in specific detail* to beat the "bland" pull described in Chapter 1. Nearly every advanced technique in later chapters is just a variation on these seven. Master this chapter and you're already ahead of most users.

A ranking note up front: among the seven, **#1 (Be specific) is king**. The other six are mostly different ways of *becoming more specific*. Research and official documentation agree: **specificity beats every incantation.**

---

## Principle 1 — Be specific and direct (the strongest lever)

If you remember only one thing from the entire book, remember this.

> Anthropic: *"Being specific about your desired output format and constraints can enhance results. If you want 'above and beyond' behavior, explicitly request it rather than relying on the model to infer it from a vague prompt."* [SOLID]

A classic example from Anthropic's documentation, showing how a single added sentence changes the whole quality level:

| ❌ Less effective | ✅ More effective |
|---|---|
| `Create an analytics dashboard.` | `Create an analytics dashboard. Include as many relevant features and interactions as possible. Go beyond the basics to create a fully-featured implementation.` |

To be "specific" systematically, answer five questions before you type:

1. **Who** will read/use this output? (the audience decides tone and depth)
2. **What for?** (the purpose decides content)
3. **What format?** (prose? a table? code? how long?)
4. **What constraints?** (what *must* be there, what's *forbidden*, which tools/libraries are allowed)
5. **What does good look like?** (the criteria — covered in depth in Principle 7)

> **Try it now.** Take a prompt you use often and rewrite it so it answers all 5 questions above. This one move alone usually lifts quality more than any "magic word."

---

## Principle 2 — Give context and the *reason why*

AI generalizes extremely well — if you let it understand *why*. A command with a motive is always carried out better than a bare one.

> Anthropic: *"Providing context or the motivation behind your instructions… helps Claude understand your goals and respond more on-target."* [SOLID]

| ❌ Bare | ✅ With a reason |
|---|---|
| `NEVER use ellipses.` | `Your response will be read aloud by a text-to-speech engine, so never use ellipses since the engine won't know how to pronounce them.` |

When it knows *why*, the AI infers a whole range of cases you forgot to list. You don't have to spell out every rule — you give it the *principle*, and it applies it for you.

---

## Principle 3 — Give examples (the most reliable steering)

Want the right format, the right voice, the right structure? Don't *describe* it — *demonstrate* it.

> Anthropic: *"Examples are one of the most reliable ways to steer Claude's output format, tone, and structure. A few well-crafted examples can dramatically improve accuracy and consistency."* [SOLID]

Good examples should be:
- **Relevant:** close to your real use case.
- **Diverse:** covering edge cases, varied enough that the AI doesn't latch onto the wrong pattern.
- **Structured:** clearly separated from the instructions (see Principle 4).

Anthropic recommends **3–5 examples** for best results.

> **An honest caveat [SITUATIONAL]:** with *reasoning models*, stuffing in too many "reasoning-pattern" examples sometimes *hurts* more than having none. Use examples mainly to **lock format and voice**, not to teach it *how to think* — it already does that itself.

---

## Principle 4 — Structure your command

When a prompt mixes instructions + context + examples + data, the AI can easily confuse which part is which. *Package* each type of content.

The most common and most powerful approach with Claude is **XML tags** — labels like `<instructions>...</instructions>`, `<context>...</context>`, `<example>...</example>`.

> Anthropic: *"XML tags help Claude parse complex prompts unambiguously… Wrapping each type of content in its own tag reduces misinterpretation."* [SOLID for Claude — Claude is trained on XML structure]

Two more structural tips, both from official docs:

- **When order matters, use a numbered list.** Provide instructions as sequential steps when the completeness/order of the steps is meaningful.
- **Put long data at the *top*.** With long documents (20k+ tokens), place the data *above* your question: per Anthropic, *"queries at the end can improve response quality by up to 30%"* with multi-document inputs. [SOLID]

> **Cross-tool note:** with GPT‑5/Codex, OpenAI recommends using Markdown *"only where semantically correct"* (code, lists, tables). The general principle is the same: **clear structure means the model guesses less.**

---

## Principle 5 — Assign a role, but for the right job (a misunderstood truth)

"You are an expert in X" is the most-recommended line on the internet. It *does* work — but **not for the reason everyone thinks.** This is one of the most costly misconceptions, so let's be blunt:

**Truth A — Assigning a role helps with *voice, style, behavior*:**
> Anthropic: *"Setting a role in the system prompt focuses Claude's behavior and tone for your use case. Even a single sentence makes a difference."* [SOLID — for voice/behavior]

**Truth B — Assigning a role is NOT reliable for boosting *accuracy*:**
> A large controlled study (Findings of EMNLP 2024) tested **162 personas × 9 models × 2,410 MMLU questions** and concluded: *"adding personas to the system prompt does not improve model performance"* versus none. Automatically picking the "best" persona was *"no better than random selection."* [SOLID]
> — arXiv:2311.10054

**The lesson [OVERHYPED for accuracy / SOLID for voice]:**

> Use a role to control **voice, audience, style, format** — *"write for a 12-year-old reader,"* *"in the voice of a demanding editor."* **Don't** expect *"you are an expert"* to make the answer *more accurate*. For accuracy, spend your tokens on **specificity and examples** (Principles 1 & 3), not on a title.

(In Chapter 3 we'll see that roles/personas *do* have another powerful use: **diversifying ideas**. But that's about diversity, not accuracy.)

---

## Principle 6 — Say what TO do, not just what to forbid

A small change in phrasing, a big and consistent effect.

> Anthropic, verbatim: *"Tell Claude what to do instead of what not to do — Instead of: 'Do not use markdown in your response' — Try: 'Your response should be composed of smoothly flowing prose paragraphs.'"* [SOLID]

The reason: a prohibition ("don't do X") leaves a gap — *so do what, then?* — and the AI fills it with a default again. An affirmative command ("do Y") is both more specific and more reliably followed.

Combine it with Principle 2 (give a reason) and it's stronger still: *"Write smoothly flowing prose, because this will be published in print, where bullet points look fragmented."*

> **Subtlety [SITUATIONAL]:** modern models *can* follow prohibitions better than they used to, so "don't do X" no longer backfires as hard as the old "don't think of a pink elephant" lore suggests. But "do Y" is still better because it's *more specific*.

---

## Principle 7 — Define "done" = give the AI a measurable target

This is the most overlooked principle, and the bridge to later chapters. **AI stops when the work *looks* done.** If you don't define "done," then "looks done" is the only signal it has — and you become the only one who catches the mistakes.

There are two parts:

**(a) Give clear success criteria.** Instead of letting the AI guess what "good" means, say it outright. It's especially powerful *paired with a way to self-check*:

| ❌ Vague | ✅ Criteria + self-check |
|---|---|
| `Write an email-validation function.` | `Write an email-validation function. Example test cases: a@example.com → true, "invalid" → false, a@.com → false. Run these cases after writing it.` |
| `Make the dashboard look better.` | `[paste design image] Build it to this design. Take a screenshot of the result and compare it to the original, list the differences, then fix them.` |

**(b) Request effort explicitly.** Recall Principle 1: if you want "above and beyond," you have to *ask*. The line *"Go beyond the basics, include as many relevant features as possible"* is an "effort switch" that official docs confirm makes output richer. [SOLID for the mechanism; see Chapter 5 on phrasing]

Principle 7 matters so much that Chapter 4 (keeping it true) and Chapter 6 (workflow) are built almost entirely around it.

---

## Combining the seven into one command

Here's the same request, written two ways. Feel the difference:

**Before (violating almost all of them):**
```
Write me a product intro.
```

**After (applying all seven):**
```
Context: I'm launching a note-taking app for medical students; the differentiator is
that it auto-generates revision flashcards from your notes. (P2: reason/audience)

Write the product intro for the landing page. (P1: specific task)

Requirements:
1. Voice: concise, confident, no marketing fluff — like a senior student giving you
   the inside tip. (P5: role for voice)
2. Structure: one headline, three short paragraphs, one call to action. (P4)
3. Write in smoothly flowing prose, no bullet points. (P6: say what to do)
4. Go beyond "listing features" — touch the real pain of exam revision. (P7b)

Definition of "done": a med student finishes reading and immediately gets the benefit
and wants to try it. Before you finalize, review your draft against this criterion and
fix it if it falls short. (P7a)
```

Same model, two different worlds of results.

---

## In a nutshell — Chapter 2

1. **Specific & direct** — the strongest lever; if you want "above and beyond," *ask for it outright*. Answer 5 questions: who / what for / format / constraints / what good looks like.
2. **Give the reason why** — AI generalizes from the motive; give it a principle and it applies it for you.
3. **Give examples (3–5, diverse)** — the most reliable steering for format/voice. Use them to lock *form*, not to teach *reasoning*.
4. **Structure it** — XML tags / clear sections; numbered steps when order matters; long data at the top.
5. **Assign a role for the right job** — strong for *voice/style*, **not** reliable for *accuracy* (the MMLU study refutes it). For accuracy: specificity + examples.
6. **Say what TO do** — "do Y" beats "don't do X" because it's more specific and easier to follow.
7. **Define "done"** — AI stops when it *looks* done; give measurable criteria + a way to self-check + an explicit request for effort.

→ Next: [Chapter 3 — Commanding for breakthrough ideas](03-breakthrough-ideas.md). The foundation is laid; now we learn to actively pull AI out of the average zone.

# Chapter 3 — Commanding for breakthrough ideas (before worrying about right vs. wrong)

> Chapter 1 named the *enemy* (mode collapse). Chapter 2 taught you to *pump in detail*. This chapter is the heart of the first promise: **how to command AI to produce something NEW, original, out-of-the-box** — not the average of the internet. (Keeping that new thing *true* is Chapter 4.)
>
> Every technique here serves one big idea, proven in Chapter 1: **novelty must be *engineered*, not *sampled*.** Hitting "regenerate" forever only yields near-duplicates.

Before we learn what works, let's cross off two things that **don't** — so you don't waste time.

---

## 3.0. Two traps: "turn up the temperature" and "be creative"

**Trap 1 — Cranking "temperature" to become creative. [OVERHYPED]**
Many people believe in a "creativity knob." Two independent studies say no:
> *"The effect of temperature on creativity is subtle and much weaker than the 'creativity parameter' claim suggests"* — temperature *"correlates weakly with novelty"* and *"moderately with incoherence"* (the higher it goes, the more rambling). [SOLID] (arXiv:2405.00492)
> Another study: temperature from 0.0 to 1.6 has *"no statistically significant effect"* on problem-solving ability. [SOLID] (arXiv:2402.05201)

Bottom line: turning up the temperature only trades coherence for a bit of noise. It does **not** unlock breakthrough ideas.

**Trap 2 — Telling it to "be creative / think outside the box." [OVERHYPED / weak]**
Adjectives don't produce creativity. As Chapter 1 showed, diversity comes from *the structure of the command*, not from a pep talk. "Be creative" means almost nothing to the model; it still falls back to the familiar attractor. *(This is an inference from the weight of the evidence, not a single study — but every sign points the same way: structure beats cheerleading.)*

Now for the things that **actually** work.

---

## 3.1. Technique #1: Deliberate sampling — "give me N options with their probabilities"

This is the single most powerful technique, and it's elegant because it attacks the *root* of mode collapse head-on.

Recall Chapter 1: the model is dragged toward **one** "most familiar" answer. So force it to *spread out the whole distribution* instead of drawing the single peak.

Instead of asking:
```
Write a story about a robot.
```
Ask:
```
Generate 5 stories about a robot, WITH the probability (the "typicality") you assign
to each one. I want to see the low-probability options too.
```

Asking the model to *name the distribution* pulls it out of the single mode. The technique's research name is **Verbalized Sampling**.

> Measured result: this technique *"increases diversity by 1.6–2.1× over standard prompting"* and *"improves human evaluation scores by 25.7%"* in creative writing. Most importantly: *"VS improves performance **without** sacrificing accuracy or safety"* — accuracy stays *"near 1.0 across all methods."* [SOLID]
> — *Verbalized Sampling*, arXiv:2510.01171

Three things to remember:
- **It preserves correctness** — this is "novel yet true" with the cleanest evidence of all.
- **The stronger the model, the more it benefits.**
- **The cost:** you generate a *set* of options instead of one, so it costs more tokens/time. Worth it when you're hunting for a breakthrough.

> **Try it now.** Any time you want ideas, don't ask for one. Ask: *"Give me 7 approaches, from the safest to the most daring. For each, write one line on why it might be wrong."*

---

## 3.2. Technique #2: Step-by-step reasoning + "ordinary" personas — the duo that beats humans

A Columbia group measured *why* AI ideas are less diverse than those of a *group* of people, and found two barriers — and how to break each:

> *"Ideas from independent human samples are more diverse than ideas from independent AI samples."* Two barriers: (1) **individual fixation** — *"early outputs constrain later ideas"* (AI gets "stuck" on its first idea, like people do); (2) **collective aggregation** — AI *"merges knowledge into one unified distribution"* instead of fragmenting like different human groups. [MODERATE]
> — arXiv:2602.20408

How to break it, per the study itself:
- **Step-by-step reasoning (chain-of-thought)** *"reduces fixation by encouraging structured reasoning."*
- **Ordinary personas** *"act as a diverse-sampling cue, anchoring idea generation in different regions of the semantic space."*
- **Combine the two for maximum diversity — *surpassing even humans*.**

This is the *real* use of roles/personas that Chapter 2 promised to revisit: **not to be more accurate, but to *spread out* the idea space.**

```
Brainstorm ways to promote a secondhand bookshop. Step into the shoes of 6 VERY
different people in turn (a homemaker, a startup founder, a retired librarian, a
rapper, an economist, a 10-year-old). For each one, think step by step the way THEY
would think, then offer an idea only that person would come up with.
```

Note: use **diverse and relevant** personas, not meaningless demographic ones (those are useless or counterproductive — Chapter 2). The goal is to *spread the perspectives*, not to slap on a label.

---

## 3.3. Technique #3: Step back to first principles (Step-Back)

Breakthrough ideas often come from *lifting the problem up one level of abstraction*, then looking down from there. While stuck at the surface, the model only pattern-matches the familiar.

> The "Take a Step Back" technique (Google DeepMind, ICLR 2024): ask the model to *first extract the high-level concept/principle* behind the question, *then* solve it. It raised scores on reasoning benchmarks: Physics +7%, Chemistry +11%, some complex QA tasks +27%. [SOLID]
> — arXiv:2310.06117

For creativity, "stepping back" opens up cross-domain recombination: once the problem is lifted into a principle, the model can borrow solutions from another field.

```
Before proposing features for a ride-hailing app, step back: what is the CORE problem
here (in principle — trust? waiting? information asymmetry?). State that principle,
then find how OTHER industries (aviation, hospitals, online dating) have solved that
same principle, and borrow the best solution over here.
```

---

## 3.4. Technique #4: Cross-domain analogy — "what would surprise an expert"

Closely related to Step-Back: force the model to *generate its own examples/analogies* from distant fields before it answers.

> The "Analogical Reasoning" technique (Google DeepMind/Stanford, ICLR 2024): having the model generate its own relevant examples before solving *"outperforms zero-shot chain-of-thought and manual few-shot"* on several reasoning tasks. [MODERATE→SOLID on direction; magnitude figure not extracted]
> — arXiv:2310.01714

A working command for hunting the surprising:
```
Propose a business model for a coffee shop. But first, think: which proposals would an
industry expert find OBVIOUS and boring? List 3 of those obvious ones and RULE them
out. Then find an analogy from a completely different field (online games, religion, a
gym) to create a model that would surprise even a coffee-shop expert — yet is still
feasible.
```

Two small but powerful moves hide in there: **(a) list the obvious then forbid it** (forcing the model off the attractor), and **(b) set the bar at "would surprise an expert"** (raising the bar above merely "correct").

---

## 3.5. Technique #5: The constraint paradox — the tighter the limits, the more creative

A common false intuition: "to make AI creative, give it freedom." The reality is the opposite. **Specific constraints are what force the model off its default.** This is a finding where OpenAI and Anthropic converge.

OpenAI, on interface design, gives *hard rules* rather than letting the model run free — and that very limitation produces a distinctive aesthetic:
> *"Define constraints up front: one H1, no more than six items, at most two typefaces, one accent color, one call-to-action button."* And: *"Don't default to flat solid backgrounds; use gradients, imagery, subtle patterns to create atmosphere."* [SOLID]

Anthropic likewise bans "bland default" choices outright to force the model to create (in its official frontend-design guidance):
> *"Avoid generic fonts like Arial and Inter; opt instead for distinctive choices… Interpret creatively and make unexpected choices… it is critical that you think outside the box!"* [SOLID — source anchored in `research/00-anthropic-direct.md` §A.1]

The general principle, applicable to *every* kind of creativity, not just interfaces:

> **Don't say "be creative." *Forbid the mundane and impose specific constraints*.** "You may not use [the three obvious ideas]. You must use exactly [these two unusual ingredients]. Within that frame, surprise me."

Constraints do two things: they block the road back to the attractor, and they force the model to recombine in a new way.

---

## 3.6. The assembly process: Diverge → Converge

The techniques above are *divergent* (expanding the idea space). But a breakthrough = a new idea **rigorously selected**. A two-beat process:

**Beat 1 — Diverge (push out far):** use 3.1–3.5 to get many genuinely different options. *Keep this beat separate.* Don't let the model self-censor while generating — tell it "don't evaluate yet, just throw out ideas."

**Beat 2 — Converge (tighten):** only now do you critique and choose.
> The "Self-Refine" technique (NeurIPS 2023): the model generates → self-critiques → revises → repeats, improving quality by *"~20% absolute"* across 7 task types. [SOLID]
> — arXiv:2303.17651

```
Step 1: Give me 8 brand-name ideas, as different from each other as possible, from
safe to wild. Do NOT evaluate yet.
Step 2: Now play a demanding judge. Score each idea on 3 criteria (memorable, original,
not overlapping with competitors). Cut the 5 weakest.
Step 3: Take the 3 survivors, sharpen each one a notch, then pick 1 and defend the choice.
```

> **A critically important warning [SOLID]:** "self-critique" makes output *better*, but **a model grading its own work is NOT independent verification.** It often misses its own mistakes — and may even "fix" a correct answer into a wrong one. Self-Refine is an *editing* tool, not a *fact-checking* tool. Keeping new ideas *true* requires an independent layer of checking — all of Chapter 4.

---

## 3.7. Applied to coding agents: fighting "generic code"

With Claude Code / Codex, "mode collapse" shows up as **boilerplate code, bland general-purpose solutions that don't fit your project**. Two remedies, one line from each vendor:

- **Codex/OpenAI:** *"Follow the conventions of the codebase: match existing patterns, helpers, naming, and formatting."* — turns "generically general" into "fits your house exactly."
- **Claude/Anthropic:** point it directly at existing patterns — *"Look at how existing widgets are implemented on the home page to understand the patterns. HotDogWidget.php is a good example. Follow that pattern to build…"*

In other words: for coding, "out-of-the-box" usually is **not** "invent something exotic," but **fit deeply into the project's context** + solve the *root* of the problem. We'll dig into this in Chapters 6–7.

---

## In a nutshell — Chapter 3

- **Skip the two traps:** turning up the *temperature* [OVERHYPED] and chanting *"be creative"* [weak]. Creativity comes from *command structure*, not from a knob or an adjective.
- **#1 Deliberate sampling** *("give me N options with their probabilities/daring level")* — the strongest, raises diversity 1.6–2.1×, **preserves accuracy**. [SOLID]
- **#2 Step-by-step reasoning + diverse personas** — the duo for diversity *beyond even humans*. Use roles to *spread perspectives*, not for accuracy. [MODERATE]
- **#3 Step back to principles** & **#4 Cross-domain analogy** — lift the problem to an abstract level for cross-field recombination; set the bar at "would surprise an expert." [SOLID/MODERATE]
- **#5 The constraint paradox** — don't give freedom; *forbid the mundane + impose specific constraints*. OpenAI and Anthropic agree. [SOLID]
- **The Diverge → Converge process:** throw out ideas first (no evaluating), tighten after (critique + choose, ~20% quality from Self-Refine). **But self-grading ≠ independent verification.** [SOLID]

→ Next: [Chapter 4 — Novel yet true](04-novel-yet-true.md). We know how to create the new; now we learn to keep it from becoming *made-up*.

# Chapter 4 — Novel yet true: keeping AI from making things up

> Chapter 3 taught you to pull AI out of its safe zone for something new. But there's an uncomfortable truth you have to face: **the very mechanism that produces creativity also produces hallucination (making things up).** Push the model "out far" with no tether, and you'll get back something *that sounds great but is wrong*. This chapter is about the tether — how to be "impressive AND true," not "impressive but fabricated."

---

## 4.1. Why "novel" and "made-up" are two sides of one coin

This isn't an empty moral warning. It has a basis:

> A synthesis across several studies: *"the very mechanisms that cause hallucination also drive a model's creativity and originality; eliminating hallucination entirely can stifle this creative potential."* Conversely, over-tightening grounding leads to *"overly cautious generation, reducing the ability to produce diverse output."* [MODERATE]

The practical consequence: you do **not** want to "turn off creativity to stop the fabrication." You want to **let the model fly far while generating ideas, then pull it back to reality when nailing down facts.** That's why the Diverge → Converge process from Chapter 3 must be followed here by a layer of *grounding + verification*.

One concrete piece of good news: not every "anti-fabrication" method kills creativity.
> A study comparing hallucination-reduction techniques: *"Chain-of-Verification (CoVe) increases divergent thinking, DoLa suppresses it, RAG is roughly neutral"* — *"reducing hallucination does not have to mean reducing creativity,"* it depends on the method. [MODERATE]
> — arXiv:2512.11509

The lesson: choose your grounding method by your goal. **Self-verification (CoVe) raises both correctness and creativity** — that's the technique we'll use most.

---

## 4.2. Four grounding remedies (for the "facts" part of the output)

Here are four phrases/instructions, from official docs, all cheap and high-impact.

### Remedy 1 — Let the AI say "I don't know"

The cheapest, most effective one, that almost no one uses.

> Anthropic, verbatim: *"Allow Claude to say 'I don't know': Explicitly give Claude permission to admit uncertainty. This simple technique can **drastically reduce** false information."* [SOLID]
> — *Reduce hallucinations* documentation, Anthropic

Why does it work? By default, the model feels "obligated to answer" → when it doesn't know, it *makes something up* to fill the gap. A single line permitting retreat breaks that pressure.

```
If you're not sure or don't have enough information, say plainly "I'm not sure"
instead of guessing. I value an honest "I don't know" more than a nice-sounding
answer that might be wrong.
```

### Remedy 2 — "Quote first, conclude after" (grounding by citation)

When working on a long document, force the model to *quote the relevant part verbatim* *first*, then reason on top of it.

> Anthropic: *"Use direct quotes for factual grounding"* — extract verbatim quotes from the long document first; *"verify with citations… If it can't find a supporting quote, it must retract the claim."* [SOLID]

The mechanism: quoting forces the answer to *stick* to the real text, cutting off the model's route to "improvise" amid a sea of content.

### Remedy 3 — "Investigate before you answer" (for coding agents)

With Claude Code / Codex, hallucination often happens when the model *pronounces on code it hasn't opened and read*. The remedy, verbatim from Anthropic:

> *"Never speculate about code you have not opened. If the user references a specific file, you MUST read that file before answering. Investigate and read the relevant files BEFORE answering questions about the codebase."* [SOLID]

Applied beyond coding: for *any* question with a verifiable source (a file, a link, data), tell the AI to *go fetch the real source* rather than answering from memory.

### Remedy 4 — Self-check against a specific criterion (light CoVe)

> Anthropic: *"Ask Claude to self-check: append something like 'Before you finish, verify your answer against [criteria].' This catches errors reliably, especially for code and math."* [SOLID]

The key is the phrase **"verify against *[specific criteria]*"** — not a generic "double-check it." The more specific the criterion, the more force the self-check has.

---

## 4.3. The limits of self-checking: why you need an *independent* eye

This is the most subtle point of the chapter, and where most "AI workflows" online go wrong.

The four remedies above help the model *get better on its own*. But there's a glass ceiling: **a model grading its own work is not independent verification.**

> Stanford's study on AI ideas names *"the failure of LLM self-evaluation"* outright as an open problem. Self-Refine improves *quality*, but a new claim the model *grades itself* is **not independently verified**. [SOLID]

Why? Same model, same "blind spots." Whatever error it can't see while *writing*, it also can't see while *re-reading itself* — it's the same brain. It can confidently confirm something false.

**The foundational principle:** *the one who created a thing cannot be its final verifier.* For real verification, you need a **fresh eye** — one that doesn't share the writer's blind spots.

How to realize this with AI (same idea, three levels from cheap to solid):

**(a) A new "clean context."** Open a new session/window that *hasn't seen* the output being produced, give it *the result + the criteria*, and tell it to find errors.
> Anthropic calls this the strongest move in parallel work: *"A fresh context improves code review because Claude won't be biased toward code it just wrote."* [SOLID]

**(b) A "sub-assistant" (subagent) playing the critic.** In Claude Code:
> *"Before treating a task as done, have a subagent review the diff in a fresh context and report gaps."* The reviewer *"sees only the diff and the criteria you give it, not the reasoning that produced the change, so it evaluates the result on its own merits."* [SOLID]

Codex has a similar move: use a separate run to review.

**(c) An objective check (the strongest, use whenever possible).** Don't ask for an opinion — *run reality*: run the test suite, reopen the source and compare verbatim, recompute the number, take a screenshot and compare. A test that returns "pass/fail" has no blind spot; it's *reality*, not opinion.

> **Important — give the address, not a summary.** When you ask the independent eye to check, let it *go read the real source/result itself* (just tell it **where**), don't hand it *your summary of the result*. If you give it a summary you wrote, you've quietly injected your own blind spot into the "checker" — and it's no longer independent.

---

## 4.4. Warning: some "power phrases" trade *true* for *impressive-sounding*

Some tricks that raise the output's "confidence" actually *lower* its truthfulness. The clearest example is emotional pressure (the "this is extremely important to my career" kind — dissected in Chapter 5):

> Emotional pressure can push the model toward *confident-sounding output* instead of *correct output*. Avoid these tricks where accuracy and honesty are paramount. [SITUATIONAL]

The rule: on **fact-bearing** work (carrying real-world facts with real consequences — numbers, advice, research conclusions), prioritize the grounding remedies in 4.2 and the independent eye in 4.3, and *be wary* of any trick that merely makes output "sound more certain."

---

## 4.5. The "Novel yet true" process — the complete assembly

Combine Chapters 3 + 4 into a four-beat pipeline. (This is a *synthesis* of the cited sources, not a single study — stated so you know.)

```
1. DIVERGE   → Use Chapter 3 techniques (N options + probabilities, personas, analogy,
               constraints) to escape mode collapse. "Don't evaluate yet."     [SOLID]

2. CONVERGE  → Generate many, then self-critique & select (Self-Refine ~20%).
               Treat this as EDITING, not verification.                        [SOLID]

3. GROUNDING → For the remaining factual claims: make the model read/quote the
               real source, allow "I don't know," self-check against criteria (CoVe). [SOLID/MODERATE]

4. INDEPENDENT → A FRESH eye (new session / critic subagent / run real tests),
   CHECK         going to read the source itself — NOT reading your summary.    [SOLID]
```

The first three beats make the output *both new and tight*. Beat 4 is what lets you *dare to trust* it. Drop beat 4, and you only have something "nice-sounding" — exactly the trap the whole book wants you to avoid.

> **Try it now (a 2-pass prompt for fact-bearing work).**
> *Pass 1:* "Propose 3 directions for [problem], each with a one-line 'weakest point that could be wrong.' For every number or factual claim, mark it [needs check] if you're not sure."
> *Pass 2 (new session/agent):* "Here is a proposal [paste]. Don't trust it. Go check each claim marked [needs check] yourself from the original source, and report which ones don't hold up."

---

## In a nutshell — Chapter 4

- **Novel and made-up share one mechanism.** Don't "turn off creativity to stop fabrication"; *let it fly far while generating ideas, pull it back to reality when nailing down facts*.
- **Four grounding remedies [SOLID]:** (1) permit *"I don't know"*; (2) *quote the source first, conclude after*; (3) *"investigate/read before you answer"*; (4) *self-check against a specific criterion* (CoVe — also helps preserve creativity).
- **Self-checking has a glass ceiling:** a model grading its own work is **not** independent verification (same blind spots). *Creator ≠ verifier.*
- **The independent eye, three levels:** a new clean session/context → a critic subagent → an *objective check* (run tests, compare against the source). **Give the source's address, not your summary** — otherwise the "checker" is just a puppet repeating your blind spots.
- **Beware "impressive-sounding" tricks:** some power phrases (emotional pressure) trade *true* for *confident*. Fact-bearing work → prioritize grounding + independent checking.

→ Next: [Chapter 5 — Power phrases](05-power-phrases.md): an honest ranking of the incantations, which are real and which are a con.

# Chapter 5 — Power phrases: short lines, big effect (and which ones are a con)

> This is the chapter you've been waiting for: the **short words and phrases** that genuinely lift results when you add them to a prompt. But it's also the *debunking* chapter. The "magic prompts" market is full of rumors copied from rumor, verified by no one. I'll rank them by real evidence, and say plainly which are gold and which are fool's gold.
>
> **One truth that frames the whole chapter:** *the more a model can think for itself, the more the old incantations lose their effect.* Many famous 2022–2023 tricks were born on models that *couldn't yet reason*. The new "reasoning" generation already does chain-of-thought internally — so many incantations are now *redundant, or even slightly harmful*. I'll mark exactly where.

---

## 5.1. The quick ranking (read this first)

| Tier | Phrase / technique | Verdict |
|------|----------------|-----------|
| **A — worth using, trustworthy** | Specificity & structure · examples (few-shot) to *lock format* · output-format anchoring · *"allow 'I don't know'"* + quote the source · say what TO do · the effort switch (*"go beyond the basics"*) · XML tags (Claude) · self-consistency (when you can afford multiple runs) · self-check *with a specific criterion* | **SOLID** |
| **B — real but conditional** | *"Let's think step by step"* (great for models that *can't* reason; redundant on reasoning models) · the *think→ultrathink* ladder (Claude Code only; being replaced by `effort`) · *"be concise"* (right for the *answer*, wrong for the *reasoning*) | **SITUATIONAL / obsolete on strong models** |
| **C — famous but weaker than the rumor** | *"Take a deep breath…"* (true for one specific model only) · emotional pressure (*"important to my career"*) · *"you are an expert"* to boost *accuracy* · self-correction with no external check · prefill (removed on Claude 4.6+) | **OVERHYPED / obsolete** |

One bottom line: **the durable winners are *specificity, examples, grounding, and explicitly requesting verification/effort*. The viral one-liners are real-but-small, model-dependent, and mostly "eaten" by models that can think for themselves.**

Now let's go through each.

---

## 5.2. TIER A — the lines genuinely worth adding

### "Go beyond the basics / include as many as possible" — the effort switch
The best line against lazy output. We met it in Chapter 2:
> Anthropic, verbatim template: *"…Include as many relevant features and interactions as possible. Go beyond the basics to create a fully-featured implementation."* The principle: *"If you want 'above and beyond' behavior, explicitly request it."* [SOLID for the mechanism]

The meme line *"Don't hold back. Give it your all"* is **a variant** of this mechanism — the *mechanism itself* (explicitly requesting maximum effort) is real and officially recommended. But don't worship that exact *string of words* like a charm; the documented form is *"go beyond the basics / as many features as possible."* [SOLID mechanism / OVERHYPED the specific wording]

### "Allow 'I don't know'" — anti-fabrication
> *"This simple technique can drastically reduce false information."* — Anthropic. [SOLID] (Details in Chapter 4.)

### Self-check *with a specific criterion*
> *"Before you finish, verify your answer against [criteria]. This catches errors reliably, especially for code and math."* — Anthropic. [SOLID] The key: there must be a *[specific criterion]*, not "double-check it."

### Self-consistency — "solve it several times, take the majority answer"
One of the most robust techniques in the whole field, when you can afford the cost of multiple runs:
> Self-Consistency (ICLR 2023): versus standard chain-of-thought, gains of **GSM8K +17.9%, SVAMP +11.0%, AQuA +12.2%.** [SOLID]
> — arXiv:2203.11171

Why it's stronger than "self-correction": the vote is an *objective aggregation* of several independent solutions, not the model pronouncing on itself.

### Examples (few-shot) — to lock *form*
> *"Examples are one of the most reliable ways to steer format, tone, and structure."* — Anthropic, recommending 3–5 examples. [SOLID]
> Note [SITUATIONAL]: with reasoning models, *many* "reasoning-pattern" examples sometimes *hurt*. Use examples to lock *format*, not to teach *thinking*.

### XML tags (Claude specifically)
> *"XML tags help Claude parse complex prompts unambiguously… reduces misinterpretation."* [SOLID for Claude] — Claude is trained on XML structure, so this is a cheap, reliable move *with Claude* (not necessarily with other models).

### "Do Y" instead of "don't do X"
> *"Tell Claude what to do instead of what not to do."* [SOLID] (Chapter 2.)

---

## 5.3. TIER B — real, but it depends

### "Let's think step by step"
The original incantation behind all incantations. The historical evidence is very strong:
> Kojima et al. (NeurIPS 2022): just adding this line (no examples), on the *text-davinci-002* model: MultiArith **17.7% → 78.7%**, GSM8K **10.4% → 40.7%.** [SOLID historically]
> — arXiv:2205.11916

**But [obsolete on strong models]:** modern reasoning models (Claude with extended/adaptive thinking, OpenAI's o-series, Gemini thinking) *already* reason step by step internally. Adding this line to them is nearly *redundant*. Keep it for light models or ones with thinking off; drop the illusion that it's a charm for frontier models.

> **A subtle note for Claude [SITUATIONAL]:** Anthropic's docs state that *when extended thinking is off*, Claude Opus 4.5 is *"particularly sensitive to the word 'think' and its variants"* — sometimes you should swap in *"consider," "evaluate," "reason through"* to avoid triggering it unintentionally.

### The "think → ultrathink" ladder (Claude Code only)
One of the few "magic words" that's *actually real* — but only in one specific environment:
> Claude Code documentation: *"These phrases map directly to increasing thinking-budget levels: 'think' < 'think hard' < 'think harder' < 'ultrathink'. Each level allocates more thinking budget."* [SOLID but environment-specific]

An important freshness warning: this is a *Claude Code* convenience, **not** a universal magic word in chat/API. Moreover, the newer models (Opus/Sonnet 4.6+) have moved to **adaptive thinking** controlled by the `effort` parameter, and manual `budget_tokens` is **deprecated**. Understand this ladder as a *handy shortcut inside Claude Code*, not a stable cross-model contract.

> **Cross-tool:** on the OpenAI side, the corresponding "thinking knob" is `reasoning_effort` (`none`/`minimal`/`low`/`medium`/`high`/`xhigh`) plus a separate `verbosity` parameter. Same *idea* (controlling reasoning depth), but *not* word-for-word compatible — don't carry one side's phrasing straight over to the other.

### "Be concise"
> The "Concise Chain-of-Thought" study (arXiv:2401.05618): conciseness mainly *saves tokens/cost*; it can *lower accuracy on complex tasks* because the model needs room to work things out. [SITUATIONAL]

The honest rule: ask for a concise **final answer**, don't ask for concise **reasoning**. On the new reasoning models, OpenAI even warns that GPT‑5.1 is sometimes *too* terse, so you have to state your desired level of detail *in both directions*.

### "Keep going until solved / be proactive" — the autonomy switch
The Codex/GPT‑5 line for turning a hesitant model into one that runs to completion:
> OpenAI, `<persistence>` block: *"keep going until the user's request is completely resolved before ending your turn… Don't ask the user to confirm or clarify assumptions — choose the most reasonable assumption, proceed, and note it afterward."* And: *"Be extremely biased toward action."* [SOLID for the GPT‑5/Codex family]

**SITUATIONAL by tool and intent:** this line *increases* autonomy — good when you want the AI to run on its own, but *dangerous* when you want to be asked before hard-to-reverse actions. With Claude there's a symmetric pair (`<default_to_action>` to be more proactive, or a block requesting confirmation before destructive actions) — pick based on whether you're sitting next to it or away.

---

## 5.4. TIER C — famous but weaker than the rumor (use sparingly)

### "Take a deep breath and work on this step by step"
The most viral line. The truth is far less romantic:
> This line was discovered by an *algorithm* (OPRO, Google DeepMind) as the highest-scoring prompt **for the PaLM 2-L model specifically**. GSM8K: baseline 34.0% → "step by step" 71.8% → "take a deep breath…" **80.2%.** [SOLID for PaLM 2-L]
> — arXiv:2309.03409

**Why [OVERHYPED]:** (a) *most* of the gain comes from *adding step-by-step reasoning* (34→71.8); the "deep breath" line only adds ~8 points; (b) the paper itself says **the best prompt differs by model** — GPT‑3.5, GPT‑4, PaLM 2 each win with a *different* line. "Take a deep breath" is optimal *for one model*, not a universal charm. The real lesson is *"machine-optimized prompts beat hand-written ones,"* not *"this line makes every AI smarter."*

### Emotional pressure — EmotionPrompt ("this is very important to my career")
> The EmotionPrompt paper (2023) reports improvements on *2023* models (Flan-T5, Vicuna, BLOOM…); a 106-person study found *"~10.9% average improvement."* [SITUATIONAL]
> — arXiv:2307.11760

**Why [OVERHYPED, fading]:** the effect is *real* on older models but *modest and model-dependent*; it *shrinks* on newer, better-aligned models. The viral telling ("threaten the AI's job and it tries harder") inflates a real-but-small effect. **And recall the Chapter 4 warning:** emotional pressure can trade *truthfulness* for *confident-sounding* — avoid it on work that needs accuracy.

### "You are an expert in X" — to boost *accuracy*
> The 162-personas × 9-models × 2,410-MMLU-questions study: *"adding personas does not improve performance."* [SOLID]
> — arXiv:2311.10054

**[OVERHYPED for accuracy / SOLID for voice].** Use a role for *voice, style, audience* (Chapter 2) and for *idea diversity* (Chapter 3) — **not** in the hope of a more correct answer.

### Self-correction with no external check
"Find the errors in your answer and fix them" — it *does* help, but it's weak without an external signal (a test, a source, or several independent samples). The model often can't see its own errors, and sometimes "fixes" right into wrong. [SITUATIONAL] (Chapter 4.) Don't advertise a self-correction loop as a guarantee of correctness.

### Prefill (seeding the start of the answer) — obsolete on new Claude
Once a strong move for forcing a format/JSON. But **from Claude 4.6 onward, prefilling the last turn is no longer supported** (returns a 400 error); replace it with *Structured Outputs* / a tool enum / direct instructions. [obsolete on new models] Still works on older ones.

---

## 5.5. How to use power phrases without fooling yourself

Four rules so you don't become a victim of the rumor:

1. **Default to suspicion of one-liners.** If a "secret" comes with no evidence and doesn't say *which model* it's for, treat it as unproven.
2. **Ask: does my model think for itself?** If yes (a reasoning model), skip most of Tiers B/C — they were born for models that *don't* think for themselves.
3. **Prioritize Tier A.** Specificity, examples, grounding, requesting verification/effort — this is where your tokens earn a real return.
4. **Measure on your own work.** Every power phrase is a hypothesis. Try it with/without on your actual task and look at the result; don't trust it just because it's "famous."

---

## In a nutshell — Chapter 5

- **The durable winners (Tier A):** specificity & structure, examples to *lock format*, *"allow 'I don't know'"* + quote the source, *self-check with a specific criterion*, *"go beyond the basics,"* XML (Claude), self-consistency, *"do Y."*
- **Real-but-conditional (Tier B):** *"think step by step"* (redundant on reasoning models), the *think→ultrathink* ladder (Claude Code only, being replaced by `effort`), *"be concise"* (for the answer, not the reasoning), *"keep going"* (raises autonomy — double-edged).
- **Overhyped (Tier C):** *"take a deep breath"* (optimized for *one* model), emotional pressure (small, fading, trades truthfulness), *"you are an expert"* for accuracy (refuted by the MMLU study), self-correction with no external check, prefill (removed on new Claude).
- **The big frame:** *the more a model can think for itself, the more useless the old incantations.* Invest in Tier A, measure on real work, distrust sourceless one-liners.

→ Next: [Chapter 6 — Workflow & context](06-workflow-and-context.md): where 80% of the result is actually decided, far beyond any incantation.
