# Chapter 6 — Workflow & context: where 80% of the result is decided

> Here's a humble truth that everyone chasing "incantations" overlooks: **for genuinely large tasks, *how you stage the workflow* and *how you manage the context* decide the result more than any magic word.** A perfect prompt inside a chaotic context still produces garbage. This chapter is about the foundational skill experts use and beginners don't even know exists.

---

## 6.1. The root constraint: the context window fills up, and performance drops with it

Every AI assistant has a "context window" — the working memory holding the entire conversation: every message, every file it reads, every command output. It **fills up fast**, and here's what few people realize:

> Anthropic: *"LLM performance degrades as context fills. When the context window is getting full, Claude may start 'forgetting' earlier instructions or making more mistakes. The context window is the most important resource to manage."* [SOLID]

The foundational consequence for the whole chapter:

> **Context is a resource, not an infinite container.** Every irrelevant thing you let in — a meandering exploration, a pile of unrelated files, a chain of back-and-forth corrections — *dilutes* the AI's attention and *drags down* quality. Skilled users keep their context *clean and signal-dense*.

Every principle below flows from this.

---

## 6.2. The four-beat workflow: Explore → Plan → Execute → Verify

This is the framework Anthropic recommends for any non-trivial task. Why it exists:
> *"Letting AI jump straight to work can produce something that solves the wrong problem. Separate exploration from execution."* [SOLID]

**Beat 1 — Explore (do nothing yet).** Tell the AI to *read and understand* first, with editing *not* allowed.
```
Read [the relevant parts] and understand how everything works. Do NOT change anything
yet; just answer my questions and explain.
```
In Claude Code there's "plan mode," which hard-locks read-only for this beat.

**Beat 2 — Plan (still not doing it).** Make the AI write out a detailed plan for you to *approve first*.
```
I want [goal]. What needs to change? What's the processing flow? Make a detailed PLAN.
Don't write code yet.
```
This is the cheapest intervention point: fixing one line in a plan is easier than fixing 200 lines of wrong output. *"Time spent making the spec precise pays off more than time spent watching it execute."*

**Beat 3 — Execute.** Only now do you let it work, checking against the plan.

**Beat 4 — Verify.** (Chapter 4) An independent eye / running real tests.

> **When to SKIP the plan?** Anthropic says it plainly: *"If you could describe the change in one sentence, skip the planning."* Planning has a cost; it's worth it when the task is *vague about the approach*, *touches many parts*, or *you're unfamiliar with the area*. Don't ritualize small chores.

---

## 6.3. Let the AI interview *you* first (an underrated move)

For big tasks you haven't fully thought through, don't try to write the perfect spec right away. Reverse the roles: make the AI extract the information from you.

> Anthropic, verbatim template: *"I want to build [brief description]. Interview me in detail. Ask about implementation, UX, edge cases, concerns, tradeoffs. Don't ask obvious questions, dig into the hard parts I might not have considered. Keep interviewing until we've covered everything, then write a complete spec to a file."* [SOLID]

Why it's powerful: the AI asks exactly the things you *didn't know you needed to decide*. Once you have the spec, open a **fresh, clean session** to execute — a new context focused entirely on doing the work.

---

## 6.4. Five habits for keeping context clean

This is the practical part that veteran users do by reflex:

1. **Clear context between unrelated tasks.** Switching from task A to a completely different task B? Reset (in Claude Code: `/clear`). *"A clean session with a better prompt almost always beats a long session full of trial-and-error."*

2. **Correct early, correct decisively.** See the AI veering off? Stop it now, don't let it run far. *"If you've corrected the AI more than twice on the same thing, the context is polluted with failed approaches — reset and write a better prompt."*

3. **Delegate investigation to a 'sub-assistant' (subagent).** When you need to dig through many documents, don't let that pile spill into your main context.
   > *"Use subagents to investigate X"* — they read in a *separate* context and report back only a summary, keeping your main conversation clean. [SOLID]

   This is also the technical reason *independent verification* in Chapter 4 is feasible: a subagent runs in its own context = a fresh eye.

4. **Don't "investigate" without limits.** Tell the AI to "look into X" with no boundary → it reads hundreds of files and devours the context. *Scope it narrowly*, or push the digging to a subagent. OpenAI even puts a *hard budget* on this: their "get enough context fast" block says *"an absolute maximum of 2 tool calls"* and *"bias toward acting over searching more."*

5. **Don't let context become a 'trash bin'.** The most common trap: start task A, interject task B, return to A — now the context is full of irrelevant stuff. One task, one session.

---

## 6.5. Tasks longer than a single context window: how not to "break down mid-load"

When a task is so large it won't fit in one window, the trick is to **externalize state** — write progress to a file so a fresh context can re-read it and continue. Anthropic's docs recommend:

- **Write progress to a file** (e.g. `progress.txt`) and structured state (e.g. a test list in JSON) for the next session to re-read.
- **Use git as state memory** — the log shows what's been done, checkpoints let you roll back.
- **One prompt line that keeps the AI from quitting early:**
  > *"Your context window will be automatically compacted as it approaches its limit, allowing you to continue working indefinitely from where you left off. So don't stop early over token concerns. As you approach the limit, save your progress and state to memory before the context refreshes… Never artificially stop a task midway."* [SOLID]

The big idea: **external memory (files, git) is how you beat the context-window limit.** Modern AI is excellent at recovering state from files — use that.

---

## 6.6. Long-term memory: the "house rules" file (CLAUDE.md / AGENTS.md)

Both systems have a file the agent *reads at the start of every session* — the place for persistent context you don't want to retype each time:
- **Claude Code:** `CLAUDE.md`. **Codex:** `AGENTS.md`. *The two tools don't read each other's file* — if you use both, maintain both.

The golden rule for this file (Anthropic), and it's *counterintuitive*:
> *"Keep it short. For each line, ask: 'Would removing this cause Claude to make mistakes?' If not, cut it. A bloated CLAUDE.md causes Claude to ignore your actual instructions!"* [SOLID]

In other words: **long-term memory is also context — and bloated context dilutes the signal.** What goes in: build commands it can't guess, conventions that differ from the norm, common gotchas. What stays out: things the AI already knows, long API docs, the self-evident.

---

## 6.7. When to use multiple "assistants" — and when not to

The new models love to spawn subagents on their own. Powerful, but there's a *reverse* trap: using the machinery for show when a direct approach is better.

> Anthropic warns plainly: the model *"has a strong predilection for subagents and may spawn them even when a simpler, direct approach would be sufficient and faster."* Guidance: *"Use subagents when work can run in parallel, needs isolated context, or involves independent workstreams. For simple work, sequential operations, single-file edits, or when you need to maintain context throughout — work directly."* [SOLID]

The principle, compact:
> **Adding an "assistant" adds coordination cost and adds error surface.** Only split work across multiple agents when it's *genuinely* parallelizable or *needs* an independent context (like a verification eye). Don't split for "grandeur."

(The two most *legitimate* reasons to split: **independently parallel work** — like digging through many sources at once — and **an independent verifier**. Beyond those two, default to keeping it in one thread.)

---

## 6.8. Chaining: split a big task into controllable steps

Sometimes, instead of one giant prompt, you want to *chain*: break it into separate steps so you can see the intermediate results.

> Anthropic: the most common chaining pattern is **self-correction**: generate a draft → have the model review it against criteria → revise based on the review. Each step is a separate turn so you can inspect, evaluate, or branch. [SOLID]

This is exactly the Diverge → Converge process (Ch.3) and the verification loop (Ch.4) in operational form: splitting the steps gives you *stopping points to inspect*.

---

## In a nutshell — Chapter 6

- **Context is your most precious resource.** A full context window → performance drops, the AI "forgets" instructions. Keep it *clean and signal-dense*.
- **The four-beat workflow:** Explore (read-only) → Plan (approve first) → Execute → Verify. Skip the plan when the task is *describable in one sentence*.
- **Let the AI interview you** before a big task; get the spec into a file; then open a *fresh clean session* to execute.
- **Five habits for clean context:** reset between tasks; correct early and decisively; delegate investigation to a subagent; scope searches narrowly; one task per session.
- **Tasks longer than one window:** externalize state to *files + git*; the "don't stop early over tokens, save state" prompt.
- **The house-rules file (CLAUDE.md/AGENTS.md):** persistent memory — but *keep it short*; a bloated file makes the AI ignore your real instructions.
- **Multiple assistants: use them in the right place.** Split only for *genuine parallelism* or *a needed independent eye*. Splitting for show = added cost + added error surface.

→ Next: [Chapter 7 — The field manual](07-field-manual.md): recipes by situation + Claude Code vs. Codex/GPT‑5 side by side.

<script type="text/markdown" data-lang="en" data-ch="7">
# Chapter 7 — The field manual

> The previous six chapters gave you the *principles*. This chapter gives you the *recipes*: ready-assembled command templates by situation, to copy and adapt. Each recipe is a crystallization of the principles you've learned — I annotate which principle is in play so you understand *why*, not just memorize. At the end is a Claude Code vs. Codex/GPT‑5 comparison table for users of both.

> **How to use it:** no recipe is an incantation. Replace the `[bracketed]` parts with your real task, and cut/add boldly. *Your* specificity is what makes them run.

---

## 7.1. Research a topic (deep, trustworthy)

Combines: grounding (Ch.4) + structure (Ch.2) + multiple hypotheses + verification.

```
Research [question]. Goal: an answer I'd dare to defend.

1. Find information systematically from MANY sources; don't trust a single one.
2. As you gather, build several COMPETING hypotheses; don't settle early.
3. For every factual claim, cite the original source; if you can't find one, say
   "couldn't verify" rather than asserting it.
4. Note your confidence level for each conclusion (certain / fairly sure / guess).
5. Self-critique your approach at least once.

Finally: summarize the answer + where you're LEAST confident and why.
```
*(This template tracks Anthropic's research guidance: multiple hypotheses, track confidence, self-critique. [SOLID])*

> **Verification upgrade:** once you have the report, open a **new session/agent** and give it the *source addresses*, not your summary: *"Here's a report [paste]. Don't trust it. Go re-check the important claims from the original sources and report which don't hold up."* (Ch.4)

---

## 7.2. Generate breakthrough ideas (product, content, strategy)

Combines: deliberate sampling + diverse personas + constraints + Diverge→Converge (Ch.3).

```
PHASE 1 — DIVERGE (no evaluating yet):
Give me 8 ideas for [goal], ordered safe → daring. For each, write one line on its
"point that could be wrong." Before you start, list the 3 most OBVIOUS ideas anyone
would think of — then RULE them out, don't include them. At least 2 ideas must borrow
an analogy from a completely different field.

PHASE 2 — CONVERGE:
Now play a demanding judge. Score the 8 ideas against [my criteria]. Keep the 3
strongest, sharpen each a notch, then pick 1 and defend it.
```
*(Ruling out the obvious = pushing off the attractor; cross-domain analogy + constraints = Ch.3; separating diverge/converge = preventing early self-censorship.)*

---

## 7.3. Writing (articles, emails, docs) without the "AI voice"

Combines: role for *voice* (Ch.2) + anti-"AI slop" (Ch.1) + say what TO do (Ch.2) + examples.

```
Write [type of text] about [topic] for [a specific audience].

Voice: [specific description — e.g. "like a blunt, no-fluff friend"]. Here's a passage
I like for you to catch the voice from: [paste 3-4 sample sentences].

Write in smoothly flowing prose (no bullet points). Avoid worn clichés like "in today's
digital age," "it's undeniable that." Make surprising but natural phrasing choices.

Success criterion: [the audience] finishes and feels "this is a real human voice" and
wants to keep reading.
```
*(Pasting a sample passage = few-shot voice-locking, stronger than any adjective. Banning clichés = concrete anti-mode-collapse.)*

---

## 7.4. Analysis / decision-making

Combines: step back to principles (Ch.3) + multiple angles + permit "I'm not sure" (Ch.4).

```
I'm weighing [decision]. Before advising, step back: what is the CORE problem here,
really?

Then analyze from 3 opposing angles (e.g. the optimist, the skeptic, the numbers-only
person). Each angle states its STRONGEST argument.

Point out which assumption, if wrong, would flip the conclusion. If you lack the
information to conclude confidently, say plainly what's missing.
```

---

## 7.5. Programming work (even if you don't know code)

Combines: Explore→Plan→Execute→Verify (Ch.6) + investigate before answering + verify criteria (Ch.4).

```
First, READ [the relevant part of the project] and explain to me how it works. Don't
change anything yet.

[after understanding] Now make a PLAN to [goal]: what to change, in what order. I'll
review before you build.

[after review] Implement per the plan. Follow the EXISTING PATTERNS in the project
(don't invent a new style). When done, run [test/check] and self-fix until it passes.
Show me evidence it works (test output, not just an assertion).
```
*(The rule "show me evidence, don't just assert" is one of the most valuable lines when working with a coding agent. [SOLID])*

---

## 7.6. "Fix the root cause, don't patch the symptom"

A small but extremely valuable template, from Anthropic's docs:

```
[Describe the symptom] is happening. It may be in [the suspect location]. Write a test
that REPRODUCES the bug first, then fix it. Address the ROOT CAUSE, don't paper over
the error.
```
And to stop "the AI cheating to pass tests":
> *"Write a high-quality, general-purpose solution… Don't hard-code values or create solutions that only work for the test cases. Tests are there to verify correctness, not to define the solution."* — Anthropic [SOLID]

---

## 7.7. Claude Code vs. Codex / GPT‑5 side by side

If you use both, some practical differences (official sources at **[SOLID]**, practitioner comparisons at **[SITUATIONAL / directional]**):

| Aspect | Claude Code | Codex (GPT‑5/5.1) |
|---|---|---|
| "House rules" file | `CLAUDE.md` | `AGENTS.md` (a nearer-directory file *overrides* a farther one). **Neither reads the other's file.** [SOLID] |
| Loop style | Leans toward asking for clarification before running (per practitioners) [SITUATIONAL] | Autonomous, asks little; OpenAI *trains the model NOT to ask for confirmation* — so you must write the request *fully up front*. [SOLID] |
| "Thinking knob" | extended/adaptive thinking; the `think→ultrathink` ladder (Claude Code only); newer models use `effort` | `reasoning_effort`: `none`/`minimal`/`low`/`medium`/`high`/`xhigh` + a separate `verbosity` parameter. [SOLID] |
| Progress narration (preamble) | usually helpful | **Reversed!** OpenAI recommends *removing* the preamble for Codex models because it can make the model *"stop abruptly."* [SOLID] |
| Sensitivity to contradictions | — | GPT‑5 is hurt *more than other models* by contradictory instructions (it burns tokens reconciling them). Cleaning up contradictions = the most valuable fix. [SOLID] |

**Three cross-tool lessons:**
1. **Don't carry a prompt straight from one tool to the other.** A preamble block that *helps* one side can *hurt* the other.
2. **With Codex, front-load everything.** Because it asks back rarely, a vague request gets self-decided in a direction you didn't want. Write the full spec first.
3. **With GPT‑5, contradiction hygiene matters more than adding instructions.** Removing one contradictory line is usually worth more than adding ten emphatic ones.

---

## 7.8. Two "super moves" for improving your own prompts

### Metaprompting — have the AI fix your prompt for you
> OpenAI provides a template: *"Here is a prompt: [PROMPT]. The desired behavior is [X] but it instead does [Y]. Keeping as much of the existing prompt as possible, propose the MINIMAL edits/additions to make the model behave better — name which phrases to ADD or REMOVE."* [SOLID]

This is the fastest way to debug a prompt that "keeps going wrong": give the AI both the prompt and the wrong behavior, ask for minimal edits.

### The hidden rubric — make the AI build its own bar, then clear it
> OpenAI, `<self_reflection>` template: *"First, devise a rubric of 5–7 criteria for a top-class solution — don't show it to me, use it internally. Then iterate on the solution until it scores top marks on every criterion; if not, redo it."* [SOLID]

Powerful for high-quality "one-shot" work: you don't have to write the criteria — make the AI set a high bar and reach for it.

- **Recipes are a starting point, not an incantation** — *your* specificity is what makes them run.

> This chapter is for *pinning to the wall*. It contains: (A) a power-phrase lookup card by evidence strength, (B) a pre-send checklist for your command, (C) an anti-"AI slop" card, and (D) **all the sources** — so you can verify every claim in the book yourself, true to the spirit of Chapter 4: *don't trust my summary, read the original.*

## A. Power-phrase lookup card (sorted by evidence)

### ✅ TIER A — trustworthy, use freely
| Phrase / technique | Use for | Evidence |
|---|---|---|
| Be specific + answer "who / what for / format / constraints / what good looks like" | Everything | SOLID |
| Paste 3–5 sample examples (`<example>`) | Lock format & voice | SOLID |
| "Allow 'I don't know'" | Anti-fabrication | SOLID |
| "Quote the source first, conclude after" | Document grounding | SOLID |
| "Verify the answer against [specific criteria] before finalizing" | Catch own errors | SOLID |
| "Go beyond the basics / as many relevant [X] as possible" | The effort switch | SOLID (mechanism) |
| "Do Y" (instead of "don't do X") | Better adherence | SOLID |
| XML tags partitioning content | Structure (Claude) | SOLID (Claude) |
| "Solve it several times, take the majority answer" (self-consistency) | Boost reasoning accuracy | SOLID |
| "Give N options with their probabilities/daring level" (verbalized sampling) | Idea diversity that stays correct | SOLID |

### 🟡 TIER B — real but situational
| Phrase | Note |
|---|---|
| "Let's think step by step" | Great for *non*-reasoning models; *redundant* on models that think for themselves |
| `think` → `think hard` → `think harder` → `ultrathink` | Only in **Claude Code**; being replaced by the `effort` parameter |
| "Be concise" | Right for the *final answer*; **wrong** for the *reasoning* (it needs room to work) |
| "Keep going until solved / be proactive" | Raises *autonomy*; careful with hard-to-reverse actions |

### 🔴 TIER C — famous but weaker than the rumor
| Phrase | Why to be wary |
|---|---|
| "Take a deep breath…" | Optimized for *one* model (PaLM 2-L); most of the benefit is just "add step-by-step reasoning" |
| "This is very important to my career" (emotional) | Small, fading on new models; may trade *truthfulness* for *confident-sounding* |
| "You are an expert in X" → for *accuracy* | Refuted by the MMLU study. (Still good for *voice* and *idea diversity*) |
| "Find your own errors" (with no external check) | Same blind spots; sometimes fixes right into wrong |
| Prefill (seeding the answer) | **Removed** on Claude 4.6+ (400 error); use Structured Outputs |

## B. Pre-send checklist for your command

Run your prompt quickly through these 8 questions (condensed from Ch.2–4):

- [ ] **Would a stranger understand it?** (the golden rule) — if they'd be confused, so will the AI.
- [ ] Did you state **who uses it / what for / format / length**?
- [ ] Did you give the **reason "why"** where it matters?
- [ ] Did you state **what TO do**, not just what to forbid?
- [ ] Did you define **"what done looks like"** (measurable criteria)?
- [ ] Big task? → did you separate **Explore → Plan → Execute → Verify**?
- [ ] Creative task? → did you **force multiple options + forbid the obvious + add constraints**, instead of chanting "be creative"?
- [ ] Fact-bearing task? → did you **allow "I don't know"** + have an **independent eye** check it (give the *source address*, not a *summary*)?

---

## C. Anti-"AI slop" card (generic output)

When the result comes out bland, paste one of these "remedies":

- **List then rule out:** *"First list the 3 most obvious approaches anyone would think of, then RULE them out. Now give the solution."*
- **Hard constraints:** *"Exactly [these two unusual ingredients] must be present; [these three mundane things] are forbidden. Within that frame, surprise me."*
- **The surprise bar:** *"Give me something that would surprise an industry expert — yet is still feasible."*
- **Cross-domain analogy:** *"Borrow a solution from a completely different field [games / medicine / religion]."*
- **Multiple persona angles:** *"Step into 5 very different people; each gives an idea only they would think of."*
- **(Code) fit the project:** *"Follow the existing patterns/helpers/naming in the project; don't invent a new style."*

Recall the root principle (Ch.1): bland output = *missing detail* + *the pull toward the familiar*. Every remedy above is a way to *inject specific constraints* + *block the road back to the attractor*.

## Closing

If the whole book had to be compressed into one sentence, it's this:

> **AI won't give you more than you dare to ask for specifically.** Bland output is a mirror reflecting a bland command. Every technique in the book — from "give me N options with their probabilities," to "forbid the obvious," to "the independent eye" — is just a systematic way of *asking for more, more specifically, and forcing yourself to verify*.

There are no magic words. There is only clarity, specificity, and the discipline of keeping the new thing true. That, you can learn — and now you have it.

  var totalWords=0;
  arr.forEach(function(blk){
    var ch=+blk.dataset.ch;
    var sec=document.createElement("section");
    sec.className="chapter reveal"; sec.id="ch-"+ch; sec.dataset.ch=ch;
    var src=blk.textContent;
    totalWords+=src.split(/\s+/).length;
    sec.innerHTML=md(src);
    content.appendChild(sec);
    var h1=sec.querySelector("h1");
    var title=stripTitle(h1?h1.textContent:("#"+ch),ch);
    var a=document.createElement("a"); a.href="#ch-"+ch; a.dataset.ch=ch;
    a.innerHTML='<span class="n">'+String(ch).padStart(2,"0")+"</span>"+title;
    a.addEventListener("click",function(e){e.preventDefault();document.getElementById("ch-"+ch).scrollIntoView({behavior:"smooth"});});
    nav.appendChild(a);
  });
  enhance();
  setupReveal();
  setHeroMeta(totalWords,arr.length);
}
function setHeroMeta(words,chs){
  var mins=Math.round(words/200);
  document.getElementById("hero-meta").innerHTML=
    "<span><b>"+chs+"</b> "+t("chapters")+"</span>"+
    "<span><b>~"+words.toLocaleString()+"</b> "+t("words")+"</span>"+
    "<span><b>~"+mins+"</b> "+t("mins")+"</span>"+
    "<span><b>19</b> power-phrases</span>";
}
function enhance(){
  /* console cards + copy buttons */
  document.querySelectorAll("#content pre").forEach(function(pre){
    if(pre.closest(".console-card"))return;
    var card=document.createElement("div"); card.className="console-card";
    var bar=document.createElement("div"); bar.className="console-bar";
    bar.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="label">prompt</span>';
    var btn=document.createElement("button"); btn.className="copy-btn"; btn.textContent=t("copy");
    btn.addEventListener("click",function(){
      navigator.clipboard.writeText(pre.innerText).then(function(){
        btn.textContent=t("copied"); btn.classList.add("ok");
        setTimeout(function(){btn.textContent=t("copy"); btn.classList.remove("ok");},1500);
      });
    });
    bar.appendChild(btn);
    pre.parentNode.insertBefore(card,pre); card.appendChild(bar); card.appendChild(pre);
  });
}
var io=null;
function setupReveal(){
  if(io)io.disconnect();
  io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add("in");io.unobserve(en.target);}});},{rootMargin:"0px 0px -8% 0px"});
  document.querySelectorAll(".chapter.reveal").forEach(function(s){io.observe(s);});
}

/* scrollspy */
var spy=new IntersectionObserver(function(es){
  es.forEach(function(en){
    if(en.isIntersecting){
      var ch=en.target.dataset.ch;
      document.querySelectorAll("#toc-nav a").forEach(function(a){a.classList.toggle("active",a.dataset.ch===ch);});
    }
  });
},{rootMargin:"-30% 0px -60% 0px"});
function observeSpy(){spy.disconnect();document.querySelectorAll(".chapter").forEach(function(s){spy.observe(s);});}

/* ---------- command palette ---------- */
function cmdIndex(){
  var idx=[];
  for(var c=0;c<9;c++){idx.push({kind:"ch",label:stripTitle(CHTITLE[lang][c],c)||CHTITLE[lang][c],sub:t("goto")+" "+String(c).padStart(2,"0"),ch:c});}
  PHRASES.forEach(function(p,k){idx.push({kind:"ph",label:p[lang][0],sub:TIERNAME[lang][p.t]+" · "+p[lang][1],tier:p.t});});
  idx.push({kind:"act",label:t("actExp"),sub:"⌖",act:"exp"});
  idx.push({kind:"act",label:t("actLang"),sub:"⇄",act:"lang"});
  idx.push({kind:"act",label:t("actTheme"),sub:"◐",act:"theme"});
  return idx;
}
var cmdkSel=0,cmdkList=[];
function renderCmdk(q){
  var idx=cmdIndex();
  q=(q||"").trim().toLowerCase();
  cmdkList=q?idx.filter(function(x){return (x.label+" "+x.sub).toLowerCase().indexOf(q)>=0;}):idx;
  cmdkSel=0;
  var box=document.getElementById("cmdk-results");
  if(!cmdkList.length){box.innerHTML='<div class="empty">∅ — no match</div>';return;}
  box.innerHTML=cmdkList.map(function(x,i){
    var tag=x.kind==="ch"?"CH":x.kind==="ph"?TIERNAME[lang][x.tier]:"CMD";
    return '<div class="res'+(i===0?" sel":"")+'" data-i="'+i+'"><span class="tag">'+tag+'</span><div class="rt"><div class="rtitle">'+x.label+'</div><div class="rsub">'+x.sub+'</div></div></div>';
  }).join("");
  Array.prototype.forEach.call(box.children,function(el){
    el.addEventListener("click",function(){runCmdk(cmdkList[+el.dataset.i]);});
    el.addEventListener("mousemove",function(){setSel(+el.dataset.i);});
  });
}
function setSel(i){cmdkSel=i;Array.prototype.forEach.call(document.getElementById("cmdk-results").children,function(el,k){el.classList.toggle("sel",k===i);if(k===i)el.scrollIntoView({block:"nearest"});});}
function runCmdk(x){
  if(!x)return; closeOverlay("cmdk");
  if(x.kind==="ch"){document.getElementById("ch-"+x.ch).scrollIntoView({behavior:"smooth"});}
  else if(x.kind==="ph"){openExplorer(x.tier);}
  else if(x.act==="exp"){openExplorer("all");}
  else if(x.act==="lang"){toggleLang();}
  else if(x.act==="theme"){toggleTheme();}
}

/* ---------- explorer ---------- */
var curFilter="all";
function renderCards(){
  var box=document.getElementById("cards");
  var q=(window._expq||"").toLowerCase();
  var list=PHRASES.filter(function(p){return (curFilter==="all"||p.t===curFilter)&&(!q||(p[lang][0]+" "+p[lang][1]).toLowerCase().indexOf(q)>=0);});
  box.innerHTML=list.length?list.map(function(p){
    return '<div class="pcard '+p.t+'"><div class="ptop"><span class="chip chip-'+p.t+'">'+TIERNAME[lang][p.t]+'</span><span class="pname">'+p[lang][0]+'</span></div><div class="puse">'+t("use")+": "+p[lang][1]+"</div></div>";
  }).join(""):'<div class="empty">∅</div>';
}
function buildFilters(){
  var f=document.getElementById("filters");
  var tiers=["all","solid","moderate","situational","overhyped"];
  f.innerHTML=tiers.map(function(tr){
    var lbl=tr==="all"?t("all"):TIERNAME[lang][tr];
    return '<button class="filter'+(tr===curFilter?" on":"")+'" data-tier="'+tr+'">'+lbl+"</button>";
  }).join("");
  Array.prototype.forEach.call(f.children,function(b){b.addEventListener("click",function(){curFilter=b.dataset.tier;buildFilters();renderCards();});});
}
function openExplorer(tier){curFilter=tier||"all";window._expq="";var ei=document.getElementById("exp-input");if(ei)ei.value="";document.getElementById("explorer").classList.add("open");buildFilters();renderCards();}

/* ---------- overlays ---------- */
function openOverlay(id){document.getElementById(id).classList.add("open");if(id==="cmdk"){var inp=document.getElementById("cmdk-input");inp.value="";renderCmdk("");setTimeout(function(){inp.focus();},30);}}
function closeOverlay(id){document.getElementById(id).classList.remove("open");}
function anyOpen(){return document.querySelector(".overlay.open");}

/* ---------- toggles ---------- */
function toggleLang(){lang=lang==="vi"?"en":"vi";localStorage.setItem("ca-lang",lang);applyStatic();buildContent();observeSpy();startType();}
function toggleTheme(){theme=theme==="dark"?"light":"dark";localStorage.setItem("ca-theme",theme);H.setAttribute("data-theme",theme);}

/* ---------- typewriter ---------- */
var typeTimer=null;
function startType(){
  if(typeTimer)clearTimeout(typeTimer);
  var el=document.getElementById("typed");var lines=TYPED[lang];var li=0,ci=0,del=false;
  function step(){
    var s=lines[li];
    if(!del){ci++;el.textContent=s.slice(0,ci);if(ci===s.length){del=true;typeTimer=setTimeout(step,1700);return;}}
    else{ci--;el.textContent=s.slice(0,ci);if(ci===0){del=false;li=(li+1)%lines.length;}}
    typeTimer=setTimeout(step,del?28:52);
  }
  step();
}

/* ---------- wiring ---------- */
document.getElementById("open-cmdk").addEventListener("click",function(){openOverlay("cmdk");});
document.getElementById("open-explorer").addEventListener("click",function(){openExplorer("all");});
document.getElementById("exp-input").addEventListener("input",function(e){window._expq=e.target.value;renderCards();});
document.getElementById("lang-toggle").addEventListener("click",toggleLang);
document.getElementById("theme-toggle").addEventListener("click",toggleTheme);
document.getElementById("cmdk-input").addEventListener("input",function(e){renderCmdk(e.target.value);});
document.getElementById("tobtop").addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});
document.querySelectorAll(".overlay").forEach(function(o){o.addEventListener("click",function(e){if(e.target===o)closeOverlay(o.id);});});
/* live search inside explorer: reuse a tiny hidden behavior via key on cards? add a search line */
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();anyOpen()?closeOverlay("cmdk"):openOverlay("cmdk");return;}
  if(e.key==="Escape"){document.querySelectorAll(".overlay.open").forEach(function(o){closeOverlay(o.id);});return;}
  var cm=document.getElementById("cmdk");
  if(cm.classList.contains("open")){
    if(e.key==="ArrowDown"){e.preventDefault();setSel(Math.min(cmdkSel+1,cmdkList.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSel(Math.max(cmdkSel-1,0));}
    else if(e.key==="Enter"){e.preventDefault();runCmdk(cmdkList[cmdkSel]);}
  }
});
/* progress + back-to-top */
window.addEventListener("scroll",function(){
  var st=document.documentElement.scrollTop||document.body.scrollTop;
  var h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  document.getElementById("progress").style.width=(h>0?(st/h*100):0)+"%";
  document.getElementById("tobtop").classList.toggle("show",st>700);
},{passive:true});

/* init */
applyStatic();
buildContent();
observeSpy();
buildFilters();
startType();
</script>
</body>
</html>
