<!doctype html>
<html lang="vi" data-theme="dark" data-lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commanding AI · Ra Lệnh Cho AI</title>
<meta name="description" content="Ra Lệnh Cho AI / Commanding AI — nghệ thuật điều khiển AI bằng ngôn ngữ tự nhiên. Bản tương tác song ngữ.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600;1,700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d11; --bg2:#0f1217; --surface:#14181f; --surface2:#1b212a;
  --border:#262d38; --border2:#323b48;
  --text:#e9e6df; --muted:#9aa3b2; --faint:#6b7484;
  --accent:#7ee0a6; --accent-dim:#3d6f54; --accent2:#f3c884; --link:#8fd0ff;
  --solid:#6ee7a0; --moderate:#79c0ff; --situational:#f3c884; --overhyped:#ff8d8d;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --display:'Playfair Display',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --maxw:46rem; --shadow:0 18px 50px -12px rgba(0,0,0,.6);
}
html[data-theme="light"]{
  --bg:#f4f0e6; --bg2:#efe9dc; --surface:#fbf8f1; --surface2:#f1ebdd;
  --border:#ddd3bf; --border2:#cabfa6;
  --text:#211e18; --muted:#6b6354; --faint:#928873;
  --accent:#1f7a4d; --accent-dim:#a9d8bf; --accent2:#9a6a1f; --link:#1f63d6;
  --solid:#1f7a4d; --moderate:#1f63d6; --situational:#9a6a1f; --overhyped:#c0392b;
  --shadow:0 18px 50px -16px rgba(80,64,32,.28);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--serif); font-size:19px; line-height:1.78;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
/* atmospheric depth — never a flat fill (per the book's own design law) */
body::before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    radial-gradient(60vw 60vw at 78% -8%, rgba(126,224,166,.10), transparent 60%),
    radial-gradient(48vw 48vw at 8% 12%, rgba(243,200,132,.07), transparent 60%),
    radial-gradient(70vw 50vw at 50% 110%, rgba(143,208,255,.06), transparent 60%);
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.5;
  background-image:radial-gradient(currentColor .5px, transparent .5px);
  background-size:26px 26px; color:rgba(127,140,160,.07);
}
html[data-theme="light"] body::after{color:rgba(120,100,60,.08)}
::selection{background:var(--accent); color:#06231a}

/* progress */
#progress{position:fixed; top:0; left:0; height:3px; width:0;
  background:linear-gradient(90deg,var(--accent),var(--accent2)); z-index:60;
  box-shadow:0 0 12px var(--accent)}

/* topbar */
#topbar{position:sticky; top:0; z-index:50; display:flex; align-items:center;
  justify-content:space-between; gap:1rem; padding:.7rem clamp(1rem,4vw,2.4rem);
  background:color-mix(in srgb,var(--bg) 78%, transparent);
  backdrop-filter:blur(14px); border-bottom:1px solid var(--border)}
.brand{font-family:var(--mono); font-size:.86rem; letter-spacing:.02em; color:var(--muted);
  display:flex; align-items:center; gap:.5rem; white-space:nowrap}
.brand b{color:var(--text); font-weight:600}
.brand .blink{color:var(--accent); animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.top-actions{display:flex; gap:.5rem; align-items:center}
.btn{font-family:var(--mono); font-size:.8rem; color:var(--muted); cursor:pointer;
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:.42rem .7rem; transition:.18s; display:inline-flex; align-items:center; gap:.4rem; line-height:1}
.btn:hover{color:var(--text); border-color:var(--border2); background:var(--surface2); transform:translateY(-1px)}
.btn kbd{font-family:var(--mono); font-size:.72rem; background:var(--bg2); border:1px solid var(--border);
  border-radius:5px; padding:.05rem .35rem; color:var(--faint)}

/* hero */
#hero{min-height:88vh; display:flex; flex-direction:column; justify-content:center;
  padding:4rem clamp(1.2rem,5vw,3rem) 3rem; position:relative; max-width:64rem; margin:0 auto}
.kicker{font-family:var(--mono); font-size:.78rem; letter-spacing:.28em; text-transform:uppercase;
  color:var(--accent); margin-bottom:1.4rem}
#hero h1{font-family:var(--display); font-weight:900; line-height:.98;
  font-size:clamp(3rem,11vw,8.2rem); margin:0 0 .2rem; letter-spacing:-.02em}
#hero .sub{font-family:var(--display); font-style:italic; font-weight:600;
  font-size:clamp(1.2rem,3.4vw,2rem); color:var(--muted); margin:.4rem 0 2.2rem; max-width:30ch}
.console-line{font-family:var(--mono); font-size:clamp(.82rem,2.2vw,1.05rem);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:1rem 1.2rem; max-width:40rem; color:var(--accent); box-shadow:var(--shadow)}
.console-line .pfx{color:var(--faint); user-select:none}
.console-line .cursor{color:var(--accent); animation:blink 1.1s step-end infinite}
.hero-meta{display:flex; flex-wrap:wrap; gap:1.4rem; margin-top:2.2rem;
  font-family:var(--mono); font-size:.78rem; color:var(--faint)}
.hero-meta b{color:var(--muted); font-weight:500}
.scrolldown{margin-top:2.6rem; font-family:var(--mono); font-size:.76rem; color:var(--faint);
  letter-spacing:.1em; animation:bob 1.8s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(6px)}}

/* layout */
#layout{display:grid; grid-template-columns:minmax(0,1fr); max-width:74rem; margin:0 auto;
  padding:0 clamp(1rem,4vw,2rem) 6rem; position:relative}
@media(min-width:1080px){#layout{grid-template-columns:17rem minmax(0,1fr); gap:2.5rem}}
#toc{display:none}
@media(min-width:1080px){#toc{display:block; align-self:start; position:sticky; top:5rem; max-height:calc(100vh - 7rem); overflow:auto}}
#toc .toc-title{font-family:var(--mono); font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--faint); margin:0 0 1rem; padding-left:.9rem}
#toc a{display:block; text-decoration:none; color:var(--muted); font-size:.94rem; line-height:1.35;
  padding:.42rem .9rem; border-left:2px solid var(--border); transition:.16s}
#toc a .n{font-family:var(--mono); font-size:.72rem; color:var(--faint); margin-right:.55rem}
#toc a:hover{color:var(--text); border-left-color:var(--border2)}
#toc a.active{color:var(--accent); border-left-color:var(--accent); background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 10%,transparent),transparent)}
#toc a.active .n{color:var(--accent)}

/* content */
#content{min-width:0}
.chapter{max-width:var(--maxw); margin:0 auto; padding:3.2rem 0; border-top:1px solid var(--border)}
.chapter:first-child{border-top:none}
.chapter.reveal{opacity:0; transform:translateY(18px)}
.chapter.reveal.in{opacity:1; transform:none; transition:opacity .7s ease,transform .7s ease}
#content h1{font-family:var(--display); font-weight:800; font-size:clamp(2rem,5.5vw,3.1rem);
  line-height:1.05; letter-spacing:-.015em; margin:.2rem 0 1.6rem}
#content h2{font-family:var(--display); font-weight:700; font-size:1.62rem; line-height:1.2;
  margin:2.6rem 0 1rem; padding-top:.4rem}
#content h2::before{content:"§ "; font-family:var(--mono); font-size:1rem; color:var(--accent); font-weight:500}
#content h3{font-family:var(--mono); font-weight:600; font-size:1.02rem; letter-spacing:.01em;
  color:var(--accent2); margin:2rem 0 .7rem}
#content p{margin:1.05rem 0}
#content a{color:var(--link); text-decoration:none; border-bottom:1px solid color-mix(in srgb,var(--link) 35%,transparent)}
#content a:hover{border-bottom-color:var(--link)}
#content strong{color:var(--text); font-weight:600}
#content em{color:var(--text)}
#content hr{border:none; height:1px; background:linear-gradient(90deg,transparent,var(--border2),transparent); margin:2.4rem 0}
#content ul,#content ol{margin:1rem 0; padding-left:1.4rem}
#content li{margin:.5rem 0}
#content li::marker{color:var(--accent)}
#content code{font-family:var(--mono); font-size:.86em; background:var(--surface2);
  border:1px solid var(--border); border-radius:5px; padding:.08em .38em; color:var(--accent2)}

/* blockquote — the evidence/source voice */
#content blockquote{margin:1.6rem 0; padding:1.1rem 1.3rem; background:var(--surface);
  border:1px solid var(--border); border-left:3px solid var(--accent);
  border-radius:0 12px 12px 0; box-shadow:var(--shadow)}
#content blockquote p{margin:.4rem 0; font-style:italic; color:var(--text)}
#content blockquote code{font-style:normal}

/* console card (code blocks) */
.console-card{margin:1.6rem 0; border:1px solid var(--border); border-radius:12px;
  overflow:hidden; background:#070a0e; box-shadow:var(--shadow)}
html[data-theme="light"] .console-card{background:#0f1217}
.console-bar{display:flex; align-items:center; gap:.5rem; padding:.5rem .8rem;
  background:linear-gradient(180deg,#161b22,#10141a); border-bottom:1px solid #20262f}
.console-bar .dot{width:11px; height:11px; border-radius:50%; background:#3a414c}
.console-bar .dot:nth-child(1){background:#ff5f57}.console-bar .dot:nth-child(2){background:#febc2e}.console-bar .dot:nth-child(3){background:#28c840}
.console-bar .label{font-family:var(--mono); font-size:.72rem; color:#7d8696; margin-left:.4rem; letter-spacing:.05em}
.copy-btn{margin-left:auto; font-family:var(--mono); font-size:.72rem; color:#9aa3b2; cursor:pointer;
  background:#1b212a; border:1px solid #2b333f; border-radius:6px; padding:.22rem .55rem; transition:.16s}
.copy-btn:hover{color:#e9e6df; border-color:#3a4350}
.copy-btn.ok{color:var(--accent); border-color:var(--accent-dim)}
.console-card pre{margin:0; padding:1rem 1.15rem; overflow-x:auto}
.console-card code{font-family:var(--mono); font-size:.83rem; line-height:1.65; color:#cdd6e3;
  background:none; border:none; padding:0; white-space:pre}

/* tables */
.tbl-wrap{overflow-x:auto; margin:1.5rem 0; border:1px solid var(--border); border-radius:12px}
#content table{border-collapse:collapse; width:100%; font-size:.9rem}
#content th,#content td{padding:.7rem .9rem; text-align:left; border-bottom:1px solid var(--border); vertical-align:top}
#content th{font-family:var(--mono); font-size:.74rem; letter-spacing:.04em; text-transform:uppercase;
  color:var(--accent2); background:var(--surface2)}
#content tr:last-child td{border-bottom:none}
#content td code{font-size:.8em}

/* evidence chips */
.chip{font-family:var(--mono); font-size:.7rem; font-weight:600; letter-spacing:.03em;
  padding:.12em .5em; border-radius:6px; border:1px solid; white-space:nowrap; vertical-align:.05em}
.chip-solid{color:var(--solid); border-color:color-mix(in srgb,var(--solid) 45%,transparent); background:color-mix(in srgb,var(--solid) 12%,transparent)}
.chip-moderate{color:var(--moderate); border-color:color-mix(in srgb,var(--moderate) 45%,transparent); background:color-mix(in srgb,var(--moderate) 12%,transparent)}
.chip-situational{color:var(--situational); border-color:color-mix(in srgb,var(--situational) 45%,transparent); background:color-mix(in srgb,var(--situational) 12%,transparent)}
.chip-overhyped{color:var(--overhyped); border-color:color-mix(in srgb,var(--overhyped) 45%,transparent); background:color-mix(in srgb,var(--overhyped) 12%,transparent)}

/* overlays: cmdk + explorer */
.overlay{position:fixed; inset:0; z-index:80; display:none; align-items:flex-start; justify-content:center;
  background:rgba(4,6,9,.62); backdrop-filter:blur(6px); padding:12vh 1rem 2rem}
.overlay.open{display:flex}
.panel{width:100%; max-width:42rem; background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; box-shadow:0 30px 80px -20px rgba(0,0,0,.7); overflow:hidden; animation:pop .18s ease}
@keyframes pop{from{opacity:0; transform:translateY(-10px) scale(.98)}}
.panel-search{display:flex; align-items:center; gap:.7rem; padding:1rem 1.2rem; border-bottom:1px solid var(--border)}
.panel-search .pfx{font-family:var(--mono); color:var(--accent)}
.panel-search input{flex:1; background:none; border:none; outline:none; color:var(--text);
  font-family:var(--mono); font-size:1rem}
.panel-search .esc{font-family:var(--mono); font-size:.7rem; color:var(--faint); border:1px solid var(--border); border-radius:5px; padding:.1rem .4rem}
.results{max-height:54vh; overflow:auto; padding:.5rem}
.res{display:flex; align-items:center; gap:.7rem; padding:.6rem .8rem; border-radius:9px; cursor:pointer}
.res .tag{font-family:var(--mono); font-size:.66rem; color:var(--faint); border:1px solid var(--border);
  border-radius:5px; padding:.05rem .35rem; text-transform:uppercase; letter-spacing:.05em}
.res .rt{flex:1; min-width:0}
.res .rt .rtitle{font-size:.95rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.res .rt .rsub{font-size:.78rem; color:var(--faint); font-family:var(--mono)}
.res.sel,.res:hover{background:var(--surface2)}
.res.sel{outline:1px solid var(--accent-dim)}
.empty{padding:1.4rem; text-align:center; color:var(--faint); font-family:var(--mono); font-size:.85rem}

/* explorer */
.explorer-head{padding:1.2rem 1.3rem .4rem}
.explorer-head h3{margin:0; font-family:var(--display); font-size:1.4rem; font-weight:700}
.explorer-head p{margin:.3rem 0 0; font-size:.85rem; color:var(--muted); font-family:var(--mono)}
.filters{display:flex; flex-wrap:wrap; gap:.45rem; padding:.9rem 1.3rem; border-bottom:1px solid var(--border)}
.filter{font-family:var(--mono); font-size:.74rem; cursor:pointer; color:var(--muted);
  background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:.3rem .8rem; transition:.16s}
.filter:hover{color:var(--text)}
.filter.on{color:var(--bg); background:var(--accent); border-color:var(--accent); font-weight:600}
.filter[data-tier="solid"].on{background:var(--solid); border-color:var(--solid)}
.filter[data-tier="moderate"].on{background:var(--moderate); border-color:var(--moderate)}
.filter[data-tier="situational"].on{background:var(--situational); border-color:var(--situational)}
.filter[data-tier="overhyped"].on{background:var(--overhyped); border-color:var(--overhyped)}
.cards{max-height:52vh; overflow:auto; padding:1rem 1.3rem 1.4rem; display:grid; gap:.7rem}
.pcard{border:1px solid var(--border); border-left:3px solid var(--c); border-radius:10px;
  padding:.8rem 1rem; background:var(--surface)}
.pcard .ptop{display:flex; align-items:center; gap:.6rem; margin-bottom:.25rem}
.pcard .pname{font-weight:600; color:var(--text); font-size:1rem}
.pcard .puse{font-size:.85rem; color:var(--muted)}
.pcard.solid{--c:var(--solid)}.pcard.moderate{--c:var(--moderate)}.pcard.situational{--c:var(--situational)}.pcard.overhyped{--c:var(--overhyped)}

footer{max-width:var(--maxw); margin:0 auto; padding:3rem clamp(1rem,4vw,2rem) 5rem;
  font-family:var(--mono); font-size:.8rem; color:var(--faint); line-height:1.7; border-top:1px solid var(--border)}
footer a{color:var(--muted)}
.tobtop{position:fixed; right:1.3rem; bottom:1.3rem; z-index:40; opacity:0; pointer-events:none; transition:.25s}
.tobtop.show{opacity:1; pointer-events:auto}

@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important; scroll-behavior:auto!important}}
</style>

<script type="text/markdown" data-lang="vi" data-ch="0">
# Ra Lệnh Cho AI
### Nghệ thuật điều khiển AI bằng ngôn ngữ tự nhiên để có kết quả xuất sắc — mà vẫn đúng

> *"Hãy coi AI như một đồng nghiệp cực kỳ thông minh nhưng vừa mới vào công ty: chưa biết gì về bối cảnh, thói quen hay tiêu chuẩn của bạn. Bạn giải thích càng chính xác điều mình muốn, kết quả càng tốt."*
> — Diễn giải từ tài liệu prompt engineering chính thức của Anthropic

---

## Cuốn sách này nói về điều gì

Hầu hết mọi người dùng AI (Claude Code, Codex, ChatGPT, Gemini…) theo cách giống nhau: gõ một câu mơ hồ, nhận lại một câu trả lời "tàm tạm", rồi chép miệng "AI cũng thường thôi". Output ra **nhang nhác nhau, an toàn, trung bình, không có gì bất ngờ** — cái mà giới thiết kế gọi thẳng là *"AI slop"* (đồ AI rẻ tiền).

Nhưng có một nhóm nhỏ người dùng lại liên tục lấy được từ cùng một con AI những thứ **mới mẻ, sắc bén, vượt mong đợi — mà vẫn chính xác**. Khác biệt không nằm ở model. Nó nằm ở **cách ra lệnh**.

Cuốn sách này trả lời hai câu hỏi:

1. **Làm sao ra lệnh để AI tạo ra cái MỚI, độc đáo, "out-of-the-box" — ý tưởng, nghiên cứu, sản phẩm xuất sắc mà vẫn ĐÚNG, không phải bản sao trung bình của Internet?**
2. **Những câu, những từ ngắn gọn nào — khi thêm vào — thực sự làm tăng kết quả lên nhiều lần? Và quan trọng không kém: câu nào chỉ là lời đồn được thổi phồng?**

Đây không phải sách "mẹo vặt prompt". Đây là sách về **nguyên lý**: tại sao AI mặc định cho ra đồ nhạt, và bạn dùng ngôn ngữ tự nhiên thế nào để kéo nó ra khỏi vùng trung bình đó.

---

## Cuốn sách này KHÁC gì so với "1000 prompt thần thánh" trôi nổi

Phần lớn nội dung "prompt bí kíp" trên mạng là lời đồn được chép đi chép lại, không ai kiểm chứng. Cuốn sách này cam kết ngược lại:

- **Mỗi kỹ thuật đều gắn với bằng chứng.** Phần lớn đến từ tài liệu chính thức của Anthropic và OpenAI, hoặc từ nghiên cứu khoa học (các bài báo tại ICLR, NeurIPS, EMNLP…).
- **Nói thẳng cái nào bị thổi phồng.** Bạn sẽ thấy chương riêng "bóc phốt" những câu thần chú nổi tiếng như *"hãy hít một hơi thật sâu"* hay *"bạn là chuyên gia"* — chúng yếu hơn lời đồn rất nhiều, và sách sẽ chỉ rõ tại sao.
- **Wow = ấn tượng VÀ đúng.** Một kỹ thuật chỉ "nghe kêu" mà không có dữ liệu thì không được đưa vào như chân lý.

### Quy ước mức độ bằng chứng

Xuyên suốt sách, khi nói một kỹ thuật "có tác dụng", tôi gắn nhãn để bạn tự cân nhắc:

| Nhãn | Nghĩa là |
|------|----------|
| **[VỮNG]** | Có nghiên cứu đối chứng hoặc tài liệu chính hãng xác nhận, số liệu rõ ràng. |
| **[KHÁ]** | Có bằng chứng tốt (preprint, nghiên cứu được trích dẫn nhiều) nhưng chưa "đóng đinh". |
| **[TÙY]** | Có thật nhưng phụ thuộc nặng vào model/ngữ cảnh; đừng coi là phép màu. |
| **[THỔI PHỒNG]** | Nổi tiếng nhưng bằng chứng yếu hơn nhiều so với lời đồn; dùng có chừng mực. |

Một lưu ý trung thực ngay từ đầu: **các model "biết suy nghĩ" thế hệ mới (reasoning models) đã tự làm nhiều việc mà các câu thần chú cũ từng làm.** Nghĩa là không ít mẹo nổi tiếng 2022–2023 nay đã *bớt tác dụng hoặc thừa thãi*. Sách sẽ nói rõ chỗ nào.

---

## Sách dùng được cho công cụ nào

Cuốn sách **trung lập về công cụ**. Nguyên lý ra lệnh áp dụng cho mọi trợ lý AI mạnh. Ví dụ sẽ rút từ hai "tác nhân lập trình" (coding agent) phổ biến nhất:

- **Claude Code** (Anthropic) — chạy trong terminal, đọc/sửa file, chạy lệnh.
- **Codex** (OpenAI, chạy trên GPT‑5/5.1) — tương tự, có bản CLI và bản chạy trên cloud.

Bạn **không cần biết lập trình** để đọc sách này. Khi có ví dụ kỹ thuật, tôi luôn giải thích ý tưởng đằng sau bằng ngôn ngữ thường. Cái bạn học là *cách diễn đạt mệnh lệnh*, không phải cú pháp code.

Khi một kỹ thuật chỉ đúng cho riêng một công cụ (ví dụ từ khóa `ultrathink` chỉ có trong Claude Code), tôi sẽ nói rõ.

# Chương 1 — Tư duy nền tảng: tại sao AI mặc định cho ra đồ nhạt

> Trước khi học một kỹ thuật nào, bạn cần hiểu **kẻ thù**. Kẻ thù của output xuất sắc không phải là model yếu. Đó là một lực kéo vô hình, có tên khoa học, luôn lôi câu trả lời của AI về phía "trung bình của Internet". Hiểu được lực này, bạn sẽ hiểu *tại sao* mọi kỹ thuật trong sách lại có tác dụng.

---

## 1.1. Ba mô hình tư duy sai — và cái đúng

Cách bạn *hình dung* về AI quyết định cách bạn *nói chuyện* với nó. Phần lớn người dùng mang một trong ba mô hình sai sau:

**Mô hình sai #1: "AI là cỗ máy biết tuốt."** Bạn gõ một câu cụt lủn và mong nó đọc được suy nghĩ của bạn. Nhưng AI *không* biết bối cảnh của bạn: dự án nào, đối tượng nào, ràng buộc nào, gu thẩm mỹ nào. Khi bạn không nói, nó phải *đoán* — và nó luôn đoán về phía an toàn nhất, tức là nhạt nhất.

**Mô hình sai #2: "AI là ô tìm kiếm thông minh."** Bạn coi nó như Google biết nói. Nên bạn hỏi những câu ngắn kiểu tra cứu. AI giỏi hơn thế rất nhiều — nó có thể lập kế hoạch, phản biện, tạo ra cái mới — nhưng nếu bạn chỉ hỏi như tra Google, bạn chỉ nhận lại đồ cỡ Google.

**Mô hình sai #3: "AI là pháp sư, cần đúng câu thần chú."** Đây là cái bẫy của người đã đọc vài "bí kíp prompt". Họ tin có những chuỗi từ ma thuật. Có một chút sự thật ở đây (Chương 5), nhưng tin vào thần chú khiến bạn bỏ qua thứ thực sự quan trọng: *truyền đạt rõ ý định*.

**Mô hình ĐÚNG — và đây là mô hình mà chính Anthropic khuyến nghị:**

> Hãy coi AI như **một đồng nghiệp cực kỳ thông minh, tài năng, nhưng vừa nhận việc hôm nay** — chưa biết gì về công ty, dự án, hay thói quen của bạn. *"Bạn giải thích càng chính xác điều mình muốn, kết quả càng tốt."*
> — Tài liệu prompt engineering của Anthropic [VỮNG]

Một nhân viên giỏi mà mới vào: nếu bạn nói "làm cái dashboard đi", họ sẽ làm một cái dashboard *chung chung, đoán mò*. Nếu bạn nói rõ cho ai, để làm gì, gồm những gì, theo phong cách nào — họ sẽ tỏa sáng. AI y hệt vậy.

Anthropic còn cho một **quy tắc vàng** để tự kiểm tra mệnh lệnh của bạn:

> *"Đưa prompt của bạn cho một đồng nghiệp ít biết về việc này và nhờ họ làm theo. Nếu họ thấy rối, AI cũng sẽ rối."* [VỮNG]

---

## 1.2. Bản đồ không phải lãnh thổ: lời nói của bạn LÀ bản thiết kế

Có một sự thật khó chịu: **AI không làm theo cái bạn *muốn*. Nó làm theo cái bạn *nói*.**

Khoảng cách giữa "điều tôi nghĩ trong đầu" và "điều tôi gõ ra" chính là nơi mọi kết quả tệ sinh ra. Bạn hình dung trong đầu một sản phẩm tinh tế, nhưng bạn chỉ gõ ba chữ. AI không truy cập được cái hình dung đó — nó chỉ có ba chữ. Và từ ba chữ, nó dựng lại phiên bản *trung bình* của ba chữ ấy.

Vì thế, nguyên lý số một của cả cuốn sách:

> **Mệnh lệnh của bạn chính là bản đặc tả (spec). Output chỉ tốt ngang với spec.** Mỗi chi tiết bạn bỏ sót là một chi tiết AI sẽ điền bằng giá trị mặc định — và mặc định luôn là nhạt.

---

## 1.3. "Mode collapse": lý do khoa học khiến output cứ same‑same

Đây là phần cốt lõi của chương. Vì sao output mặc định của AI lại *nhạt* một cách có hệ thống? Không phải ngẫu nhiên. Có cơ chế hẳn hoi.

### Thủ phạm: cách AI được "dạy cho ngoan"

Một model ngôn ngữ sau khi học xong kho văn bản khổng lồ sẽ được tinh chỉnh thêm bằng phản hồi của con người (kỹ thuật gọi là **RLHF** — học tăng cường từ phản hồi người). Bước này khiến AI lịch sự, hữu ích, an toàn hơn. Nhưng nó có một cái giá đo được:

> Nghiên cứu của Kirk và cộng sự (ICLR 2024) kết luận: *"RLHF làm giảm đáng kể độ đa dạng của output"* so với model chưa tinh chỉnh, tạo ra **một sự đánh đổi giữa khả năng tổng quát hóa và độ đa dạng.** [VỮNG]
> — *Understanding the Effects of RLHF on LLM Generalisation and Diversity*, arXiv:2310.06452

Điều tinh tế: độ đa dạng bị bóp nghẹt **mạnh nhất là *trong cùng một câu hỏi*.** Nghĩa là khi bạn hỏi một câu, model có xu hướng đưa ra *cùng một câu trả lời "an toàn" ở giữa*, lần nào cũng vậy. Đây chính xác là cảm giác "hỏi gì cũng ra đồ trung bình".

### Gốc rễ sâu hơn: con người thích cái quen thuộc

Tại sao việc dạy bằng phản hồi người lại bóp độ đa dạng? Vì **người chấm điểm thích cái quen.**

> Nghiên cứu về "Verbalized Sampling" (2025) chỉ ra **"thiên kiến quen thuộc" (typicality bias) trong dữ liệu phản hồi: người đánh giá có hệ thống ưa chuộng văn bản quen thuộc** — một hiệu ứng tâm lý học đã được biết rõ. [VỮNG]
> — arXiv:2510.01171

Hệ quả dây chuyền: người chấm thưởng cho cái quen → AI học rằng "quen = tốt" → AI mặc định cho ra cái quen thuộc nhất, tức là *trung bình của những gì nó từng thấy*. Đó là "mode collapse" — model co cụm về một vài "điểm hút" (attractor) và lặp lại chúng.

### OpenAI mô tả cùng một hiện tượng, bằng ngôn ngữ thẳng hơn

> *"Khi prompt thiếu chi tiết, model thường rơi về các khuôn mẫu tần suất cao trong dữ liệu huấn luyện."* Kết quả *"thường hợp lý và dùng được, nhưng dễ trôi về cấu trúc chung chung, phân cấp thị giác yếu, và những lựa chọn thiết kế hời hợt."* [VỮNG]
> — OpenAI, hướng dẫn thiết kế frontend với GPT‑5

Anthropic gọi thẳng kết quả của hiện tượng này bằng một cái tên đắt: **"AI slop"** — thứ thẩm mỹ rẻ tiền, đại trà mà AI tạo ra khi không được dẫn dắt. Trong tài liệu chính thức, họ thừa nhận model *"có xu hướng hội tụ về các output chung chung, 'đúng phân phối'"* và phải **chủ động chống lại** xu hướng đó. [VỮNG]

### Ghép lại: một bức tranh thống nhất

```
Người chấm thích cái quen  →  AI học "quen = tốt"  →  Khi bạn nói mơ hồ,
AI điền vào bằng cái quen thuộc nhất  →  Output = trung bình của Internet  →  "same-same"
```

**Đây là tin tốt.** Vì nếu sự nhạt đến từ *thiếu chi tiết* và *lực kéo về cái quen*, thì cách thắng nó rất rõ: **bơm chi tiết cụ thể vào, và chủ động đẩy model ra khỏi điểm hút.** Toàn bộ Chương 2, 3 là để làm đúng hai việc đó.

---

## 1.4. Một sự thật bất ngờ: AI *có thể* sáng tạo hơn cả chuyên gia

Đừng hiểu lầm "mode collapse" thành "AI không sáng tạo nổi". Ngược lại là đằng khác.

> Nghiên cứu đối chứng quy mô lớn của Stanford (Si, Yang & Hashimoto, 2024) với hơn 100 nhà nghiên cứu: **ý tưởng do AI tạo ra được đánh giá là *mới mẻ hơn* (p < 0.05) so với ý tưởng của chuyên gia người** — dù hơi kém về tính khả thi. [VỮNG]
> — *Can LLMs Generate Novel Research Ideas?*, arXiv:2409.04109

Nghĩa là tiềm năng sáng tạo *có sẵn trong model*. Vấn đề không phải "AI không có ý hay", mà là **ý hay bị chôn dưới lớp output an toàn mặc định**, và bạn phải biết cách đào nó lên.

Nhưng nghiên cứu đó cũng cảnh báo một cái bẫy chí mạng — và đây là bài học quan trọng nhất của chương:

> Dù AI sinh ra hàng nghìn ý tưởng, **độ đa dạng bị bão hòa rất nhanh: phần lớn ý sau chỉ là bản lặp của ý trước.** [VỮNG]

**Hệ quả thực chiến (ghi nhớ điều này):**

> Bạn **không** lấy được sự đa dạng bằng cách bảo AI "cho thêm 50 ý nữa". Bấm nút "tạo lại" mãi chỉ ra đồ na ná. Sự mới mẻ phải được **thiết kế bằng cách ra lệnh khác đi**, chứ không *lấy mẫu* thêm được. Đó là lý do Chương 3 tồn tại.

---

## 1.5. Thử ngay: cảm nhận lực kéo "nhạt"

Hãy tự mình thấy hiện tượng này. Mở AI bất kỳ và thử hai mệnh lệnh:

**Lệnh nhạt (mặc định):**
```
Viết cho tôi một đoạn mở đầu bài blog về cà phê.
```

**Lệnh có lực kéo ra khỏi vùng trung bình:**
```
Viết 5 đoạn mở đầu bài blog về cà phê, mỗi đoạn theo một góc nhìn HOÀN TOÀN khác
nhau và bất ngờ (ví dụ: góc nhìn của hạt cà phê, của nhà kinh tế học, của một
người mất ngủ kinh niên...). Sau đó tự chấm đoạn nào liều lĩnh nhất mà vẫn hay,
và giải thích vì sao.
```

Bạn sẽ thấy lệnh thứ hai cho ra thứ *khác hẳn về chất*. Bạn chưa học kỹ thuật nào ở đây — chỉ mới áp dụng trực giác từ chương này: **cụ thể + ép ra nhiều góc + ép tự đánh giá**. Phần còn lại của sách là làm việc này một cách có hệ thống và có bằng chứng.

---

## Tóm gọn Chương 1

- **Mô hình tư duy đúng:** AI là đồng nghiệp thiên tài nhưng mới vào, chưa biết bối cảnh. Nói càng rõ, càng tốt. *Quy tắc vàng:* nếu một người lạ đọc prompt mà thấy rối, AI cũng rối.
- **Lời nói của bạn LÀ bản thiết kế.** AI làm theo cái bạn *nói*, không phải cái bạn *nghĩ*. Mỗi chi tiết bỏ sót → AI điền bằng mặc định nhạt.
- **"Same‑same" có nguyên nhân khoa học:** việc dạy AI bằng phản hồi người (RLHF) + thiên kiến quen thuộc của người chấm → "mode collapse" → output co về trung bình. OpenAI: prompt mơ hồ → "khuôn mẫu tần suất cao". Anthropic gọi đó là *"AI slop"*.
- **Tin tốt:** vì nhạt đến từ *thiếu chi tiết* và *lực kéo về cái quen*, cách thắng là *bơm chi tiết cụ thể* + *chủ động đẩy model ra khỏi điểm hút*.
- **AI có thể sáng tạo hơn cả chuyên gia** (nghiên cứu Stanford) — nhưng độ đa dạng *bão hòa nhanh*. Mới mẻ phải được **thiết kế bằng cách ra lệnh**, không phải lấy mẫu thêm.

→ Tiếp theo: [Chương 2 — Bảy nguyên tắc của một mệnh lệnh tốt](02-nguyen-tac-menh-lenh-tot.md), bộ khung gốc để bơm đúng chi tiết.

# Chương 2 — Bảy nguyên tắc của một mệnh lệnh tốt

> Đây là bộ khung gốc. Bảy nguyên tắc dưới đây không phải "mẹo" — chúng là *cách bơm chi tiết cụ thể* để thắng lực kéo "nhạt" đã mô tả ở Chương 1. Gần như mọi kỹ thuật nâng cao ở các chương sau chỉ là biến thể của bảy điều này. Nắm chắc chương này, bạn đã đi trước phần lớn người dùng.

Một lưu ý xếp hạng ngay từ đầu: trong bảy nguyên tắc, **#1 (Cụ thể) là vua**. Sáu cái còn lại chủ yếu là những cách khác nhau để *trở nên cụ thể hơn*. Nghiên cứu và tài liệu chính hãng đều đồng thuận: **sự cụ thể đánh bại mọi câu thần chú.**

---

## Nguyên tắc 1 — Cụ thể và trực tiếp (lever mạnh nhất)

Nếu bạn chỉ nhớ một điều từ cả cuốn sách, hãy nhớ điều này.

> Anthropic: *"Nói rõ về định dạng và ràng buộc đầu ra mong muốn có thể cải thiện kết quả. Nếu bạn muốn hành vi 'vượt mong đợi', hãy yêu cầu thẳng thay vì trông chờ model tự suy ra từ prompt mơ hồ."* [VỮNG]

Ví dụ kinh điển từ tài liệu Anthropic, cho thấy một câu thêm vào thay đổi cả chất lượng:

| ❌ Kém hiệu quả | ✅ Hiệu quả |
|---|---|
| `Tạo một dashboard phân tích.` | `Tạo một dashboard phân tích. Bao gồm càng nhiều tính năng và tương tác liên quan càng tốt. Đi xa hơn mức cơ bản để tạo một bản triển khai đầy đủ tính năng.` |

Để "cụ thể" một cách có hệ thống, hãy trả lời năm câu trước khi gõ:

1. **Ai** sẽ đọc/dùng output này? (đối tượng quyết định giọng văn, độ sâu)
2. **Để làm gì?** (mục đích quyết định nội dung)
3. **Định dạng** ra sao? (đoạn văn xuôi? bảng? code? dài bao nhiêu?)
4. **Ràng buộc** gì? (cái gì *phải* có, cái gì *cấm*, công cụ/thư viện nào được dùng)
5. **Thế nào là tốt?** (tiêu chí — sẽ bàn kỹ ở Nguyên tắc 7)

> **Thử ngay.** Lấy một prompt bạn hay dùng và viết lại sao cho trả lời được cả 5 câu trên. Riêng việc này thường nâng chất lượng nhiều hơn mọi "từ ma thuật".

---

## Nguyên tắc 2 — Cho ngữ cảnh và *lý do tại sao*

AI khái quát hóa rất giỏi — nếu bạn cho nó hiểu *vì sao*. Một mệnh lệnh kèm động cơ luôn được thực thi tốt hơn mệnh lệnh trần trụi.

> Anthropic: *"Cung cấp bối cảnh hoặc động cơ phía sau chỉ thị... giúp Claude hiểu mục tiêu của bạn và phản hồi đúng trọng tâm hơn."* [VỮNG]

| ❌ Trần trụi | ✅ Kèm lý do |
|---|---|
| `KHÔNG dùng dấu ba chấm.` | `Phản hồi của bạn sẽ được đọc lên bằng máy đọc giọng nói, nên đừng bao giờ dùng dấu ba chấm vì máy không biết phát âm chúng.` |

Khi biết *tại sao*, AI tự suy ra hàng loạt trường hợp khác mà bạn quên liệt kê. Bạn không phải kể hết mọi luật — bạn cho nó *nguyên tắc*, nó tự áp dụng.

---

## Nguyên tắc 3 — Cho ví dụ (cách lái đáng tin nhất)

Muốn output đúng định dạng, đúng giọng, đúng cấu trúc? Đừng *mô tả* — hãy *làm mẫu*.

> Anthropic: *"Ví dụ là một trong những cách đáng tin cậy nhất để định hướng định dạng, giọng điệu và cấu trúc output của Claude. Một vài ví dụ được chọn kỹ có thể cải thiện đáng kể độ chính xác và nhất quán."* [VỮNG]

Ví dụ tốt cần:
- **Liên quan:** sát với trường hợp thật của bạn.
- **Đa dạng:** phủ cả ca biên, đủ khác nhau để AI không bắt chước nhầm một khuôn.
- **Có cấu trúc:** tách biệt rõ ví dụ với phần chỉ thị (xem Nguyên tắc 4).

Anthropic khuyên **3–5 ví dụ** cho kết quả tốt nhất.

> **Cảnh báo trung thực [TÙY]:** với các *model biết suy nghĩ* (reasoning models), nhồi quá nhiều ví dụ "mẫu suy luận" đôi khi *hại* hơn là không có. Hãy dùng ví dụ chủ yếu để **khóa định dạng và giọng văn**, đừng để dạy nó *cách suy nghĩ* — việc đó nó đã tự làm.

---

## Nguyên tắc 4 — Cấu trúc hóa mệnh lệnh

Khi một prompt trộn lẫn chỉ thị + bối cảnh + ví dụ + dữ liệu, AI dễ hiểu nhầm phần nào là phần nào. Hãy *đóng gói* từng loại nội dung.

Cách phổ biến và mạnh nhất với Claude là **thẻ XML** — những nhãn dạng `<chỉ_thị>...</chỉ_thị>`, `<bối_cảnh>...</bối_cảnh>`, `<ví_dụ>...</ví_dụ>`.

> Anthropic: *"Thẻ XML giúp Claude phân tích các prompt phức tạp một cách rõ ràng... Bọc mỗi loại nội dung trong thẻ riêng giúp giảm hiểu nhầm."* [VỮNG cho Claude — Claude được huấn luyện với cấu trúc XML]

Hai mẹo cấu trúc nữa, đều từ tài liệu chính hãng:

- **Khi thứ tự quan trọng, dùng danh sách đánh số.** "Cung cấp chỉ thị dưới dạng các bước tuần tự" khi sự đầy đủ/thứ tự của các bước có ý nghĩa.
- **Dữ liệu dài đặt lên *đầu*.** Với tài liệu dài (20k+ token), đặt dữ liệu *phía trên* câu hỏi: theo Anthropic, *"câu hỏi đặt ở cuối có thể cải thiện chất lượng tới 30%"* với input nhiều tài liệu. [VỮNG]

> **Lưu ý liên công cụ:** với GPT‑5/Codex, OpenAI khuyên dùng Markdown *"chỉ ở nơi đúng về mặt ngữ nghĩa"* (code, danh sách, bảng). Nguyên lý chung giống nhau: **cấu trúc rõ ràng giúp model đỡ đoán.**

---

## Nguyên tắc 5 — Giao vai trò, nhưng đúng việc (một sự thật bị hiểu lầm)

"Bạn là chuyên gia X" là câu được khuyên nhiều nhất trên mạng. Nó *có* tác dụng — nhưng **không phải tác dụng mà mọi người nghĩ.** Đây là một trong những hiểu lầm tốn kém nhất, nên ta nói thẳng:

**Sự thật A — Giao vai trò giúp ích cho *giọng văn, phong cách, hành vi*:**
> Anthropic: *"Đặt một vai trò trong system prompt giúp tập trung hành vi và giọng điệu của Claude cho trường hợp của bạn. Chỉ một câu cũng tạo khác biệt."* [VỮNG — cho giọng/hành vi]

**Sự thật B — Giao vai trò KHÔNG đáng tin để tăng *độ chính xác*:**
> Một nghiên cứu đối chứng quy mô lớn (Findings of EMNLP 2024) thử **162 nhân cách × 9 model × 2.410 câu hỏi MMLU** và kết luận: *"thêm nhân cách vào system prompt không cải thiện hiệu năng model"* so với khi không thêm. Chọn nhân cách "tốt nhất" một cách tự động *"không hơn gì chọn ngẫu nhiên."* [VỮNG]
> — arXiv:2311.10054

**Bài học [THỔI PHỒNG cho độ chính xác / VỮNG cho giọng văn]:**

> Dùng vai trò để điều khiển **giọng, đối tượng, phong cách, định dạng** — *"hãy viết cho một độc giả 12 tuổi"*, *"giọng một biên tập viên khó tính"*. **Đừng** trông chờ *"bạn là chuyên gia"* làm câu trả lời *chính xác hơn*. Muốn chính xác hơn, hãy tiêu token vào **sự cụ thể và ví dụ** (Nguyên tắc 1 & 3), không vào danh xưng.

(Ở Chương 3 ta sẽ thấy vai trò/nhân cách *có* một công dụng mạnh khác: làm **đa dạng hóa ý tưởng**. Nhưng đó là chuyện đa dạng, không phải chính xác.)

---

## Nguyên tắc 6 — Nói cái CẦN làm, đừng chỉ cấm

Một thay đổi nhỏ trong cách diễn đạt, hiệu quả lớn và nhất quán.

> Anthropic, nguyên văn: *"Hãy nói cho Claude điều cần làm thay vì điều không được làm — Thay vì: 'Đừng dùng markdown' — Hãy thử: 'Phản hồi của bạn nên gồm các đoạn văn xuôi mạch lạc.'"* [VỮNG]

Lý do: một lệnh cấm ("đừng X") để lại khoảng trống — *vậy thì làm gì?* — và AI lại điền vào bằng mặc định. Một lệnh khẳng định ("hãy làm Y") vừa cụ thể hơn, vừa được tuân thủ đáng tin hơn.

Kết hợp với Nguyên tắc 2 (cho lý do) thì càng mạnh: *"Hãy viết văn xuôi mạch lạc, vì bản này sẽ đăng báo in nơi gạch đầu dòng trông rời rạc."*

> **Tinh tế [TÙY]:** các model hiện đại *có thể* tuân theo lệnh cấm tốt hơn xưa, nên "đừng X" không còn phản tác dụng nặng như lời đồn "đừng nghĩ tới con voi hồng". Nhưng "hãy làm Y" vẫn tốt hơn vì nó *cụ thể hơn*.

---

## Nguyên tắc 7 — Định nghĩa "xong" = cho AI một cái đích đo được

Đây là nguyên tắc bị bỏ quên nhiều nhất, và là cầu nối sang các chương sau. **AI dừng lại khi công việc *trông có vẻ* xong.** Nếu bạn không định nghĩa "xong", thì "trông có vẻ xong" là tín hiệu duy nhất nó có — và bạn trở thành người duy nhất phát hiện lỗi.

Có hai phần:

**(a) Cho tiêu chí thành công rõ ràng.** Thay vì để AI tự đoán thế nào là tốt, hãy nói thẳng. Đặc biệt mạnh khi *kèm cách tự kiểm tra*:

| ❌ Mơ hồ | ✅ Có tiêu chí + tự kiểm |
|---|---|
| `Viết hàm kiểm tra email.` | `Viết hàm kiểm tra email. Ví dụ ca kiểm thử: a@example.com → đúng, "invalid" → sai, a@.com → sai. Chạy thử các ca này sau khi viết xong.` |
| `Làm dashboard đẹp hơn.` | `[dán ảnh thiết kế] Hãy dựng theo thiết kế này. Chụp lại kết quả và so với bản gốc, liệt kê khác biệt rồi sửa.` |

**(b) Yêu cầu nỗ lực một cách tường minh.** Nhớ lại Nguyên tắc 1: nếu muốn "vượt mong đợi", phải *yêu cầu*. Câu *"Đi xa hơn mức cơ bản, bao gồm càng nhiều tính năng liên quan càng tốt"* là một "công tắc nỗ lực" được tài liệu chính hãng xác nhận có tác dụng làm output phong phú hơn. [VỮNG cho cơ chế; xem Chương 5 về cách diễn đạt]

Nguyên tắc 7 quan trọng đến mức Chương 4 (giữ cho đúng) và Chương 6 (quy trình) gần như được xây trọn quanh nó.

---

## Ghép bảy nguyên tắc thành một mệnh lệnh

Đây là cùng một yêu cầu, viết theo hai cách. Cảm nhận khác biệt:

**Trước (vi phạm gần hết):**
```
Viết cho tôi bài giới thiệu sản phẩm.
```

**Sau (áp dụng cả bảy):**
```
Bối cảnh: Tôi ra mắt một app ghi chú cho sinh viên y khoa; điểm khác biệt là tự
tạo thẻ ôn tập từ ghi chú. (NT2: lý do/đối tượng)

Hãy viết phần giới thiệu sản phẩm cho trang đích. (NT1: cụ thể việc)

Yêu cầu:
1. Giọng: gọn, tự tin, không sáo rỗng marketing — như một đàn anh khóa trên mách
   nước. (NT5: vai trò cho giọng)
2. Cấu trúc: một tiêu đề chính, ba đoạn ngắn, một câu kêu gọi hành động. (NT4)
3. Hãy viết văn xuôi mạch lạc, không gạch đầu dòng. (NT6: nói cái cần làm)
4. Đi xa hơn mức "mô tả tính năng" — chạm vào nỗi đau thật của người học thi. (NT7b)

Tiêu chí "đạt": một sinh viên y đọc xong hiểu ngay lợi ích và muốn thử. Trước khi
chốt, tự rà lại bản nháp theo tiêu chí này và sửa nếu chưa đạt. (NT7a)
```

Cùng một model, hai thế giới kết quả khác nhau.

---

## Tóm gọn Chương 2

1. **Cụ thể & trực tiếp** — lever mạnh nhất; muốn "vượt mong đợi" thì phải *yêu cầu thẳng*. Trả lời 5 câu: ai / để làm gì / định dạng / ràng buộc / thế nào là tốt.
2. **Cho lý do "tại sao"** — AI khái quát từ động cơ; bạn cho nguyên tắc, nó tự áp dụng.
3. **Cho ví dụ (3–5, đa dạng)** — cách lái đáng tin nhất cho định dạng/giọng. Dùng để khóa *hình thức*, không để dạy *suy luận*.
4. **Cấu trúc hóa** — thẻ XML / mục rõ ràng; bước có thứ tự thì đánh số; dữ liệu dài đặt lên đầu.
5. **Giao vai trò đúng việc** — mạnh cho *giọng/phong cách*, **không** đáng tin cho *độ chính xác* (nghiên cứu MMLU bác bỏ). Muốn chính xác: cụ thể + ví dụ.
6. **Nói cái CẦN làm** — "hãy làm Y" tốt hơn "đừng làm X" vì cụ thể hơn và dễ tuân thủ.
7. **Định nghĩa "xong"** — AI dừng khi *trông có vẻ* xong; hãy cho tiêu chí đo được + cách tự kiểm + yêu cầu nỗ lực tường minh.

→ Tiếp theo: [Chương 3 — Ra lệnh để có ý tưởng đột phá](03-y-tuong-dot-pha.md). Nền đã xong; giờ ta học cách chủ động kéo AI ra khỏi vùng trung bình.

# Chương 3 — Ra lệnh để có ý tưởng đột phá (mà chưa cần lo đúng/sai)

> Chương 1 chỉ ra *kẻ thù* (mode collapse). Chương 2 dạy *bơm chi tiết*. Chương này là trái tim của lời hứa thứ nhất: **làm sao ra lệnh để AI tạo ra cái MỚI, độc đáo, out‑of‑the‑box** — chứ không phải bản trung bình của Internet. (Việc giữ cho cái mới ấy *đúng* là Chương 4.)
>
> Mọi kỹ thuật ở đây đều phục vụ một ý tưởng lớn, đã chứng minh ở Chương 1: **sự mới mẻ phải được *thiết kế*, không *lấy mẫu*.** Bấm "tạo lại" mãi chỉ ra đồ na ná.

Trước khi học cái có tác dụng, hãy gạch tên hai thứ **không** có tác dụng — để bạn khỏi phí thời gian.

---

## 3.0. Hai cái bẫy: "tăng nhiệt độ" và "hãy sáng tạo đi"

**Bẫy 1 — Vặn "nhiệt độ" (temperature) để thành sáng tạo. [THỔI PHỒNG]**
Nhiều người tin có một "núm sáng tạo". Hai nghiên cứu độc lập nói không:
> *"Ảnh hưởng của nhiệt độ lên sáng tạo tinh tế và yếu hơn nhiều so với tuyên bố 'tham số sáng tạo'"* — nhiệt độ *"tương quan yếu với tính mới"* và *"tương quan vừa với sự thiếu mạch lạc"* (càng cao càng lủng củng). [VỮNG] (arXiv:2405.00492)
> Một nghiên cứu khác: nhiệt độ từ 0.0 đến 1.6 *"không có ảnh hưởng có ý nghĩa thống kê"* lên khả năng giải quyết vấn đề. [VỮNG] (arXiv:2402.05201)

Kết luận: vặn nhiệt độ chỉ đánh đổi sự mạch lạc lấy chút nhiễu. Nó **không** mở khóa ý tưởng đột phá.

**Bẫy 2 — Bảo "hãy sáng tạo / nghĩ out‑of‑the‑box đi". [THỔI PHỒNG / yếu]**
Tính từ không tạo ra sáng tạo. Như Chương 1 đã thấy, sự đa dạng đến từ *cấu trúc của mệnh lệnh*, không từ lời cổ vũ. "Hãy sáng tạo" gần như vô nghĩa với model; nó vẫn rơi về điểm hút quen thuộc. *(Đây là suy luận từ tổng hợp bằng chứng, không phải một nghiên cứu đơn lẻ — nhưng mọi dấu hiệu đều chỉ về hướng "cấu trúc thắng hô hào".)*

Giờ là những thứ **thực sự** có tác dụng.

---

## 3.1. Kỹ thuật #1: Lấy mẫu có chủ đích — "cho N phương án kèm xác suất"

Đây là kỹ thuật đơn lẻ mạnh nhất, và đẹp ở chỗ nó tấn công thẳng vào *gốc rễ* của mode collapse.

Nhớ lại Chương 1: model bị kéo về **một** câu trả lời "quen thuộc nhất". Vậy hãy ép nó *trải ra cả phân phối* thay vì rút đúng đỉnh.

Thay vì hỏi:
```
Viết một câu chuyện về robot.
```
Hãy hỏi:
```
Tạo 5 câu chuyện về robot, KÈM theo xác suất (mức độ "điển hình") mà bạn gán cho
mỗi câu. Tôi muốn thấy cả những phương án xác suất thấp.
```

Việc yêu cầu model *gọi tên phân phối* kéo nó ra khỏi cái mode duy nhất. Tên kỹ thuật trong nghiên cứu là **Verbalized Sampling**.

> Kết quả đo được: kỹ thuật này *"tăng độ đa dạng 1.6–2.1 lần so với prompt thường"* và *"cải thiện điểm đánh giá của con người 25.7%"* trong viết sáng tạo. Quan trọng nhất: *"VS cải thiện hiệu năng mà **không** hy sinh độ chính xác hay an toàn"* — độ chính xác *"gần như 1.0 ở mọi phương pháp."* [VỮNG]
> — *Verbalized Sampling*, arXiv:2510.01171

Ba điều cần nhớ:
- **Nó giữ được tính đúng** — đây chính là "mới mà vẫn đúng" có bằng chứng sạch nhất.
- **Model càng mạnh càng hưởng lợi nhiều.**
- **Cái giá:** bạn sinh ra một *tập* phương án thay vì một, nên tốn token/thời gian hơn. Đáng, khi bạn đang săn ý đột phá.

> **Thử ngay.** Bất kỳ lúc nào bạn muốn ý tưởng, đừng xin một cái. Xin: *"Cho tôi 7 hướng tiếp cận, từ an toàn nhất đến liều lĩnh nhất. Với mỗi cái, ghi một dòng vì sao nó có thể sai."*

---

## 3.2. Kỹ thuật #2: Suy luận từng bước + nhân cách "thường" — bộ đôi thắng cả con người

Một nhóm Columbia đo lường *tại sao* ý tưởng AI kém đa dạng hơn ý tưởng của một *nhóm* người, và tìm ra hai rào cản — cùng cách phá:

> *"Ý tưởng từ các mẫu người độc lập đa dạng hơn ý tưởng từ các mẫu AI độc lập."* Hai rào cản: (1) **cố định cá nhân** — *"output đầu ràng buộc các ý sau"* (AI bị "dính" ý đầu giống người); (2) **gộp tập thể** — AI *"gộp tri thức vào một phân phối thống nhất"* thay vì phân mảnh như các nhóm người khác nhau. [KHÁ]
> — arXiv:2602.20408

Cách phá, theo chính nghiên cứu:
- **Suy luận từng bước (chain‑of‑thought)** *"giảm sự cố định bằng cách khuyến khích lập luận có cấu trúc."*
- **Nhân cách "thường" (ordinary personas)** *"đóng vai trò gợi ý lấy mẫu đa dạng, neo việc sinh ý vào các vùng khác nhau của không gian ngữ nghĩa."*
- **Kết hợp cả hai cho độ đa dạng cao nhất — *vượt cả con người*.**

Đây chính là công dụng *thật* của vai trò/nhân cách mà Chương 2 đã hứa nói tiếp: **không phải để chính xác hơn, mà để *trải rộng* không gian ý tưởng.**

```
Hãy nghĩ ra cách quảng bá một tiệm sách cũ. Lần lượt nhập vai 6 người RẤT khác
nhau (một bà nội trợ, một dân startup, một thủ thư về hưu, một rapper, một nhà
kinh tế học, một đứa trẻ 10 tuổi). Với mỗi người, suy nghĩ từng bước theo cách
HỌ sẽ nghĩ, rồi đưa ra một ý mà chỉ người đó mới nghĩ ra.
```

Chú ý: dùng nhân cách **đa dạng và liên quan**, không phải nhân cách nhân khẩu học vô nghĩa (cái đó vô ích hoặc phản tác dụng — Chương 2). Mục tiêu là *trải các góc nhìn*, không phải dán nhãn.

---

## 3.3. Kỹ thuật #3: Lùi một bước về nguyên lý gốc (Step‑Back)

Ý tưởng đột phá thường đến từ việc *kéo bài toán lên một tầng trừu tượng*, rồi từ đó nhìn xuống. Khi còn dính ở bề mặt, model chỉ khớp mẫu quen.

> Kỹ thuật "Take a Step Back" (Google DeepMind, ICLR 2024): yêu cầu model *trước hết rút ra khái niệm/nguyên lý cấp cao* đằng sau câu hỏi, *rồi* mới giải. Kết quả tăng trên các bài đo lý luận: Vật lý +7%, Hóa +11%, một số bài hỏi‑đáp phức tạp +27%. [VỮNG]
> — arXiv:2310.06117

Với sáng tạo, "lùi một bước" mở ra tái tổ hợp xuyên ngành: khi bài toán được kéo lên thành nguyên lý, model có thể mượn lời giải từ lĩnh vực khác.

```
Trước khi đề xuất tính năng cho app gọi xe, hãy lùi một bước: vấn đề CỐT LÕI ở
đây là gì (về mặt nguyên lý — niềm tin? sự chờ đợi? thông tin bất đối xứng?).
Nêu nguyên lý đó, rồi tìm xem những ngành KHÁC (hàng không, bệnh viện, hẹn hò
online) đã giải nguyên lý đó thế nào, rồi mượn cách giải hay nhất sang đây.
```

---

## 3.4. Kỹ thuật #4: Loại suy chéo ngành — "điều gì làm chuyên gia bất ngờ"

Liên quan chặt với Step‑Back: ép model *tự sinh ra các ví dụ/loại suy* từ những lĩnh vực xa trước khi trả lời.

> Kỹ thuật "Analogical Reasoning" (Google DeepMind/Stanford, ICLR 2024): cho model tự tạo các ví dụ liên quan trước khi giải, *"vượt cả chain‑of‑thought zero‑shot và few‑shot thủ công"* trên nhiều bài lý luận. [KHÁ→VỮNG về hướng; độ lớn chưa trích được con số]
> — arXiv:2310.01714

Câu lệnh thực chiến để săn cái bất ngờ:
```
Đề xuất mô hình kinh doanh cho quán cà phê. Nhưng trước tiên, hãy nghĩ: một
chuyên gia trong ngành sẽ thấy đề xuất nào là HIỂN NHIÊN và nhàm? Liệt kê 3 cái
hiển nhiên đó rồi LOẠI chúng. Sau đó tìm loại suy từ một ngành hoàn toàn khác
(game online, tôn giáo, phòng gym) để tạo một mô hình khiến chính chuyên gia
quán cà phê cũng phải bất ngờ — nhưng vẫn khả thi.
```

Hai chiêu nhỏ rất mạnh ẩn trong đó: **(a) liệt kê cái hiển nhiên rồi cấm dùng** (ép model rời điểm hút), và **(b) lấy mốc "khiến chuyên gia bất ngờ"** (đặt thanh xà cao hơn "đúng").

---

## 3.5. Kỹ thuật #5: Nghịch lý của ràng buộc — càng giới hạn, càng sáng tạo

Trực giác sai lầm phổ biến: "muốn AI sáng tạo thì cho nó tự do." Thực tế ngược lại. **Ràng buộc cụ thể là thứ ép model rời khỏi mặc định.** Đây là phát hiện trùng khớp giữa OpenAI và Anthropic.

OpenAI, về thiết kế giao diện, đưa ra *luật cứng* thay vì để model tự do — và chính sự giới hạn tạo ra cái đẹp khác biệt:
> *"Định nghĩa ràng buộc ngay từ đầu: một tiêu đề H1, không quá sáu mục, tối đa hai kiểu chữ, một màu nhấn, một nút kêu gọi hành động."* Và: *"Đừng dùng nền phẳng một màu; hãy dùng gradient, hình ảnh, hoạ tiết tinh tế để tạo không khí."* [VỮNG]

Anthropic cũng cấm thẳng những lựa chọn "mặc định nhạt" để buộc model sáng tạo (trong khối hướng dẫn thiết kế frontend chính thức):
> *"Tránh phông chữ chung chung như Arial, Inter; chọn những lựa chọn đặc biệt... Hãy diễn giải sáng tạo và đưa ra những lựa chọn bất ngờ... bắt buộc phải nghĩ ra ngoài cái hộp!"* [VỮNG — nguồn neo ở `research/00-anthropic-direct.md` §A.1]

Nguyên lý tổng quát, áp dụng cho *mọi* loại sáng tạo, không chỉ giao diện:

> **Đừng nói "hãy sáng tạo". Hãy *cấm cái tầm thường và áp ràng buộc cụ thể*.** "Không được dùng [ba ý hiển nhiên]. Phải dùng đúng [hai nguyên liệu lạ]. Trong khuôn khổ đó, hãy làm tôi bất ngờ."

Ràng buộc làm hai việc: chặn đường về điểm hút, và buộc model tái tổ hợp theo cách mới.

---

## 3.6. Quy trình lắp ráp: Phân kỳ → Hội tụ

Các kỹ thuật trên là *phân kỳ* (mở rộng không gian ý). Nhưng đột phá = ý mới **được chọn lọc khắt khe**. Quy trình hai nhịp:

**Nhịp 1 — Phân kỳ (đẩy ra xa):** dùng 3.1–3.5 để có nhiều phương án thật sự khác nhau. *Tách riêng nhịp này.* Đừng để model tự kiểm duyệt khi đang sinh ý — bảo nó "chưa đánh giá vội, cứ tung ý đã".

**Nhịp 2 — Hội tụ (siết lại):** giờ mới phê bình và chọn.
> Kỹ thuật "Self‑Refine" (NeurIPS 2023): model sinh → tự phê bình → sửa → lặp, cải thiện *"~20% tuyệt đối"* về chất lượng trên 7 loại tác vụ. [VỮNG]
> — arXiv:2303.17651

```
Bước 1: Cho tôi 8 ý tưởng tên thương hiệu, càng khác nhau càng tốt, từ an toàn
đến điên rồ. CHƯA đánh giá.
Bước 2: Giờ đóng vai một giám khảo khó tính. Chấm từng ý theo 3 tiêu chí (dễ nhớ,
độc đáo, không trùng đối thủ). Loại 5 ý yếu nhất.
Bước 3: Lấy 3 ý còn lại, làm mỗi cái sắc hơn một bậc, rồi chọn 1 và bảo vệ lựa chọn.
```

> **Cảnh báo cực kỳ quan trọng [VỮNG]:** "tự phê bình" làm output *hay hơn*, nhưng **một model tự chấm bài của chính nó KHÔNG phải là kiểm chứng độc lập.** Nó hay bỏ sót lỗi của chính mình, thậm chí "sửa" đáp án đúng thành sai. Self‑Refine là công cụ *biên tập*, không phải công cụ *xác minh sự thật*. Việc giữ cho ý mới *đúng* cần một lớp kiểm tra độc lập — toàn bộ Chương 4.

---

## 3.7. Áp vào coding agent: chống "code chung chung"

Với Claude Code / Codex, "mode collapse" biểu hiện thành **code rập khuôn, giải pháp tổng quát nhạt, không khớp dự án**. Hai liều thuốc, mỗi hãng một câu:

- **Codex/OpenAI:** *"Tuân theo quy ước của codebase: bám theo mẫu, helper, cách đặt tên, định dạng đã có."* — biến "tổng quát chung chung" thành "khớp đúng nhà bạn".
- **Claude/Anthropic:** trỏ thẳng tới mẫu sẵn có — *"Hãy xem cách các widget hiện có được làm ở trang chủ để hiểu khuôn mẫu. HotDogWidget.php là ví dụ tốt. Theo khuôn đó để làm..."*

Nghĩa là: với coding, "out‑of‑the‑box" thường **không** phải là "phát minh kiểu lạ", mà là **khớp sâu với ngữ cảnh dự án** + giải đúng *gốc* vấn đề. Ta sẽ đào sâu ở Chương 6–7.

---

## Tóm gọn Chương 3

- **Bỏ qua hai cái bẫy:** vặn *nhiệt độ* [THỔI PHỒNG] và hô *"hãy sáng tạo"* [yếu]. Sáng tạo đến từ *cấu trúc mệnh lệnh*, không từ núm vặn hay tính từ.
- **#1 Lấy mẫu có chủ đích** *("cho N phương án kèm xác suất/mức liều")* — mạnh nhất, tăng đa dạng 1.6–2.1×, **giữ được độ chính xác**. [VỮNG]
- **#2 Suy luận từng bước + nhân cách đa dạng** — bộ đôi cho độ đa dạng *vượt cả con người*. Vai trò dùng để *trải góc nhìn*, không phải để chính xác. [KHÁ]
- **#3 Lùi một bước về nguyên lý** & **#4 Loại suy chéo ngành** — kéo bài toán lên tầng trừu tượng để tái tổ hợp xuyên lĩnh vực; mốc "khiến chuyên gia bất ngờ". [VỮNG/KHÁ]
- **#5 Nghịch lý ràng buộc** — đừng cho tự do, hãy *cấm cái tầm thường + áp ràng buộc cụ thể*. OpenAI và Anthropic trùng quan điểm. [VỮNG]
- **Quy trình Phân kỳ → Hội tụ:** tung ý trước (chưa đánh giá), siết sau (phê bình + chọn, ~20% chất lượng nhờ Self‑Refine). **Nhưng tự‑chấm ≠ kiểm chứng độc lập.** [VỮNG]

# Chương 4 — Mới mà vẫn đúng: giữ cho AI không bịa

> Chương 3 dạy cách kéo AI ra khỏi vùng an toàn để có cái mới. Nhưng có một sự thật khó chịu mà bạn phải đối diện: **cùng một cơ chế tạo ra sáng tạo cũng tạo ra ảo giác (bịa đặt).** Đẩy model "ra xa" mà không có dây neo, bạn sẽ nhận về thứ *nghe rất kêu nhưng sai*. Chương này là về sợi dây neo — làm sao để "ấn tượng VÀ đúng", không phải "ấn tượng nhưng bịa".

---

## 4.1. Vì sao "mới" và "bịa" là hai mặt của một đồng xu

Đây không phải lời cảnh báo đạo đức suông. Nó có cơ sở:

> Tổng hợp từ nhiều nghiên cứu: *"chính những cơ chế gây ra ảo giác cũng thúc đẩy tính sáng tạo và độc đáo của model; loại bỏ hoàn toàn ảo giác có thể bóp nghẹt tiềm năng sáng tạo này."* Ngược lại, siết grounding quá tay dẫn tới *"sinh nội dung quá thận trọng, giảm khả năng tạo output đa dạng."* [KHÁ]

Hệ quả thực tế: bạn **không** muốn "tắt sáng tạo để hết bịa". Bạn muốn **để model bay xa khi sinh ý, rồi kéo về thực tại khi chốt sự thật.** Đó là lý do quy trình Phân kỳ → Hội tụ ở Chương 3 phải nối tiếp bằng một lớp *grounding + kiểm chứng* ở đây.

Một tin tốt cụ thể: không phải cách "chống bịa" nào cũng giết sáng tạo.
> Nghiên cứu so sánh các kỹ thuật giảm ảo giác: *"Chain‑of‑Verification (CoVe) làm tăng tư duy phân kỳ, DoLa bóp nghẹt nó, RAG gần như trung tính"* — *"giảm ảo giác không đồng nghĩa giảm sáng tạo"*, mà tùy phương pháp. [KHÁ]
> — arXiv:2512.11509

Bài học: chọn cách grounding theo mục tiêu. **Tự kiểm chứng (CoVe) vừa tăng độ đúng vừa giữ sáng tạo** — đó là kỹ thuật ta sẽ dùng nhiều nhất.

---

## 4.2. Bốn liều thuốc grounding (cho phần "sự thật" của output)

Đây là bốn câu/chỉ thị, từ tài liệu chính hãng, đều rẻ và hiệu quả cao.

### Liều 1 — Cho phép AI nói "Tôi không biết"

Cái rẻ nhất, hiệu quả nhất, mà gần như không ai dùng.

> Anthropic, nguyên văn: *"Cho phép Claude nói 'tôi không biết': Hãy tường minh cho Claude quyền thừa nhận sự không chắc chắn. Kỹ thuật đơn giản này có thể **giảm mạnh** thông tin sai."* [VỮNG]
> — Tài liệu *Reduce hallucinations*, Anthropic

Vì sao hiệu nghiệm? Mặc định, model cảm thấy "bị buộc phải trả lời" → khi không biết, nó *bịa* cho có. Một câu cho phép rút lui phá vỡ áp lực đó.

```
Nếu bạn không chắc chắn hoặc không có đủ thông tin, hãy nói thẳng "tôi không
chắc" thay vì đoán. Tôi coi trọng một câu "không biết" trung thực hơn một câu
trả lời nghe hay mà có thể sai.
```

### Liều 2 — "Đọc/trích trước, kết luận sau" (grounding bằng trích dẫn)

Khi làm việc trên tài liệu dài, ép model *trích nguyên văn* phần liên quan *trước*, rồi mới lập luận trên đó.

> Anthropic: *"Dùng trích dẫn trực tiếp để neo vào sự thật"* — rút trích nguyên văn từ tài liệu dài trước; *"Xác minh bằng trích dẫn... Nếu không tìm được câu trích, model phải rút lại tuyên bố."* [VỮNG]

Cơ chế: trích dẫn buộc câu trả lời phải *bám* vào văn bản thật, cắt đường cho model "tự chế" giữa biển nội dung.

### Liều 3 — "Điều tra trước khi trả lời" (cho coding agent)

Với Claude Code / Codex, ảo giác hay xảy ra khi model *phán về code mà nó chưa mở ra đọc*. Liều thuốc, nguyên văn từ Anthropic:

> *"Không bao giờ suy đoán về code bạn chưa mở. Nếu người dùng nhắc tới một file cụ thể, bạn PHẢI đọc file đó trước khi trả lời. Hãy điều tra và đọc các file liên quan TRƯỚC khi trả lời câu hỏi về codebase."* [VỮNG]

Áp dụng rộng hơn coding: với *bất kỳ* câu hỏi nào có nguồn kiểm chứng được (file, link, dữ liệu), hãy bảo AI *đi lấy nguồn thật* thay vì trả lời từ trí nhớ.

### Liều 4 — Tự kiểm theo một tiêu chí cụ thể (CoVe nhẹ)

> Anthropic: *"Yêu cầu Claude tự kiểm: thêm câu như 'Trước khi kết thúc, hãy đối chiếu câu trả lời với [tiêu chí].' Điều này bắt lỗi đáng tin cậy, đặc biệt với code và toán."* [VỮNG]

Mấu chốt là cụm **"đối chiếu với *[tiêu chí cụ thể]*"** — không phải "kiểm tra lại đi" chung chung. Tiêu chí càng cụ thể, lần tự‑kiểm càng có lực.

---

## 4.3. Giới hạn của tự‑kiểm: vì sao bạn cần một con mắt *độc lập*

Đây là điểm tinh tế nhất chương, và là nơi phần lớn "quy trình AI" trên mạng sai.

Bốn liều trên giúp model *tự tốt hơn*. Nhưng có một trần kính: **một model tự chấm bài của chính nó không phải là kiểm chứng độc lập.**

> Nghiên cứu Stanford về ý tưởng AI nêu thẳng *"thất bại của việc LLM tự đánh giá"* như một vấn đề mở. Self‑Refine cải thiện *chất lượng* nhưng một tuyên bố mới do model *tự chấm* thì **chưa được xác minh độc lập**. [VỮNG]

Vì sao? Vì cùng một model, cùng một "điểm mù". Lỗi nào nó không thấy khi *viết*, nó cũng không thấy khi *tự đọc lại* — đó là cùng bộ não. Nó có thể tự tin xác nhận một điều sai.

**Nguyên lý nền tảng:** *Người tạo ra một thứ không thể là người xác minh cuối cùng cho thứ đó.* Muốn kiểm chứng thật, bạn cần một **con mắt mới** — không chia sẻ điểm mù với người viết.

Cách hiện thực hóa với AI (cùng một ý, ba mức từ rẻ tới chắc):

**(a) Một "ngữ cảnh sạch" mới.** Mở một phiên/cửa sổ mới, *chưa thấy* quá trình tạo ra output, và đưa cho nó *bản kết quả + tiêu chí*, bảo nó tìm lỗi.
> Anthropic gọi đây là chiêu mạnh nhất của làm việc song song: *"Một ngữ cảnh mới giúp việc review code tốt hơn vì Claude sẽ không thiên vị code mà chính nó vừa viết."* [VỮNG]

**(b) Một "trợ lý phụ" (subagent) đóng vai phản biện.** Trong Claude Code:
> *"Trước khi coi một việc là xong, hãy để một subagent review phần thay đổi trong một ngữ cảnh mới và báo cáo các lỗ hổng."* Người review *"chỉ thấy phần diff và tiêu chí bạn đưa, không thấy lý lẽ đã tạo ra thay đổi, nên nó đánh giá kết quả trên giá trị tự thân."* [VỮNG]

Codex có chiêu tương tự: dùng một lượt chạy riêng để review.

**(c) Kiểm tra khách quan (mạnh nhất, dùng bất cứ khi nào có thể).** Đừng hỏi ý kiến — hãy *chạy thử thực tế*: chạy bộ test, mở lại nguồn và đối chiếu nguyên văn, tính lại con số, chụp màn hình so sánh. Một bài test chạy ra "pass/fail" không có điểm mù; nó là *thực tại*, không phải ý kiến.

> **Quan trọng — đưa địa chỉ, đừng đưa tóm tắt.** Khi nhờ con mắt độc lập kiểm tra, hãy cho nó *tự đi đọc nguồn/kết quả thật* (chỉ cho nó **ở đâu**), đừng đưa nó *bản tóm tắt của bạn về kết quả*. Nếu bạn đưa bản tóm tắt do chính bạn viết, bạn đã âm thầm tiêm điểm mù của mình vào "người kiểm tra" — và nó không còn độc lập nữa.

---

## 4.4. Cảnh báo: vài "power‑phrase" có thể đánh đổi *đúng* lấy *nghe kêu*

Một số mẹo tăng "sự tự tin" của output lại *giảm* tính trung thực. Ví dụ rõ nhất là gây áp lực cảm xúc (kiểu "việc này cực kỳ quan trọng với sự nghiệp của tôi" — sẽ mổ xẻ ở Chương 5):

> Áp lực cảm xúc có thể đẩy model về phía *output nghe tự tin* thay vì *output đúng*. Tránh dùng những chiêu này ở chỗ mà sự chính xác và trung thực là tối quan trọng. [TÙY]

Quy tắc: ở những việc **fact‑bearing** (mang tính sự thật, có hệ quả thật — số liệu, tư vấn, kết luận nghiên cứu), hãy ưu tiên các liều grounding ở 4.2 và con mắt độc lập ở 4.3, và *cảnh giác* với mọi mẹo chỉ làm output "nghe chắc chắn hơn".

---

## 4.5. Quy trình "Mới mà vẫn đúng" — bản lắp ráp hoàn chỉnh

Ghép Chương 3 + 4 thành một đường ống bốn nhịp. (Đây là *tổng hợp* từ các nguồn đã dẫn, không phải một nghiên cứu đơn lẻ — nêu rõ để bạn biết.)

```
1. PHÂN KỲ  → Dùng kỹ thuật Chương 3 (N phương án + xác suất, nhân cách, loại suy,
              ràng buộc) để thoát mode collapse. "Chưa đánh giá vội."     [VỮNG]

2. HỘI TỤ   → Sinh nhiều, rồi tự phê bình & chọn lọc (Self‑Refine ~20%).
              Coi đây là BIÊN TẬP, không phải xác minh.                    [VỮNG]

3. GROUNDING→ Với các tuyên bố sự thật còn lại: bắt model đọc/trích nguồn
              thật, cho phép nói "không biết", tự đối chiếu tiêu chí (CoVe).[VỮNG/KHÁ]

4. KIỂM ĐỘC → Một con mắt MỚI (phiên mới / subagent phản biện / chạy test thật),
   LẬP        tự đi đọc nguồn — KHÔNG đọc bản tóm tắt của bạn.             [VỮNG]
```

Ba nhịp đầu làm output *vừa mới vừa gọn*. Nhịp 4 là cái khiến bạn *dám tin* nó. Bỏ nhịp 4, bạn chỉ có thứ "nghe hay" — đúng kiểu bẫy mà cả cuốn sách muốn bạn tránh.

> **Thử ngay (mẫu prompt 2 lượt cho việc fact‑bearing).**
> *Lượt 1:* "Hãy đề xuất 3 hướng cho [vấn đề], mỗi hướng kèm một dòng 'điểm yếu nhất có thể sai'. Với mọi số liệu hay tuyên bố thực tế, đánh dấu [cần kiểm] nếu bạn không chắc."
> *Lượt 2 (phiên/agent mới):* "Đây là một đề xuất [dán]. Đừng tin nó. Hãy tự đi tra từng tuyên bố có đánh dấu [cần kiểm] từ nguồn gốc, và báo cáo cái nào không đứng vững."

---

## Tóm gọn Chương 4

- **Mới và bịa cùng một cơ chế.** Đừng "tắt sáng tạo cho hết bịa"; hãy *để bay xa khi sinh ý, kéo về thực tại khi chốt sự thật*.
- **Bốn liều grounding [VỮNG]:** (1) cho phép nói *"không biết"*; (2) *trích nguồn trước, kết luận sau*; (3) *"điều tra/đọc trước khi trả lời"*; (4) *tự đối chiếu một tiêu chí cụ thể* (CoVe — còn giúp giữ sáng tạo).
- **Tự‑kiểm có trần kính:** một model tự chấm bài của chính nó **không** phải kiểm chứng độc lập (cùng điểm mù). *Người tạo ≠ người xác minh.*
- **Con mắt độc lập, ba mức:** phiên/ngữ cảnh sạch mới → subagent phản biện → *kiểm tra khách quan* (chạy test, đối chiếu nguồn). **Đưa địa chỉ nguồn, đừng đưa tóm tắt của bạn** — nếu không, "người kiểm tra" chỉ là con rối lặp lại điểm mù của bạn.
- **Cảnh giác mẹo "nghe kêu":** vài power‑phrase (áp lực cảm xúc) đánh đổi *đúng* lấy *tự tin*. Việc mang tính sự thật → ưu tiên grounding + kiểm độc lập.

# Chương 5 — Power‑phrases: câu ngắn, hiệu quả lớn (và cái nào là lừa)

> Đây là chương bạn chờ đợi: những **câu/từ ngắn** mà khi thêm vào prompt thực sự làm tăng kết quả. Nhưng đây cũng là chương *bóc phốt*. Thị trường "prompt thần thánh" đầy lời đồn được chép đi chép lại mà không ai kiểm chứng. Tôi sẽ xếp hạng chúng theo bằng chứng thật, và nói thẳng cái nào là vàng, cái nào là vàng mã.
>
> **Một sự thật khung lên toàn chương:** *model càng tự biết suy nghĩ, các câu thần chú cũ càng mất tác dụng.* Rất nhiều mẹo nổi tiếng 2022–2023 ra đời trên các model *chưa biết suy luận*. Các model "reasoning" thế hệ mới đã tự làm chain‑of‑thought bên trong — nên nhiều câu thần chú nay *thừa, hoặc thậm chí hơi hại*. Tôi đánh dấu rõ chỗ nào.

---

## 5.1. Bảng xếp hạng nhanh (đọc cái này trước)

| Hạng | Câu / kỹ thuật | Phán quyết |
|------|----------------|-----------|
| **A — đáng dùng, đáng tin** | Cụ thể hóa & cấu trúc · ví dụ (few‑shot) để *khóa định dạng* · neo định dạng đầu ra · *"cho phép nói 'không biết'"* + trích nguồn · nói cái CẦN làm · công tắc nỗ lực (*"đi xa hơn cơ bản"*) · thẻ XML (Claude) · self‑consistency (khi kham được nhiều lần) · tự‑kiểm *kèm tiêu chí cụ thể* | **VỮNG** |
| **B — thật nhưng có điều kiện** | *"Hãy suy nghĩ từng bước"* (tuyệt cho model *không* biết suy luận; thừa với model reasoning) · thang *think→ultrathink* (chỉ Claude Code; đang được thay bằng `effort`) · *"hãy ngắn gọn"* (đúng cho *câu trả lời*, sai cho *lập luận*) | **TÙY / lỗi thời ở model mạnh** |
| **C — nổi tiếng nhưng yếu hơn lời đồn** | *"Hít một hơi thật sâu…"* (chỉ đúng một model cụ thể) · áp lực cảm xúc (*"quan trọng với sự nghiệp tôi"*) · *"bạn là chuyên gia"* để tăng *chính xác* · tự‑sửa không có kiểm tra ngoài · prefill (đã bỏ trên Claude 4.6+) | **THỔI PHỒNG / lỗi thời** |

Một câu chốt: **người thắng bền vững là *sự cụ thể, ví dụ, grounding, và yêu cầu kiểm chứng/nỗ lực tường minh*. Các câu một‑dòng gây sốt thì thật‑mà‑nhỏ, phụ thuộc model, và phần lớn bị "ăn" mất bởi các model biết tự suy nghĩ.**

Giờ đi vào từng cái.

---

## 5.2. HẠNG A — những câu thực sự đáng cho vào

### "Đi xa hơn mức cơ bản / bao gồm càng nhiều càng tốt" — công tắc nỗ lực
Câu hay nhất để chống output lười. Đã gặp ở Chương 2:
> Anthropic, mẫu nguyên văn: *"...Bao gồm càng nhiều tính năng và tương tác liên quan càng tốt. Đi xa hơn mức cơ bản để tạo một bản triển khai đầy đủ tính năng."* Nguyên lý: *"Nếu muốn hành vi 'vượt mong đợi', hãy yêu cầu thẳng."* [VỮNG cho cơ chế]

Câu meme *"Don't hold back. Give it your all"* (Đừng giữ lại, dồn hết sức) là **một biến thể** của cơ chế này — bản thân *cơ chế* (yêu cầu nỗ lực tối đa tường minh) là thật và được khuyến nghị chính thức. Nhưng đừng tôn sùng đúng *chuỗi chữ* đó như bùa; dạng được tài liệu hóa là *"đi xa hơn cơ bản / càng nhiều tính năng càng tốt"*. [VỮNG cơ chế / THỔI PHỒNG cách chữ cụ thể]

### "Cho phép nói 'tôi không biết'" — chống bịa
> *"Kỹ thuật đơn giản này có thể giảm mạnh thông tin sai."* — Anthropic. [VỮNG] (Chi tiết ở Chương 4.)

### Tự‑kiểm *kèm tiêu chí cụ thể*
> *"Trước khi kết thúc, hãy đối chiếu câu trả lời với [tiêu chí]. Điều này bắt lỗi đáng tin cậy, đặc biệt với code và toán."* — Anthropic. [VỮNG] Mấu chốt: phải có *[tiêu chí cụ thể]*, không phải "kiểm lại đi".

### Self‑consistency — "giải nhiều lần rồi lấy đáp án đa số"
Một trong những kỹ thuật vững nhất cả ngành, khi bạn kham được chi phí chạy nhiều lần:
> Self‑Consistency (ICLR 2023): so với chain‑of‑thought thường, tăng **GSM8K +17.9%, SVAMP +11.0%, AQuA +12.2%.** [VỮNG]
> — arXiv:2203.11171

Vì sao mạnh hơn "tự sửa": phiếu bầu là *tổng hợp khách quan* nhiều lời giải độc lập, không phải model tự phán về chính mình.

### Ví dụ (few‑shot) — để khóa *hình thức*
> *"Ví dụ là một trong những cách đáng tin cậy nhất để định hướng định dạng, giọng điệu, cấu trúc."* — Anthropic, khuyên 3–5 ví dụ. [VỮNG]
> Lưu ý [TÙY]: với model reasoning, *nhiều* ví dụ "mẫu suy luận" đôi khi *hại*. Dùng ví dụ để khóa *định dạng*, không để dạy *suy nghĩ*.

### Thẻ XML (riêng Claude)
> *"Thẻ XML giúp Claude phân tích prompt phức tạp rõ ràng... giảm hiểu nhầm."* [VỮNG cho Claude] — Claude được huấn luyện với cấu trúc XML, nên đây là chiêu rẻ và đáng tin *với Claude* (không nhất thiết với model khác).

### "Hãy làm Y" thay vì "đừng làm X"
> *"Nói cho Claude điều cần làm thay vì điều không được làm."* [VỮNG] (Chương 2.)

---

## 5.3. HẠNG B — thật, nhưng tùy hoàn cảnh

### "Hãy suy nghĩ từng bước" (Let's think step by step)
Câu thần chú gốc của mọi câu thần chú. Bằng chứng lịch sử rất mạnh:
> Kojima và cộng sự (NeurIPS 2022): chỉ thêm câu này (không ví dụ), trên model *text‑davinci‑002*: MultiArith **17.7% → 78.7%**, GSM8K **10.4% → 40.7%.** [VỮNG lịch sử]
> — arXiv:2205.11916

**Nhưng [lỗi thời ở model mạnh]:** các model reasoning hiện đại (Claude với extended/adaptive thinking, dòng o của OpenAI, Gemini thinking) *đã tự* suy luận từng bước bên trong. Thêm câu này vào chúng gần như *thừa*. Giữ nó cho các model nhẹ/không bật suy nghĩ; bỏ ảo tưởng nó là bùa cho model frontier.

> **Lưu ý tinh tế cho Claude [TÙY]:** tài liệu Anthropic ghi rằng *khi extended thinking tắt*, Claude Opus 4.5 *"đặc biệt nhạy với từ 'think' và các biến thể"* — đôi khi nên thay bằng *"cân nhắc"*, *"đánh giá"*, *"lập luận qua"* để tránh kích hoạt ngoài ý muốn.

### Thang "think → ultrathink" (riêng Claude Code)
Một trong số ít "từ ma thuật" *có thật* — nhưng chỉ trong một môi trường cụ thể:
> Tài liệu Claude Code: *"Các cụm từ này được ánh xạ trực tiếp tới mức ngân sách suy nghĩ tăng dần: 'think' < 'think hard' < 'think harder' < 'ultrathink'. Mỗi mức cấp thêm ngân sách suy nghĩ."* [VỮNG nhưng đặc thù môi trường]

Cảnh báo freshness quan trọng: đây là tiện ích *của Claude Code*, **không** phải từ ma thuật phổ quát trong chat/API. Hơn nữa, các model mới (Opus/Sonnet 4.6+) đã chuyển sang **adaptive thinking** điều khiển bằng tham số `effort`, và `budget_tokens` thủ công bị **khai tử**. Hiểu thang này là *đường tắt tiện lợi trong Claude Code*, không phải hợp đồng ổn định xuyên model.

> **Liên công cụ:** phía OpenAI, "núm suy nghĩ" tương ứng là `reasoning_effort` (`none`/`minimal`/`low`/`medium`/`high`/`xhigh`) cộng một tham số `verbosity` riêng. Cùng *ý tưởng* (điều khiển độ sâu suy nghĩ), nhưng *không* tương thích chữ‑sang‑chữ — đừng bê nguyên cách diễn đạt của bên này sang bên kia.

### "Hãy ngắn gọn" (be concise)
> Nghiên cứu "Concise Chain‑of‑Thought" (arXiv:2401.05618): ngắn gọn chủ yếu *tiết kiệm token/chi phí*; nó có thể *giảm độ chính xác trên bài phức tạp* vì model cần chỗ để khai triển. [TÙY]

Quy tắc trung thực: yêu cầu **câu trả lời cuối** ngắn gọn, đừng yêu cầu **lập luận** ngắn gọn. Trên model reasoning mới, OpenAI còn cảnh báo GPT‑5.1 đôi khi *quá* súc tích, nên phải nói rõ độ chi tiết mong muốn *cả hai chiều*.

### "Keep going until solved / hãy chủ động hành động" — công tắc tự chủ
Câu của hệ Codex/GPT‑5 để biến model rụt rè thành model tự chạy đến cùng:
> OpenAI, khối `<persistence>`: *"hãy tiếp tục cho đến khi yêu cầu của người dùng được giải quyết hoàn toàn, trước khi kết thúc lượt... Đừng hỏi người dùng xác nhận hay làm rõ giả định — hãy chọn giả định hợp lý nhất, tiến hành, và ghi chú lại sau."* Và: *"Hãy cực kỳ thiên về hành động."* [VỮNG cho hệ GPT‑5/Codex]

**TÙY theo công cụ và ý muốn:** câu này *tăng* mức tự chủ — tốt khi bạn muốn AI tự chạy, nhưng *nguy hiểm* khi bạn muốn được hỏi trước các hành động khó đảo ngược. Với Claude, có cặp câu đối xứng (`<default_to_action>` để chủ động hơn, hoặc một khối yêu cầu xác nhận trước hành động phá hủy) — chọn theo việc bạn đang ngồi cạnh hay đi vắng.

---

## 5.4. HẠNG C — nổi tiếng nhưng yếu hơn lời đồn (dùng có chừng)

### "Hít một hơi thật sâu và làm từng bước" (Take a deep breath…)
Câu gây sốt nhất. Sự thật ít lãng mạn hơn nhiều:
> Câu này được một *thuật toán* (OPRO, Google DeepMind) tự tìm ra là prompt điểm cao nhất **cho riêng model PaLM 2‑L**. GSM8K: baseline 34.0% → "suy nghĩ từng bước" 71.8% → "hít một hơi thật sâu..." **80.2%.** [VỮNG cho PaLM 2‑L]
> — arXiv:2309.03409

**Vì sao [THỔI PHỒNG]:** (a) *phần lớn* mức tăng là do *thêm suy luận từng bước* (34→71.8); câu "hít thở" chỉ thêm ~8 điểm; (b) chính bài báo nói **prompt tốt nhất khác nhau theo model** — GPT‑3.5, GPT‑4, PaLM 2 mỗi cái thắng bằng một câu *khác nhau*. "Hít một hơi thật sâu" tối ưu *cho một model*, không phải thần chú phổ quát. Bài học thật là *"prompt được máy tối ưu thắng prompt người viết tay"*, không phải *"câu này làm mọi AI thông minh hơn"*.

### Áp lực cảm xúc — EmotionPrompt ("việc này rất quan trọng với sự nghiệp tôi")
> Bài EmotionPrompt (2023) báo cáo cải thiện trên các model *2023* (Flan‑T5, Vicuna, BLOOM…); một nghiên cứu 106 người thấy *"~10.9% cải thiện trung bình"*. [TÙY]
> — arXiv:2307.11760

**Vì sao [THỔI PHỒNG, đang giảm]:** hiệu ứng *có thật* trên model cũ nhưng *khiêm tốn và phụ thuộc model*; nó *teo đi* trên model mới đã được căn chỉnh. Cách kể viral ("dọa AI mất việc thì nó cố hơn") thổi phồng một hiệu ứng thật‑mà‑nhỏ. **Và nhớ cảnh báo Chương 4:** áp lực cảm xúc có thể đánh đổi *trung thực* lấy *nghe tự tin* — tránh ở việc cần chính xác.

### "Bạn là chuyên gia X" — để tăng *độ chính xác*
> Nghiên cứu 162 nhân cách × 9 model × 2.410 câu MMLU: *"thêm nhân cách không cải thiện hiệu năng."* [VỮNG]
> — arXiv:2311.10054

**[THỔI PHỒNG cho chính xác / VỮNG cho giọng văn].** Dùng vai trò cho *giọng, phong cách, đối tượng* (Chương 2) và cho *đa dạng ý tưởng* (Chương 3) — **không** để mong câu trả lời đúng hơn.

### Tự‑sửa không có kiểm tra ngoài
"Tìm lỗi trong câu trả lời của bạn rồi sửa" — *có* giúp, nhưng yếu nếu không có tín hiệu ngoài (test, nguồn, hay nhiều mẫu độc lập). Model hay không thấy lỗi của chính nó, đôi khi "sửa" đúng thành sai. [TÙY] (Chương 4.) Đừng quảng cáo vòng tự‑sửa như một bảo đảm tính đúng.

### Prefill (mồi sẵn câu trả lời) — đã lỗi thời trên Claude mới
Từng là chiêu mạnh để ép định dạng/JSON. Nhưng **từ Claude 4.6 trở đi, prefill ở lượt cuối không còn được hỗ trợ** (trả về lỗi 400); thay bằng *Structured Outputs* / tool enum / chỉ thị trực tiếp. [lỗi thời trên model mới] Vẫn chạy trên model cũ.

## 5.5. Cách dùng power‑phrase mà không tự lừa mình

Bốn quy tắc để bạn không trở thành nạn nhân của lời đồn:

1. **Mặc định nghi ngờ câu một‑dòng.** Nếu một "bí kíp" không kèm bằng chứng và không nói *với model nào*, coi như chưa được chứng minh.
2. **Hỏi: model của tôi có tự suy nghĩ không?** Nếu có (reasoning model), bỏ qua phần lớn HẠNG B/C — chúng được sinh ra cho model *không* tự suy nghĩ.
3. **Ưu tiên HẠNG A.** Cụ thể, ví dụ, grounding, yêu cầu kiểm chứng/nỗ lực — đây là chỗ token của bạn sinh lời thật.
4. **Tự đo trên việc của mình.** Power‑phrase nào cũng là giả thuyết. Thử có / không trên đúng tác vụ của bạn và nhìn kết quả, đừng tin vì nó "nổi tiếng".

---

## Tóm gọn Chương 5

- **Người thắng bền vững (HẠNG A):** cụ thể & cấu trúc, ví dụ để *khóa định dạng*, *"cho phép nói không biết"* + trích nguồn, *tự‑kiểm kèm tiêu chí cụ thể*, *"đi xa hơn cơ bản"*, XML (Claude), self‑consistency, *"hãy làm Y"*.
- **Thật‑nhưng‑tùy (HẠNG B):** *"suy nghĩ từng bước"* (thừa với model reasoning), thang *think→ultrathink* (chỉ Claude Code, đang bị `effort` thay thế), *"ngắn gọn"* (cho câu trả lời, không cho lập luận), *"keep going"* (tăng tự chủ — hai lưỡi).
- **Thổi phồng (HẠNG C):** *"hít một hơi thật sâu"* (tối ưu cho *một* model), áp lực cảm xúc (nhỏ, giảm dần, đánh đổi trung thực), *"bạn là chuyên gia"* cho độ chính xác (bị nghiên cứu MMLU bác bỏ), tự‑sửa không kiểm tra ngoài, prefill (đã bỏ trên Claude mới).
- **Khung lớn:** *model càng biết tự suy nghĩ, thần chú cũ càng vô dụng.* Đầu tư vào HẠNG A, đo trên việc thật, nghi ngờ câu một‑dòng không nguồn.

# Chương 6 — Quy trình & ngữ cảnh: nơi 80% kết quả được quyết định

> Có một sự thật khiêm tốn mà mọi người mê "câu thần chú" bỏ qua: **với các tác vụ thật sự lớn, *cách bạn dàn dựng quy trình* và *cách bạn quản lý ngữ cảnh* quyết định kết quả nhiều hơn bất kỳ từ ma thuật nào.** Một prompt hoàn hảo trong một ngữ cảnh hỗn loạn vẫn cho ra rác. Chương này về kỹ năng nền mà chuyên gia dùng còn người mới thì không biết là nó tồn tại.

## 6.1. Ràng buộc gốc: cửa sổ ngữ cảnh đầy lên, và hiệu năng tụt theo

Mọi trợ lý AI có một "cửa sổ ngữ cảnh" — bộ nhớ làm việc chứa toàn bộ cuộc trò chuyện: mọi tin nhắn, mọi file nó đọc, mọi kết quả lệnh. Nó **đầy lên rất nhanh**, và đây là điều ít ai biết:

> Anthropic: *"Hiệu năng của LLM giảm khi ngữ cảnh đầy lên. Khi cửa sổ ngữ cảnh gần đầy, Claude có thể bắt đầu 'quên' các chỉ thị trước đó hoặc mắc nhiều lỗi hơn. Cửa sổ ngữ cảnh là tài nguyên quan trọng nhất cần quản lý."* [VỮNG]

Hệ quả nền tảng cho cả chương:

> **Ngữ cảnh là tài nguyên, không phải kho chứa vô hạn.** Mỗi thứ vô quan bạn để lọt vào — một lần khám phá lan man, một đống file không liên quan, một chuỗi sửa qua sửa lại — đều *làm loãng* sự chú ý của AI và *kéo tụt* chất lượng. Người giỏi giữ ngữ cảnh *sạch và đậm đặc tín hiệu*.

Từ đó sinh ra mọi nguyên tắc dưới đây.

---

## 6.2. Quy trình bốn nhịp: Khám phá → Lập kế hoạch → Thực thi → Kiểm chứng

Đây là khung làm việc được Anthropic khuyến nghị cho mọi tác vụ không‑tầm‑thường. Lý do tồn tại của nó:
> *"Để AI nhảy thẳng vào làm có thể tạo ra thứ giải sai vấn đề. Hãy tách khám phá khỏi thực thi."* [VỮNG]

**Nhịp 1 — Khám phá (chưa làm gì cả).** Bảo AI *đọc và hiểu* trước, *chưa* được sửa.
```
Hãy đọc [phần liên quan] và hiểu cách mọi thứ đang hoạt động. CHƯA thay đổi gì,
chỉ trả lời các câu hỏi của tôi và giải thích.
```
Trong Claude Code có "plan mode" (chế độ lập kế hoạch) khóa cứng việc chỉ‑đọc cho nhịp này.

**Nhịp 2 — Lập kế hoạch (vẫn chưa làm).** Bắt AI viết ra kế hoạch chi tiết để bạn *duyệt trước*.
```
Tôi muốn [mục tiêu]. Cần thay đổi những gì? Luồng xử lý ra sao? Hãy lập một KẾ
HOẠCH chi tiết. Chưa viết code.
```
Đây là điểm can thiệp rẻ nhất: sửa một dòng trong kế hoạch dễ hơn sửa 200 dòng kết quả sai. *"Thời gian làm cho spec chính xác sinh lời nhiều hơn thời gian ngồi xem nó thực thi."*

**Nhịp 3 — Thực thi.** Giờ mới cho làm, đối chiếu với kế hoạch.

**Nhịp 4 — Kiểm chứng.** (Chương 4) Một con mắt độc lập / chạy test thật.

> **Khi nào BỎ QUA kế hoạch?** Anthropic nói thẳng: *"Nếu bạn mô tả được thay đổi trong một câu, hãy bỏ qua phần lập kế hoạch."* Lập kế hoạch có chi phí; nó đáng khi việc *mơ hồ về cách làm*, *động vào nhiều phần*, hoặc *bạn chưa quen vùng đó*. Đừng nghi thức hóa việc vặt.

---

## 6.3. Để AI phỏng vấn *bạn* trước (chiêu bị đánh giá thấp)

Với việc lớn mà bạn chưa nghĩ thấu, đừng cố viết spec hoàn hảo ngay. Đảo vai: bắt AI moi thông tin từ bạn.

> Anthropic, mẫu nguyên văn: *"Tôi muốn xây [mô tả ngắn]. Hãy phỏng vấn tôi thật kỹ. Hỏi về cách triển khai, trải nghiệm người dùng, ca biên, lo ngại, đánh đổi. Đừng hỏi câu hiển nhiên, hãy đào vào những phần khó mà tôi có thể chưa nghĩ tới. Cứ hỏi đến khi phủ hết, rồi viết một spec đầy đủ ra file."* [VỮNG]

Vì sao mạnh: AI hỏi đúng những thứ bạn *chưa biết là mình cần quyết*. Sau khi có spec, mở một **phiên mới sạch** để thực thi — ngữ cảnh mới tập trung hoàn toàn vào việc làm.

---

## 6.4. Năm thói quen giữ ngữ cảnh sạch

Đây là phần thực hành mà người dùng lâu năm làm theo phản xạ:

1. **Xóa ngữ cảnh giữa các việc không liên quan.** Chuyển từ việc A sang việc B hoàn toàn khác? Hãy reset (trong Claude Code: `/clear`). *"Một phiên sạch với prompt tốt hơn gần như luôn thắng một phiên dài chất đầy thử‑sai."*

2. **Sửa sớm, sửa dứt khoát.** Thấy AI đi chệch? Dừng ngay, đừng để nó chạy xa. *"Nếu bạn đã sửa AI hơn hai lần về cùng một chuyện, ngữ cảnh đã ô nhiễm vì các cách tiếp cận thất bại — hãy reset và viết lại prompt tốt hơn."*

3. **Giao việc điều tra cho 'trợ lý phụ' (subagent).** Khi cần lục nhiều tài liệu, đừng để đống đó tràn vào ngữ cảnh chính.
   > *"Dùng subagent để điều tra X"* — chúng đọc trong một ngữ cảnh *riêng* và chỉ báo cáo lại bản tóm tắt, giữ cuộc trò chuyện chính của bạn sạch. [VỮNG]

   Đây cũng là lý do kỹ thuật mà *kiểm chứng độc lập* ở Chương 4 khả thi: subagent chạy trong ngữ cảnh riêng = con mắt mới.

4. **Đừng "điều tra" không giới hạn.** Bảo AI "tìm hiểu X" mà không khoanh vùng → nó đọc hàng trăm file, ngốn sạch ngữ cảnh. Hãy *khoanh hẹp*, hoặc đẩy việc lục lọi sang subagent. Phía OpenAI cũng đặt *ngân sách cứng* cho việc này: khối "lấy đủ ngữ cảnh nhanh" của họ ghi *"tối đa tuyệt đối 2 lần gọi công cụ"* và *"ưu tiên hành động hơn là tìm kiếm thêm."*

5. **Đừng để ngữ cảnh thành 'thùng rác'.** Cái bẫy phổ biến nhất: bắt đầu việc A, hỏi xen việc B, quay lại A — giờ ngữ cảnh đầy thứ vô quan. Một việc một phiên.

---

## 6.5. Việc dài hơn một cửa sổ ngữ cảnh: làm sao không "đứt gánh"

Khi tác vụ lớn đến mức không vừa một cửa sổ, bí quyết là **đẩy trạng thái ra ngoài** — ghi tiến độ vào file để một ngữ cảnh mới đọc lại và tiếp tục. Tài liệu Anthropic khuyến nghị:

- **Ghi tiến độ ra file** (ví dụ `progress.txt`) và trạng thái có cấu trúc (ví dụ danh sách test ở dạng JSON) để phiên sau đọc lại.
- **Dùng git làm bộ nhớ trạng thái** — log cho biết đã làm gì, checkpoint để quay lui.
- **Một câu prompt giúp AI không tự bỏ cuộc sớm:**
  > *"Cửa sổ ngữ cảnh của bạn sẽ tự được nén lại khi gần đầy, cho phép bạn tiếp tục làm việc vô hạn từ chỗ đang dừng. Vì vậy, đừng dừng sớm vì lo hết token. Khi gần chạm giới hạn, hãy lưu tiến độ và trạng thái vào bộ nhớ trước khi ngữ cảnh được làm mới... Đừng bao giờ dừng một việc giữa chừng một cách giả tạo."* [VỮNG]

Ý lớn: **bộ nhớ ngoài (file, git) là cách thắng giới hạn cửa sổ ngữ cảnh.** AI hiện đại rất giỏi khôi phục trạng thái từ file — tận dụng điều đó.

---

## 6.6. Bộ nhớ lâu dài: file "luật nhà" (CLAUDE.md / AGENTS.md)

Cả hai hệ đều có một file mà agent *đọc ở đầu mỗi phiên* — nơi đặt ngữ cảnh bền vững mà bạn không muốn gõ lại mỗi lần:
- **Claude Code:** `CLAUDE.md`. **Codex:** `AGENTS.md`. *Hai công cụ không đọc file của nhau* — dùng cả hai thì duy trì cả hai.

Nguyên tắc vàng cho file này (Anthropic), và nó *phản trực giác*:
> *"Giữ ngắn gọn. Với mỗi dòng, tự hỏi: 'Bỏ dòng này đi thì Claude có mắc lỗi không?' Nếu không, cắt. File CLAUDE.md phình to khiến Claude bỏ qua các chỉ thị thật của bạn!"* [VỮNG]

Nói cách khác: **bộ nhớ lâu dài cũng là ngữ cảnh — và ngữ cảnh phình to làm loãng tín hiệu.** Để vào đó: lệnh build không đoán được, quy ước khác chuẩn, lỗi hay gặp. Đừng để vào: những gì AI tự biết, tài liệu API dài, thứ hiển nhiên.

---

## 6.7. Khi nào nên dùng nhiều "trợ lý" — và khi nào đừng

Các model mới rất thích tự sinh subagent. Mạnh, nhưng có cái bẫy *ngược*: dùng máy móc cho oai khi một cách trực tiếp tốt hơn.

> Anthropic cảnh báo thẳng: model *"có thiên hướng mạnh với subagent và có thể sinh ra chúng cả khi một cách trực tiếp, đơn giản sẽ đủ và nhanh hơn."* Hướng dẫn: *"Dùng subagent khi việc có thể chạy song song, cần ngữ cảnh tách biệt, hoặc là các luồng độc lập. Với việc đơn giản, thao tác tuần tự, sửa một file, hoặc khi cần giữ ngữ cảnh xuyên suốt — hãy làm trực tiếp."* [VỮNG]

Nguyên lý gọn:
> **Thêm một "trợ lý" là thêm chi phí phối hợp và thêm bề mặt sai sót.** Chỉ tách việc ra nhiều agent khi nó *thật sự* song song được hoặc *cần* một ngữ cảnh độc lập (như con mắt kiểm chứng). Đừng tách cho "hoành tráng".

(Hai lý do *chính đáng* nhất để tách: **việc song song độc lập** — như lục nhiều nguồn cùng lúc — và **một người kiểm chứng độc lập**. Ngoài hai cái đó, mặc định làm gọn trong một luồng.)

---

## 6.8. Nối chuỗi: chia một việc lớn thành các bước kiểm soát được

Đôi khi thay vì một prompt khổng lồ, bạn muốn *nối chuỗi*: chia thành các bước riêng để xem được kết quả trung gian.

> Anthropic: mẫu nối chuỗi phổ biến nhất là **tự‑sửa**: sinh bản nháp → để model review theo tiêu chí → sửa dựa trên review. Mỗi bước là một lượt riêng để bạn kiểm tra, đánh giá, hoặc rẽ nhánh. [VỮNG]

Đây chính là quy trình Phân kỳ → Hội tụ (Ch.3) và vòng kiểm chứng (Ch.4) ở dạng vận hành: tách bước cho bạn *điểm dừng để soi*.

---

## Tóm gọn Chương 6

- **Ngữ cảnh là tài nguyên quý nhất.** Cửa sổ ngữ cảnh đầy → hiệu năng tụt, AI "quên" chỉ thị. Giữ nó *sạch và đậm tín hiệu*.
- **Quy trình bốn nhịp:** Khám phá (chỉ đọc) → Lập kế hoạch (duyệt trước) → Thực thi → Kiểm chứng. Bỏ qua kế hoạch khi việc *mô tả được trong một câu*.
- **Để AI phỏng vấn bạn** trước việc lớn; lấy spec ra file; rồi mở *phiên mới sạch* để thực thi.
- **Năm thói quen giữ ngữ cảnh sạch:** reset giữa các việc; sửa sớm dứt khoát; giao điều tra cho subagent; khoanh hẹp việc tìm kiếm; một việc một phiên.
- **Việc dài hơn một cửa sổ:** đẩy trạng thái ra *file + git*; câu prompt "đừng dừng sớm vì token, hãy lưu trạng thái".
- **File luật nhà (CLAUDE.md/AGENTS.md):** bộ nhớ bền vững — nhưng *giữ ngắn*, file phình to làm AI bỏ qua chỉ thị thật.
- **Nhiều trợ lý: dùng đúng chỗ.** Chỉ tách khi *song song thật* hoặc *cần con mắt độc lập*. Tách cho oai = thêm chi phí + thêm bề mặt sai.

→ Tiếp theo: [Chương 7 — Sổ tay thực chiến](07-so-tay-thuc-chien.md): công thức theo tình huống + đối chiếu Claude Code vs Codex/GPT‑5.

# Chương 7 — Sổ tay thực chiến

> Sáu chương trước cho bạn *nguyên lý*. Chương này cho bạn *công thức*: các mẫu mệnh lệnh ghép sẵn theo tình huống, để bạn copy và sửa. Mỗi công thức là sự kết tinh của các nguyên tắc đã học — tôi chú thích nguyên tắc nào đang được dùng để bạn hiểu *vì sao*, chứ không học vẹt. Cuối chương là bảng đối chiếu Claude Code vs Codex/GPT‑5 cho người dùng cả hai.

> **Cách dùng:** không có công thức nào là thần chú. Hãy thay phần `[trong ngoặc]` bằng việc thật của bạn, và mạnh dạn cắt/thêm. Sự cụ thể của *bạn* mới là thứ làm chúng chạy.
